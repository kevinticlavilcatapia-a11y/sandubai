                                 <label className="block text-xs font-bold text-rose-900 mb-1">Producto Base</label>
                                 <select className="w-full bg-white border border-rose-300 rounded-lg p-2 text-sm" value={productForm.baseProductId} onChange={e => setProductForm({...productForm, baseProductId: e.target.value})} required={productForm.isPromotion}>
                                   <option value="">Selecciona...</option>
                                   {products.filter(p => !p.isPromotion).map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                                 </select>
                               </div>
                               <div>
                                 <label className="block text-xs font-bold text-rose-900 mb-1">Cant. Descuenta</label>
                                 <input type="number" min="1" className="w-full bg-white border border-rose-300 rounded-lg p-2 text-sm" value={productForm.baseQuantity} onChange={e => setProductForm({...productForm, baseQuantity: e.target.value})} required={productForm.isPromotion} />
                               </div>
                            </div>
                          )}
                        </div>
                        <div className="flex gap-3 pt-4 border-t border-gray-100 mt-4">
                          <button type="button" disabled={isSavingProduct} onClick={() => setShowProductModal(false)} className="flex-1 py-3.5 rounded-xl font-bold text-gray-600 bg-gray-100 hover:bg-gray-200 transition-colors disabled:opacity-50">Cancelar</button>
                          <button type="submit" disabled={isSavingProduct} className="flex-1 py-3.5 rounded-xl font-bold text-white bg-indigo-600 hover:bg-indigo-700 shadow-lg shadow-indigo-600/30 transition-all flex justify-center items-center gap-2">
                            {isSavingProduct ? 'Guardando...' : productForm.id ? 'Guardar Cambios' : 'Crear Producto'}
                          </button>
                        </div>
                      </form>
                    </div>
                  </div>
                )}

                {/* Modal Compras */}
                {showPurchaseModal && (
                  <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                    <div className="bg-white border border-gray-200 rounded-3xl w-full max-w-2xl overflow-hidden shadow-2xl flex flex-col max-h-[90vh]">
                      <div className="p-6 border-b border-gray-100 bg-gray-50 flex items-center gap-2">
                         <ShoppingBag className="text-emerald-600" /> <h3 className="text-xl font-bold text-gray-900">Registrar Compra a Proveedor</h3>
                      </div>
                      <div className="flex-1 overflow-y-auto p-6 custom-scrollbar bg-white">
                        <div className="grid grid-cols-3 gap-4 mb-6 pb-6 border-b border-gray-200">
                           <div className="col-span-1"><label className="block text-xs font-bold text-gray-500 uppercase">Proveedor</label><input type="text" className="w-full border border-gray-300 rounded-lg p-2.5 text-sm" value={purchaseForm.provider} onChange={e => setPurchaseForm({...purchaseForm, provider: e.target.value})} /></div>
                           <div className="col-span-1"><label className="block text-xs font-bold text-gray-500 uppercase">Documento</label><select className="w-full border border-gray-300 rounded-lg p-2.5 text-sm" value={purchaseForm.docType} onChange={e => setPurchaseForm({...purchaseForm, docType: e.target.value})}><option value="Factura">Factura</option><option value="Boleta">Boleta</option><option value="Guia">Guía</option></select></div>
                           <div className="col-span-1"><label className="block text-xs font-bold text-gray-500 uppercase">Número</label><input type="text" className="w-full border border-gray-300 rounded-lg p-2.5 text-sm" value={purchaseForm.docNumber} onChange={e => setPurchaseForm({...purchaseForm, docNumber: e.target.value})} /></div>
                        </div>
                        <div className="mb-4">
                          <h4 className="text-sm font-bold text-gray-800 mb-3 flex items-center gap-2"><Package size={16}/> Añadir Productos</h4>
                          <div className="flex items-end gap-2 bg-gray-50 p-3 rounded-xl border border-gray-200">
                             <div className="flex-1"><label className="block text-xs text-gray-500 font-bold mb-1">Producto</label><select className="w-full border border-gray-300 rounded-lg p-2 text-sm" value={purchaseItemTemp.productId} onChange={e => setPurchaseItemTemp({...purchaseItemTemp, productId: e.target.value})}><option value="">Seleccionar...</option>{products.filter(p => !p.isPromotion).map(p => <option key={p.id} value={p.id}>{p.name}</option>)}</select></div>
                             <div className="w-24"><label className="block text-xs text-gray-500 font-bold mb-1">Cantidad</label><input type="number" min="1" className="w-full border border-gray-300 rounded-lg p-2 text-sm" value={purchaseItemTemp.qty} onChange={e => setPurchaseItemTemp({...purchaseItemTemp, qty: e.target.value})} /></div>
                             <div className="w-32"><label className="block text-xs text-gray-500 font-bold mb-1">Costo U. (S/)</label><input type="number" step="0.10" min="0" className="w-full border border-gray-300 rounded-lg p-2 text-sm" value={purchaseItemTemp.cost} onChange={e => setPurchaseItemTemp({...purchaseItemTemp, cost: e.target.value})} /></div>
                             <button type="button" onClick={handleAddPurchaseItem} className="bg-emerald-600 hover:bg-emerald-700 text-white p-2 rounded-lg font-bold transition-colors"><Plus size={20} /></button>
                          </div>
                        </div>
                        {purchaseForm.items.length > 0 && (
                          <div className="border border-gray-200 rounded-xl overflow-hidden shadow-sm">
                             <table className="w-full text-sm text-left"><thead className="bg-gray-100 text-gray-600 text-xs uppercase font-bold"><tr><th className="px-4 py-2">Producto</th><th className="px-4 py-2 text-center">Cant.</th><th className="px-4 py-2 text-right">Costo U.</th><th className="px-4 py-2 text-right">Subtotal</th><th className="px-4 py-2 text-center">X</th></tr></thead>
                               <tbody className="divide-y divide-gray-100">{purchaseForm.items.map((it, idx) => (<tr key={idx} className="hover:bg-gray-50"><td className="px-4 py-2 font-medium text-gray-800">{it.productName}</td><td className="px-4 py-2 text-center text-indigo-600 font-bold">{it.qty}</td><td className="px-4 py-2 text-right">{formatCurrency(it.cost)}</td><td className="px-4 py-2 text-right font-bold text-gray-700">{formatCurrency(it.qty * it.cost)}</td><td className="px-4 py-2 text-center"><button type="button" onClick={() => handleRemovePurchaseItem(idx)} className="text-red-500 hover:text-red-700 bg-red-50 p-1.5 rounded-lg"><Trash2 size={14}/></button></td></tr>))}</tbody>
                             </table>
                             <div className="bg-gray-50 p-4 flex justify-end items-center gap-4 border-t border-gray-200"><span className="text-gray-500 font-bold">Total:</span><span className="text-2xl font-black text-emerald-600">{formatCurrency(purchaseForm.items.reduce((sum, item) => sum + (item.qty * item.cost), 0))}</span></div>
                          </div>
                        )}
                      </div>
                      <div className="p-4 bg-gray-50 border-t border-gray-100 flex gap-3">
                         <button type="button" onClick={() => setShowPurchaseModal(false)} className="flex-1 py-3.5 rounded-xl font-bold text-gray-600 bg-gray-200">Cancelar</button>
                         <button type="button" onClick={handleSavePurchase} className="flex-1 py-3.5 rounded-xl font-bold text-white bg-emerald-600 shadow-lg shadow-emerald-600/30">Procesar e Ingresar Stock</button>
                      </div>
                    </div>
                  </div>
                )}

                {/* Modal Egresos */}
                {showExpenseModal && (
                  <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                    <div className="bg-white border border-gray-200 rounded-3xl w-full max-w-sm overflow-hidden shadow-2xl">
                      <div className="p-6 border-b border-gray-100 bg-rose-50 flex items-center gap-2 text-rose-700">
                         <TrendingDown size={24} /> <h3 className="text-xl font-bold">Registrar Egreso</h3>
                      </div>
                      <form onSubmit={handleSaveExpense} className="p-6 space-y-4 bg-white">
                        <div><label className="block text-sm font-bold text-gray-700 mb-1.5">Descripción</label><input type="text" required className="w-full border border-gray-300 rounded-xl p-3 text-sm focus:ring-rose-500" value={expenseForm.description} onChange={e => setExpenseForm({...expenseForm, description: e.target.value})} /></div>
                        <div><label className="block text-sm font-bold text-gray-700 mb-1.5">Monto (S/)</label><input type="number" step="0.10" min="0" required className="w-full border border-gray-300 rounded-xl p-3 text-lg font-bold text-rose-600 focus:ring-rose-500" value={expenseForm.amount} onChange={e => setExpenseForm({...expenseForm, amount: e.target.value})} /></div>
                        <div className="pt-4 flex gap-3"><button type="button" onClick={() => setShowExpenseModal(false)} className="flex-1 py-3.5 rounded-xl font-bold text-gray-600 bg-gray-100">Cancelar</button><button type="submit" className="flex-1 py-3.5 rounded-xl font-bold text-white bg-rose-600">Guardar</button></div>
                      </form>
                    </div>
                  </div>
                )}

                {/* Modal Categorías */}
                {showCategoryModal && (
                  <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                    <div className="bg-white border border-gray-200 rounded-3xl w-full max-w-sm overflow-hidden shadow-2xl flex flex-col max-h-[80vh]">
                      <div className="p-6 border-b border-gray-100 bg-gray-50 flex justify-between items-center"><h3 className="text-xl font-bold text-gray-900 flex items-center gap-2"><Tags className="text-indigo-600" /> Categorías</h3></div>
                      <div className="p-6 overflow-y-auto custom-scrollbar flex-1">
                        <form onSubmit={handleAddCategory} className="flex gap-2 mb-6"><input type="text" required placeholder="Nueva categoría..." className="flex-1 bg-white border border-gray-300 rounded-xl px-4 py-2 font-medium" value={newCategoryName} onChange={(e) => setNewCategoryName(e.target.value)} /><button type="submit" className="bg-indigo-600 text-white p-2.5 rounded-xl"><Plus size={20} /></button></form>
                        <div className="space-y-2">{categories.map(cat => (<div key={cat} className="flex justify-between items-center p-3 bg-gray-50 border border-gray-100 rounded-xl"><span className="font-bold text-gray-700">{cat}</span><button onClick={() => handleDeleteCategory(cat)} className="text-gray-400 hover:text-red-500 p-1"><Trash2 size={16} /></button></div>))}</div>
                      </div>
                      <div className="p-4 bg-gray-50 border-t border-gray-100"><button onClick={() => setShowCategoryModal(false)} className="w-full py-3 rounded-xl font-bold text-gray-600 bg-gray-200">Cerrar</button></div>
                    </div>
                  </div>
                )}

                {/* Modal Auditoría de Stock */}
                {showAuditModal && (
                  <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                    <div className="bg-white border border-gray-200 rounded-3xl w-full max-w-4xl overflow-hidden shadow-2xl flex flex-col max-h-[90vh]">
                      <div className="p-6 border-b border-gray-100 bg-amber-50 flex justify-between items-center">
                        <div>
                          <h3 className="text-xl font-bold text-amber-900 flex items-center gap-2">
                            <ClipboardCheck className="text-amber-600" /> Toma de Inventario Físico
                          </h3>
                          <p className="text-xs text-amber-700 mt-1 font-bold">Compara el stock del sistema con tu conteo real y aplica las diferencias.</p>
                        </div>
                        <div className="relative w-64">
                          <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" size={16} />
                          <input type="text" placeholder="Buscar producto..." className="w-full bg-white border border-amber-200 rounded-lg pl-9 pr-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500" value={auditSearch} onChange={e => setAuditSearch(e.target.value)} />
                        </div>
                      </div>
                      
                      <div className="flex-1 overflow-y-auto custom-scrollbar p-0 bg-gray-50">
                        <table className="w-full text-left border-collapse">
                          <thead className="bg-white text-gray-500 text-xs uppercase font-bold sticky top-0 shadow-sm z-10">
                            <tr>
                              <th className="px-6 py-4">Producto</th>
                              <th className="px-6 py-4">Categoría</th>
                              <th className="px-6 py-4 text-center">Stock Sistema</th>
                              <th className="px-6 py-4 text-center">Stock Físico (Real)</th>
                              <th className="px-6 py-4 text-center">Diferencia</th>
                            </tr>
                          </thead>
                          <tbody className="divide-y divide-gray-100">
                            {products.filter(p => !p.isPromotion && p.name.toLowerCase().includes(auditSearch.toLowerCase())).map(p => {
                              const sysStock = p.stock;
                              const physStock = parseInt(auditData[p.id]) || 0;
                              const diff = physStock - sysStock;
                              const isDiff = diff !== 0;
                              
                              return (
                                <tr key={p.id} className={`hover:bg-amber-50/30 transition-colors ${isDiff ? 'bg-amber-50/10' : 'bg-white'}`}>
                                  <td className="px-6 py-3 font-bold text-gray-800">{p.name}</td>
                                  <td className="px-6 py-3"><span className="text-xs bg-gray-100 text-gray-600 px-2 py-1 rounded-md font-medium">{p.category}</span></td>
                                  <td className="px-6 py-3 text-center font-black text-gray-500 text-lg">{sysStock}</td>
                                  <td className="px-6 py-3 text-center">
                                    <input 
                                      type="number" 
                                      min="0"
                                      className={`w-24 text-center border-2 rounded-lg py-1.5 font-bold text-lg focus:outline-none focus:ring-2 focus:ring-amber-500 transition-colors ${isDiff ? 'border-amber-400 text-amber-700 bg-amber-50' : 'border-gray-200 text-gray-800'}`}
                                      value={auditData[p.id] !== undefined ? auditData[p.id] : ''}
                                      onChange={e => setAuditData({...auditData, [p.id]: e.target.value})}
                                    />
                                  </td>
                                  <td className="px-6 py-3 text-center">
                                    <span className={`inline-flex items-center justify-center min-w-[3rem] px-2 py-1 rounded-lg font-black text-sm ${diff === 0 ? 'bg-gray-100 text-gray-400' : diff > 0 ? 'bg-emerald-100 text-emerald-700' : 'bg-red-100 text-red-700'}`}>
                                      {diff > 0 ? `+${diff}` : diff}
                                    </span>
                                  </td>
                                </tr>
                              )
                            })}
                          </tbody>
                        </table>
                      </div>
                      
                      <div className="p-4 bg-white border-t border-gray-200 flex justify-between items-center gap-4 shadow-[0_-4px_6px_-1px_rgb(0,0,0,0.05)]">
                         <div className="text-sm text-gray-500 font-medium">
                           Total de productos a auditar: <span className="font-bold text-gray-800">{products.filter(p => !p.isPromotion).length}</span>
                         </div>
                         <div className="flex gap-3">
                           <button onClick={() => setShowAuditModal(false)} className="px-6 py-3.5 rounded-xl font-bold text-gray-600 bg-gray-100 hover:bg-gray-200 transition-colors">Cancelar</button>
                           <button onClick={handleSaveAudit} className="px-6 py-3.5 rounded-xl font-bold text-white bg-amber-500 hover:bg-amber-600 shadow-lg shadow-amber-500/30 transition-all flex items-center gap-2">
                             <ClipboardCheck size={20} /> Aplicar Ajustes
                           </button>
                         </div>
                      </div>
                    </div>
                  </div>
                )}

                {/* Modal Asignar Stock por Sesión (Solo Admin) */}
                {showAssignStockModal && selectedSessionForStock && (
                  <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                    <div className="bg-white border border-gray-200 rounded-3xl w-full max-w-md overflow-hidden shadow-2xl flex flex-col max-h-[90vh]">
                      <div className="p-6 border-b border-gray-100 bg-indigo-50">
                        <h3 className="text-xl font-bold text-gray-900 flex items-center gap-2">
                          <ClipboardList className="text-indigo-600" /> Control de Barra: {selectedSessionForStock.openedBy}
                        </h3>
                        <p className="text-xs text-indigo-600 mt-1 font-bold uppercase">Este control no afecta el inventario general.</p>
                      </div>
                      
                      <div className="p-6 flex-1 overflow-y-auto custom-scrollbar">
                        <form onSubmit={handleAddAssignedStock} className="flex gap-2 mb-6 items-end bg-gray-50 p-3 rounded-xl border border-gray-200">
                          <div className="flex-1">
                            <label className="block text-xs font-bold text-gray-700 mb-1">Producto</label>
                            <select required className="w-full border border-gray-300 rounded-xl p-2.5 text-sm" value={assignStockForm.productId} onChange={e => setAssignStockForm({...assignStockForm, productId: e.target.value})}>
                              <option value="">Seleccionar...</option>
                              {products.filter(p => !p.isPromotion).map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                            </select>
                          </div>
                          <div className="w-20">
                            <label className="block text-xs font-bold text-gray-700 mb-1">Cant.</label>
                            <input type="number" min="1" required className="w-full border border-gray-300 rounded-xl p-2.5 text-sm font-bold text-indigo-700" value={assignStockForm.quantity} onChange={e => setAssignStockForm({...assignStockForm, quantity: e.target.value})} />
                          </div>
                          <button type="submit" className="bg-indigo-600 text-white p-2.5 rounded-xl hover:bg-indigo-700 transition-colors shadow-sm"><Plus size={20}/></button>
                        </form>

                        <div>
                          <h4 className="font-bold text-gray-800 text-sm mb-3">Stock Físico Entregado</h4>
                          {(!selectedSessionForStock.assignedStock || Object.keys(selectedSessionForStock.assignedStock).length === 0) ? (
                            <div className="text-sm text-gray-400 font-medium text-center py-6 border border-dashed border-gray-200 rounded-xl">No has asignado mercadería a esta barra.</div>
                          ) : (
                            <div className="space-y-2">
                              {Object.entries(selectedSessionForStock.assignedStock).map(([pId, qty]) => {
                                const prod = products.find(p => p.id === parseInt(pId));
                                if (!prod) return null;
                                return (
                                  <div key={pId} className="flex justify-between items-center p-3 bg-white border border-gray-200 rounded-xl shadow-sm">
                                    <span className="font-bold text-gray-700 text-sm flex-1">{prod.name}</span>
                                    <div className="flex items-center gap-4">
                                      <span className="font-black text-indigo-600 bg-indigo-50 px-3 py-1 rounded-lg">{qty} und</span>
                                      <button type="button" onClick={() => handleRemoveAssignedStock(pId)} className="text-gray-400 hover:text-red-500 transition-colors"><Trash2 size={16}/></button>
                                    </div>
                                  </div>
                                )
                              })}
                            </div>
                          )}
                        </div>
                      </div>
                      <div className="p-4 bg-gray-50 border-t border-gray-100">
                         <button onClick={() => setShowAssignStockModal(false)} className="w-full py-3.5 rounded-xl font-bold text-gray-600 bg-gray-200 hover:bg-gray-300 transition-colors">Terminar de Asignar</button>
                      </div>
                    </div>
                  </div>
                )}

                {/* Modal Cierre de Caja */}
                {showCloseBoxModal && boxSession && (
                  <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                    <div className="bg-white border border-gray-200 rounded-3xl w-full max-w-md overflow-hidden shadow-2xl">
                      <div className="p-8 text-center border-b border-gray-100 bg-red-50">
                        <div className="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4"><AlertCircle size={32} className="text-red-600" /></div>
                        <h3 className="text-xl font-black text-gray-900 mb-2">Cierre de Caja</h3><p className="text-gray-600 font-medium">Ingresa tu contraseña para confirmar el cierre.</p>
                      </div>
                      <form onSubmit={handleCloseBox}>
                        <div className="p-6">
                          <label className="block text-sm font-bold text-gray-700 mb-2">Contraseña de Usuario</label>
                          <div className="relative">
                            <Key className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400" size={20} />
                            <input type="password" required autoFocus className="w-full bg-white border border-gray-300 rounded-xl py-3 pl-12 pr-4 font-bold text-lg focus:ring-2 focus:ring-red-500 outline-none" placeholder="••••••••" value={closeBoxPassword} onChange={(e) => setCloseBoxPassword(e.target.value)} />
                          </div>
                        </div>
                        <div className="p-6 flex gap-3 pt-0">
                          <button type="button" disabled={isProcessingClose} onClick={() => { setShowCloseBoxModal(false); setCloseBoxPassword(''); }} className="flex-1 py-3.5 rounded-xl font-bold text-gray-600 bg-gray-100 hover:bg-gray-200 disabled:opacity-50">Cancelar</button>
                          <button type="submit" disabled={isProcessingClose} className="flex-1 py-3.5 rounded-xl font-bold text-white bg-red-600 hover:bg-red-700 disabled:opacity-50"><Lock size={18} className="inline mr-2" /> {isProcessingClose ? 'Procesando...' : 'Confirmar Cierre'}</button>
                        </div>
                      </form>
                    </div>
                  </div>
                )}

                {/* Modal Usuarios */}
                {showUserModal && (
                  <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                    <div className="bg-white border border-gray-200 rounded-3xl w-full max-w-lg overflow-hidden shadow-2xl flex flex-col max-h-[90vh]">
                      <div className="p-6 border-b border-gray-100 bg-gray-50 flex-shrink-0"><h3 className="text-xl font-bold text-gray-900 flex items-center gap-2"><UserCircle className="text-indigo-600" /> {userForm.id ? 'Editar Usuario' : 'Nuevo Usuario'}</h3></div>
                      <form onSubmit={handleSaveUser} className="flex flex-col flex-1 overflow-hidden">
                        <div className="p-6 space-y-5 overflow-y-auto custom-scrollbar">
                          <div><label className="block text-sm font-bold text-gray-700 mb-1.5">Nombre Completo</label><input type="text" required className="w-full bg-white border border-gray-300 rounded-xl p-3 font-medium" value={userForm.name} onChange={(e) => setUserForm({...userForm, name: e.target.value})} /></div>
                          <div className="grid grid-cols-2 gap-4">
                            <div><label className="block text-sm font-bold text-gray-700 mb-1.5">Usuario (Login)</label><input type="text" required className="w-full bg-white border border-gray-300 rounded-xl p-3 font-medium" value={userForm.username} onChange={(e) => setUserForm({...userForm, username: e.target.value})} /></div>
                            <div><label className="block text-sm font-bold text-gray-700 mb-1.5">Contraseña</label><input type="text" required className="w-full bg-white border border-gray-300 rounded-xl p-3 font-medium" value={userForm.password} onChange={(e) => setUserForm({...userForm, password: e.target.value})} /></div>
                          </div>
                          <div><label className="block text-sm font-bold text-gray-700 mb-1.5">Rol</label><select required className="w-full bg-white border border-gray-300 rounded-xl p-3 font-medium" value={userForm.role} onChange={(e) => setUserForm({...userForm, role: e.target.value})}><option value="personal">Personal / Empleado</option><option value="admin">Administrador</option></select></div>
                          {userForm.role === 'personal' && (
                            <div className="bg-gray-50 border border-gray-200 rounded-2xl p-4 space-y-4">
                              <div><label className="block text-sm font-bold text-gray-900 mb-2">Secciones Permitidas</label>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">{SECTION_OPTIONS.map(sec => (<label key={sec.id} className="flex items-center gap-2 p-2.5 rounded-xl border bg-white cursor-pointer"><input type="checkbox" checked={userForm.allowedSections?.includes(sec.id) || false} onChange={(e) => { const current = userForm.allowedSections || []; if (e.target.checked) setUserForm({...userForm, allowedSections: [...current, sec.id]}); else setUserForm({...userForm, allowedSections: current.filter(s => s !== sec.id)}); }} className="w-4 h-4 text-indigo-600 rounded" /><span className="text-sm font-bold text-gray-700">{sec.name}</span></label>))}</div>
                              </div>
                              {userForm.allowedSections?.includes('pos') && (
                                <div><label className="block text-sm font-bold text-gray-900 mb-2">Categorías para Vender (POS)</label>
                                  <div className="grid grid-cols-2 gap-2">{categories.map(cat => (<label key={cat} className="flex items-center gap-2 p-2 rounded-lg cursor-pointer"><input type="checkbox" checked={userForm.allowedCategories?.includes(cat) || false} onChange={(e) => { const current = userForm.allowedCategories || []; if (e.target.checked) setUserForm({...userForm, allowedCategories: [...current, cat]}); else setUserForm({...userForm, allowedCategories: current.filter(c => c !== cat)}); }} className="w-4 h-4 text-indigo-600 rounded" /><span className="text-sm font-medium text-gray-600">{cat}</span></label>))}</div>
                                </div>
                              )}
                            </div>
                          )}
                        </div>
                        <div className="p-6 flex gap-3 border-t border-gray-100 bg-gray-50"><button type="button" onClick={() => setShowUserModal(false)} className="flex-1 py-3.5 rounded-xl font-bold text-gray-600 bg-gray-200">Cancelar</button><button type="submit" className="flex-1 py-3.5 rounded-xl font-bold text-white bg-indigo-600">{userForm.id ? 'Guardar Cambios' : 'Crear Usuario'}</button></div>
                      </form>
                    </div>
                  </div>
                )}

                {/* Modal Admin Generar Código de Crédito */}
                {showAdminCreditModal && (
                  <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                    <div className="bg-white border border-gray-200 rounded-3xl w-full max-w-sm overflow-hidden shadow-2xl">
                      <div className="p-6 border-b border-gray-100 bg-orange-50 flex items-center gap-2 text-orange-700">
                         <Key size={24} /> <h3 className="text-xl font-bold">Autorización de Créditos</h3>
                      </div>
                      <div className="p-6 bg-white text-center">
                        <p className="text-sm text-gray-500 font-medium mb-4">Código actual para permitir ventas a crédito en el sistema:</p>
                        <div className="text-5xl font-black text-orange-600 tracking-widest my-6 border-2 border-dashed border-orange-200 rounded-xl py-4 bg-orange-50">
                          {creditCode}
                        </div>
                        <button 
                          onClick={async () => {
                            const newCode = Math.floor(1000 + Math.random() * 9000).toString();
                            await setDoc(getDocRef('pos_settings', 'credit_auth'), { code: newCode });
                            setDialog({ type: 'alert', message: `Nuevo código generado correctamente: ${newCode}` });
                          }} 
                          className="w-full py-3.5 rounded-xl font-bold text-white bg-orange-600 hover:bg-orange-700 shadow-lg shadow-orange-600/30 transition-all mb-3"
                        >
                          Generar Nuevo Código
                        </button>
                      </div>
                      <div className="p-4 bg-gray-50 border-t border-gray-100">
                        <button onClick={() => setShowAdminCreditModal(false)} className="w-full py-3.5 rounded-xl font-bold text-gray-600 bg-gray-200 hover:bg-gray-300">Cerrar</button>
                      </div>
                    </div>
                  </div>
                )}

                {/* Alertas */}
                {dialog && (
                  <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-[100] p-4">
                    <div className="bg-white rounded-2xl shadow-2xl p-6 max-w-sm w-full text-center">
                      <div className={`w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 ${dialog.type === 'alert' ? 'bg-indigo-100' : 'bg-amber-100'}`}>
                         {dialog.type === 'alert' ? <AlertCircle size={32} className="text-indigo-600"/> : <AlertCircle size={32} className="text-amber-500"/>}
                      </div>
                      <p className="text-gray-800 font-bold mb-6">{dialog.message}</p>
                      <div className="flex gap-3">
                        {dialog.type === 'confirm' && <button onClick={() => setDialog(null)} className="flex-1 py-3 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-xl font-bold transition-colors">Cancelar</button>}
                        <button onClick={() => { if (dialog.type === 'confirm' && dialog.onConfirm) dialog.onConfirm(); setDialog(null); }} className="flex-1 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-bold transition-colors">{dialog.type === 'confirm' ? 'Confirmar' : 'Aceptar'}</button>
                      </div>
                    </div>
                  </div>
                )}
              </div>

              {/* TICKET DE IMPRESIÓN */}
              <div id="receipt-print-content" className="hidden print:block w-[80mm] bg-white text-black font-mono text-sm p-4 mx-auto">
                {lastSale && (
                  <>
                    <div className="text-center mb-2">
                       <img src="sandubai.png" alt="SANDUBAI" className="w-28 h-28 mx-auto object-contain print:grayscale" />
                    </div>
                    <div className="mb-1 text-center">Fecha: {formatDate(new Date(lastSale.date))}</div>
                    <div className="mb-1 text-center">Cajero: {lastSale.soldBy}</div>
                    <div className="mb-4 text-center">Ticket: #{lastSale.id.toUpperCase()}</div>
                    <div className="border-b border-black border-dashed mb-2"></div>
                    <table className="w-full text-left mb-2 text-sm">
                      <thead><tr><th className="pb-2">Cant</th><th className="pb-2">Descripción</th><th className="text-right pb-2">Total</th></tr></thead>
                      <tbody>{lastSale.items.map(item => (<tr key={item.id}><td className="align-top py-1">{item.quantity}</td><td className="align-top py-1 pr-2">{item.name}</td><td className="text-right align-top py-1">S/ {(item.price * item.quantity).toFixed(2)}</td></tr>))}</tbody>
                    </table>
                    <div className="border-b border-black border-dashed mb-2"></div>
                    
                    {lastSale.paymentMethod === 'dividido' ? (
                      <div className="mb-2">
                        <div className="font-bold text-xs uppercase mb-1">Pago Dividido:</div>
                        {lastSale.splitAmounts?.efectivo > 0 && <div className="flex justify-between text-xs"><span>Efectivo:</span><span>S/ {lastSale.splitAmounts.efectivo.toFixed(2)}</span></div>}
                        {lastSale.splitAmounts?.tarjeta > 0 && <div className="flex justify-between text-xs"><span>Tarjeta:</span><span>S/ {lastSale.splitAmounts.tarjeta.toFixed(2)}</span></div>}
                        {lastSale.splitAmounts?.yape > 0 && <div className="flex justify-between text-xs"><span>Yape:</span><span>S/ {lastSale.splitAmounts.yape.toFixed(2)}</span></div>}
                        {lastSale.splitAmounts?.credito > 0 && <div className="flex justify-between text-xs"><span>Crédito:</span><span>S/ {lastSale.splitAmounts.credito.toFixed(2)}</span></div>}
                      </div>
                    ) : (
                      <div className="mb-2 text-xs uppercase">
                        Pago en: {PAYMENT_METHODS.find(m => m.id === lastSale.paymentMethod)?.name || lastSale.paymentMethod}
                      </div>
                    )}
                    
                    <div className="border-b border-black border-dashed mb-2"></div>
                    <div className="flex justify-between font-black text-lg mt-2 mb-6"><span>TOTAL:</span><span>S/ {lastSale.total.toFixed(2)}</span></div>
                    <div className="text-center text-xs">¡Gracias por su preferencia!</div>
                  </>
                )}
                {lastCloseReport && (
                  <>
                    <div className="text-center mb-2">
                       <img src="sandubai.png" alt="SANDUBAI" className="w-28 h-28 mx-auto object-contain print:grayscale" />
                    </div>
                    <div className="text-center font-black text-lg mb-2 border-b border-black pb-2">REPORTE DE CIERRE</div>
                    
                    <div className="mb-1 text-xs">Apertura: {formatDate(new Date(lastCloseReport.startTime))}</div>
                    <div className="mb-3 text-xs">Cierre: {formatDate(new Date(lastCloseReport.endTime))}</div>
                    
                    <div className="border-b border-black border-dashed mb-2"></div>
                    <div className="font-bold text-center mb-2">RESUMEN GENERAL</div>
                    <div className="border-b border-black border-dashed mb-2"></div>
                    
                    <div className="flex justify-between mb-1"><span>Monto Apertura:</span><span>S/ {(lastCloseReport.initialCash || 0).toFixed(2)}</span></div>
                    <div className="flex justify-between mb-1"><span>Ventas Efectivo:</span><span>S/ {lastCloseReport.salesEfectivo.toFixed(2)}</span></div>
                    <div className="flex justify-between mb-1"><span>Tarjeta:</span><span>S/ {lastCloseReport.salesTarjeta.toFixed(2)}</span></div>
                    <div className="flex justify-between mb-1"><span>Yape:</span><span>S/ {lastCloseReport.salesYape.toFixed(2)}</span></div>
                    <div className="flex justify-between mb-3"><span>Créditos:</span><span>S/ {(lastCloseReport.salesCredito || 0).toFixed(2)}</span></div>
                    
                    <div className="border-b border-black border-dashed mb-2"></div>
                    
                    <div className="flex justify-between mb-1 font-bold"><span>Subtotal:</span><span>S/ {lastCloseReport.totalVentas.toFixed(2)}</span></div>
                    <div className="flex justify-between mb-1 font-bold"><span>Descuentos:</span><span>S/ 0.00</span></div>
                    <div className="flex justify-between font-black text-xl mt-3 mb-2"><span>TOTAL VENTAS:</span><span>S/ {lastCloseReport.totalVentas.toFixed(2)}</span></div>
                    
                    <div className="border-t border-black border-dashed pt-2 mb-6">
                      <div className="flex justify-between font-black text-lg"><span>EFECTIVO EN CAJA:</span><span>S/ {(lastCloseReport.initialCash + lastCloseReport.salesEfectivo).toFixed(2)}</span></div>
                    </div>
                    
                    {/* ZONA DE CONTROL DE BARRA (Solo se imprime si hubo stock asignado) */}
                    {lastCloseReport.assignedStock && Object.keys(lastCloseReport.assignedStock).length > 0 && (
                      <>
                        <div className="border-b border-black border-dashed mb-2 mt-4"></div>
                        <div className="font-bold text-center mb-2">CONTROL DE BARRA</div>
                        <div className="border-b border-black border-dashed mb-2"></div>
                        <table className="w-full text-left mb-6 text-[10px]">
                          <thead>
                            <tr>
                              <th className="pb-1">Producto</th>
                              <th className="pb-1 text-center">Asig.</th>
                              <th className="pb-1 text-center">Vend.</th>
                              <th className="pb-1 text-right">Queda</th>
                            </tr>
                          </thead>
                          <tbody>
                            {Object.entries(lastCloseReport.assignedStock).map(([pId, assignedQty]) => {
                              const prod = products.find(p => p.id === parseInt(pId));
                              if (!prod) return null;
                              const soldQty = lastCloseReport.soldItems?.[pId] || 0;
                              const expectedQty = assignedQty - soldQty;
                              return (
                                <tr key={pId}>
                                  <td className="py-0.5 pr-1 truncate max-w-[80px]">{prod.name}</td>
                                  <td className="py-0.5 text-center">{assignedQty}</td>
                                  <td className="py-0.5 text-center">{soldQty}</td>
                                  <td className="py-0.5 text-right font-bold">{expectedQty}</td>
                                </tr>
                              )
                            })}
                          </tbody>
                        </table>
                      </>
                    )}

                    <div className="border-b border-black border-dashed mb-8 mt-2"></div>
                    
                    <div className="text-center">
                      <div className="border-t border-black w-48 mx-auto pt-1 font-bold text-sm">Firma Responsable</div>
                      <div className="text-xs mt-2 uppercase">{lastCloseReport.closedByName}</div>
                      <div className="text-[10px] text-gray-500 uppercase">Personal de Caja</div>
                    </div>
                  </>
                )}
              </div>
            </>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<DiscotecaPOS />);
    </script>
</body>
</html>
