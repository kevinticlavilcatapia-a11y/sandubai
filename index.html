                            <p style="margin: 0; font-size: 14px; color: #555;">Del <strong>${filterStartDate}</strong> al <strong>${filterEndDate}</strong></p>
                            <p style="margin: 5px 0 0; font-size: 12px; color: #888;">Emitido: ${new Date().toLocaleString('es-PE')}</p>
                          </div>

                          <table style="width: 100%; border-collapse: collapse; margin-bottom: 30px;">
                            <thead>
                              <tr>
                                <th colspan="2" style="background: #f3f4f6; padding: 10px; text-align: left; border: 1px solid #e5e7eb; font-size: 16px;">RESUMEN DE INGRESOS</th>
                              </tr>
                            </thead>
                            <tbody>
                              <tr><td style="padding: 8px; border: 1px solid #e5e7eb; width: 50%;">Efectivo</td><td style="padding: 8px; border: 1px solid #e5e7eb; font-weight: bold;">S/ ${totalEfectivo.toFixed(2)}</td></tr>
                              <tr><td style="padding: 8px; border: 1px solid #e5e7eb;">Tarjeta (POS)</td><td style="padding: 8px; border: 1px solid #e5e7eb; font-weight: bold;">S/ ${totalTarjeta.toFixed(2)}</td></tr>
                              <tr><td style="padding: 8px; border: 1px solid #e5e7eb;">Yape</td><td style="padding: 8px; border: 1px solid #e5e7eb; font-weight: bold;">S/ ${totalYape.toFixed(2)}</td></tr>
                              <tr><td style="padding: 8px; border: 1px solid #e5e7eb;">Plin</td><td style="padding: 8px; border: 1px solid #e5e7eb; font-weight: bold;">S/ ${totalPlin.toFixed(2)}</td></tr>
                              <tr><td style="padding: 10px; border: 1px solid #e5e7eb; font-weight: bold; background: #f9fafb; font-size: 16px;">TOTAL GENERAL</td><td style="padding: 10px; border: 1px solid #e5e7eb; font-weight: bold; background: #f9fafb; font-size: 16px; color: #059669;">S/ ${totalGeneral.toFixed(2)}</td></tr>
                            </tbody>
                          </table>

                          <h3 style="margin-bottom: 15px; font-size: 16px; border-bottom: 2px solid #e5e7eb; padding-bottom: 5px;">DETALLE POR CATEGORÍA Y PRODUCTO</h3>
                      `;

                      Object.keys(productStats).sort().forEach(cat => {
                        htmlContent += `
                          <h4 style="margin: 20px 0 10px; font-size: 14px; color: #4f46e5; text-transform: uppercase;">▶ ${cat}</h4>
                          <table style="width: 100%; border-collapse: collapse; margin-bottom: 10px; font-size: 14px;">
                            <thead>
                              <tr>
                                <th style="background: #f9fafb; padding: 8px; text-align: left; border-bottom: 2px solid #e5e7eb; width: 10%;">Cant.</th>
                                <th style="background: #f9fafb; padding: 8px; text-align: left; border-bottom: 2px solid #e5e7eb;">Producto</th>
                                <th style="background: #f9fafb; padding: 8px; text-align: right; border-bottom: 2px solid #e5e7eb; width: 25%;">Total (S/)</th>
                              </tr>
                            </thead>
                            <tbody>
                        `;

                        const products = productStats[cat];
                        let catTotal = 0;
                        let catQty = 0;

                        Object.keys(products).sort().forEach(prodName => {
                          const p = products[prodName];
                          catTotal += p.total;
                          catQty += p.qty;
                          
                          htmlContent += `
                            <tr>
                              <td style="padding: 8px; border-bottom: 1px solid #f3f4f6; text-align: left;">${p.qty}</td>
                              <td style="padding: 8px; border-bottom: 1px solid #f3f4f6;">${prodName}</td>
                              <td style="padding: 8px; border-bottom: 1px solid #f3f4f6; text-align: right; font-weight: bold;">${p.total.toFixed(2)}</td>
                            </tr>
                          `;
                        });
                        
                        htmlContent += `
                            </tbody>
                            <tfoot>
                              <tr>
                                <td style="padding: 8px; font-weight: bold; background: #f9fafb; text-align: left;">${catQty}</td>
                                <td style="padding: 8px; font-weight: bold; background: #f9fafb; text-align: right;">SUBTOTAL ${cat.toUpperCase()}:</td>
                                <td style="padding: 8px; font-weight: bold; background: #f9fafb; text-align: right; color: #059669;">S/ ${catTotal.toFixed(2)}</td>
                              </tr>
                            </tfoot>
                          </table>
                        `;
                      });

                      htmlContent += `</div>`;
                      return htmlContent;
                    };

                    const handlePrintReport = () => {
                      if (filteredHistorialSales.length === 0) {
                        setDialog({ type: 'alert', message: 'No hay ventas para imprimir en este rango de fechas.' });
                        return;
                      }
                      const html = getReportDataAndHTML();
                      const printWindow = window.open('', '_blank');
                      printWindow.document.write(`
                        <html>
                          <head>
                            <title>Imprimir Reporte - San Duba</title>
                          </head>
                          <body onload="setTimeout(() => { window.print(); window.close(); }, 500);">
                            ${html}
                          </body>
                        </html>
                      `);
                      printWindow.document.close();
                    };

                    const handleExportPDF = () => {
                      if (filteredHistorialSales.length === 0) {
                        setDialog({ type: 'alert', message: 'No hay ventas para exportar en este rango de fechas.' });
                        return;
                      }
                      
                      // Usar librería html2pdf.js cargada en el <head>
                      if (window.html2pdf) {
                        const html = getReportDataAndHTML();
                        const element = document.createElement('div');
                        element.innerHTML = html;
                        
                        const opt = {
                          margin:       10,
                          filename:     `Reporte_SanDuba_${filterStartDate}_al_${filterEndDate}.pdf`,
                          image:        { type: 'jpeg', quality: 0.98 },
                          html2canvas:  { scale: 2, useCORS: true },
                          jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
                        };
                        
                        window.html2pdf().set(opt).from(element).save();
                      } else {
                        setDialog({ type: 'alert', message: 'La librería de PDF aún se está cargando, intente nuevamente en unos segundos.' });
                      }
                    };

                    return (
                      <div className="flex-1 flex flex-col gap-4 overflow-hidden">
                        {/* Panel de Filtros */}
                        <div className="bg-white p-4 rounded-2xl border border-gray-200 shadow-sm flex flex-wrap items-center gap-4">
                          <div className="flex items-center gap-2">
                            <Calendar className="text-gray-400" size={20} />
                            <span className="font-bold text-gray-700">Desde:</span>
                            <input 
                              type="date" 
                              value={filterStartDate} 
                              onChange={e => setFilterStartDate(e.target.value)} 
                              className="border border-gray-300 rounded-lg px-3 py-1.5 text-sm font-medium focus:ring-2 focus:ring-indigo-500 outline-none" 
                            />
                          </div>
                          <div className="flex items-center gap-2">
                            <span className="font-bold text-gray-700">Hasta:</span>
                            <input 
                              type="date" 
                              value={filterEndDate} 
                              onChange={e => setFilterEndDate(e.target.value)} 
                              className="border border-gray-300 rounded-lg px-3 py-1.5 text-sm font-medium focus:ring-2 focus:ring-indigo-500 outline-none" 
                            />
                          </div>
                          
                          <div className="ml-auto flex flex-wrap items-center gap-3">
                            <span className="text-sm font-bold text-gray-500 bg-gray-100 px-3 py-1.5 rounded-lg border border-gray-200 shadow-inner hidden lg:inline-block">
                              {filteredHistorialSales.length} ventas encontradas
                            </span>
                            <button 
                              onClick={handlePrintReport}
                              className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-xl font-bold flex items-center gap-2 transition-all shadow-sm shadow-blue-600/20"
                            >
                              <Printer size={18} /> Imprimir
                            </button>
                            <button 
                              onClick={handleExportPDF}
                              className="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-xl font-bold flex items-center gap-2 transition-all shadow-sm shadow-red-600/20"
                            >
                              <FileText size={18} /> PDF
                            </button>
                          </div>
                        </div>

                        {/* Área principal con Scroll */}
                        <div className="flex-1 overflow-y-auto custom-scrollbar flex flex-col gap-6 pr-2 pb-6">
                            {/* Historial de Cierres de Caja */}
                            <div className="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden flex flex-col h-full min-h-[400px]">
                               <div className="p-4 border-b border-gray-100 bg-gray-50">
                                 <h3 className="font-bold text-gray-800 flex items-center gap-2"><Lock size={16} className="text-red-500"/> Cierres de Caja en este rango</h3>
                               </div>
                               <div className="flex-1 overflow-auto custom-scrollbar">
                                  <table className="w-full text-left border-collapse">
                                    <thead className="bg-gray-100/50 text-gray-600 text-xs uppercase font-semibold sticky top-0 z-10 backdrop-blur-sm">
                                      <tr>
                                        <th className="px-5 py-3">Cajero / Fecha</th>
                                        <th className="px-5 py-3 text-center">Ventas</th>
                                        <th className="px-5 py-3 text-right">Físico Esperado</th>
                                        <th className="px-5 py-3 text-right">Ef. Declarado</th>
                                        <th className="px-5 py-3 text-right">Descuadre</th>
                                      </tr>
                                    </thead>
                                    <tbody className="divide-y divide-gray-100">
                                      {filteredReports.map(report => (
                                        <tr key={report.id} className="hover:bg-gray-50/80 transition-colors text-sm">
                                          <td className="px-5 py-3">
                                            <div className="flex flex-col gap-0.5">
                                              <span className="font-bold text-gray-800 text-xs uppercase">{report.openedBy}</span>
                                              <span className="flex items-center gap-1 text-[10px] font-bold text-emerald-600"><Unlock size={10}/> {formatDate(report.startTime)}</span>
                                              <span className="flex items-center gap-1 text-[10px] font-bold text-red-600"><Lock size={10}/> {formatDate(report.endTime)}</span>
                                            </div>
                                          </td>
                                          <td className="px-5 py-3 text-center font-bold text-gray-600">{report.totalSalesCount}</td>
                                          <td className="px-5 py-3 text-right">
                                            <div className="flex flex-col items-end">
                                              <span className="font-black text-gray-800">{formatCurrency(report.efectivoEsperado)}</span>
                                              <span className="text-[9px] text-gray-400 font-bold uppercase">Incluye fondo</span>
                                            </div>
                                          </td>
                                          <td className="px-5 py-3 text-right">
                                            <span className="font-black text-gray-800">{formatCurrency(report.efectivoDeclarado)}</span>
                                          </td>
                                          <td className="px-5 py-3 text-right">
                                            <div className={`inline-flex items-center gap-1 px-2 py-1 rounded font-black text-[11px] border ${
                                              report.descuadre === 0 
                                                ? 'bg-emerald-50 text-emerald-600 border-emerald-200' 
                                                : report.descuadre > 0 
                                                  ? 'bg-blue-50 text-blue-600 border-blue-200' 
                                                  : 'bg-red-50 text-red-600 border-red-200'
                                            }`}>
                                              {report.descuadre === 0 ? 'OK' : report.descuadre > 0 ? `+${formatCurrency(report.descuadre)}` : `-${formatCurrency(Math.abs(report.descuadre))}`}
                                            </div>
                                          </td>
                                        </tr>
                                      ))}
                                      {filteredReports.length === 0 && (
                                        <tr><td colSpan="5" className="text-center py-12 text-gray-400 font-medium">No se encontraron cierres de caja en este rango de fechas.</td></tr>
                                      )}
                                    </tbody>
                                  </table>
                               </div>
                            </div>
                        </div>
                      </div>
                    );
                  })()
                )}
              </div>
            );
          };

          const renderUsers = () => (
            <div className="p-6 h-full flex flex-col bg-gray-50 text-gray-800 overflow-hidden">
              <div className="flex justify-between items-center mb-6">
                <h2 className="text-2xl font-bold flex items-center gap-2 text-gray-900">
                  <Users className="text-indigo-600" /> Gestión de Usuarios
                </h2>
                <button 
                  onClick={() => handleOpenUserModal()}
                  className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2.5 rounded-xl font-bold flex items-center gap-2 transition-all shadow-sm shadow-indigo-600/20"
                >
                  <Plus size={18} /> Nuevo Usuario
                </button>
              </div>

              <div className="bg-white rounded-2xl overflow-hidden border border-gray-200 shadow-sm flex-1 flex flex-col">
                <div className="overflow-x-auto flex-1 custom-scrollbar">
                  <table className="w-full text-left border-collapse">
                    <thead className="bg-gray-100 text-gray-600 text-sm uppercase font-semibold sticky top-0 z-10">
                      <tr>
                        <th className="px-6 py-4">ID</th>
                        <th className="px-6 py-4">Nombre Completo</th>
                        <th className="px-6 py-4">Usuario (Login)</th>
                        <th className="px-6 py-4">Rol de Acceso</th>
                        <th className="px-6 py-4 text-right">Acciones</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-gray-100">
                      {users.map(u => (
                        <tr key={u.id} className="hover:bg-gray-50/80 transition-colors">
                          <td className="px-6 py-4 font-bold text-gray-500">#{u.id}</td>
                          <td className="px-6 py-4 font-bold text-gray-800">{u.name}</td>
                          <td className="px-6 py-4 text-gray-600 font-medium">{u.username}</td>
                          <td className="px-6 py-4">
                            <span className={`inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-bold uppercase ${u.role === 'admin' ? 'bg-purple-100 text-purple-700' : 'bg-blue-100 text-blue-700'}`}>
                              {u.role === 'admin' ? 'Administrador' : 'Personal'}
                            </span>
                          </td>
                          <td className="px-6 py-4 text-right">
                            <div className="flex items-center justify-end gap-2">
                              <button 
                                onClick={() => handleOpenUserModal(u)}
                                className="p-2 text-indigo-600 hover:bg-indigo-50 rounded-lg transition-colors"
                                title="Editar"
                              >
                                <Edit2 size={18} />
                              </button>
                              <button 
                                onClick={() => handleDeleteUser(u.id)}
                                disabled={u.id === currentUser?.id}
                                className="p-2 text-red-600 hover:bg-red-50 rounded-lg transition-colors disabled:opacity-30 disabled:cursor-not-allowed"
                                title="Eliminar"
                              >
                                <Trash2 size={18} />
                              </button>
                            </div>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          );

          const renderLoginScreen = () => (
            <div className="flex h-screen w-full bg-gray-900 items-center justify-center p-4 selection:bg-indigo-500/30">
              <div className="bg-white rounded-3xl shadow-2xl overflow-hidden w-full max-w-4xl flex flex-col md:flex-row relative">
                <div className="md:w-1/2 bg-indigo-600 p-12 flex flex-col justify-center items-center text-white relative overflow-hidden min-h-[400px]">
                  <div className="absolute top-0 left-0 w-full h-full opacity-10 pointer-events-none">
                    <Wine size={300} className="absolute -left-10 -top-10" />
                    <Beer size={200} className="absolute right-10 bottom-10" />
                  </div>
                  <img 
                    src="icon-512 (1).png" 
                    alt="Logo San Duba" 
                    className="w-32 h-32 object-contain rounded-full border-4 border-white/20 shadow-xl mb-6 relative z-10 bg-white"
                    onError={(e) => {
                      e.target.onerror = null;
                      e.target.src = 'https://ui-avatars.com/api/?name=SD&background=4f46e5&color=fff&rounded=true';
                    }}
                  />
                  <h1 className="text-4xl font-black tracking-wider text-center mb-2 relative z-10">SAN DUBA</h1>
                  <p className="text-indigo-200 font-bold tracking-widest uppercase text-sm relative z-10">Terraza Club</p>
                </div>
                <div className="md:w-1/2 p-12 flex flex-col justify-center bg-gray-50 relative">
                  
                  {/* Indicador de Nube en el Login */}
                  <div className="absolute top-6 right-6 flex items-center gap-2">
                    {!sysAuthUser ? (
                      <span className="flex items-center gap-1.5 text-xs font-bold text-amber-500 bg-amber-50 px-3 py-1.5 rounded-full border border-amber-200">
                        <CloudOff size={14}/> Conectando BD...
                      </span>
                    ) : (
                      <span className="flex items-center gap-1.5 text-xs font-bold text-emerald-500 bg-emerald-50 px-3 py-1.5 rounded-full border border-emerald-200">
                        <Cloud size={14}/> Sincronizado
                      </span>
                    )}
                  </div>

                  <div className="mb-8 mt-4">
                    <h2 className="text-2xl font-black text-gray-900 mb-1">Iniciar Sesión</h2>
                    <p className="text-gray-500 font-medium text-sm">Ingresa tus credenciales para acceder al POS.</p>
                  </div>
                  <form onSubmit={handleLogin} className="space-y-5">
                    <div>
                      <label className="block text-sm font-bold text-gray-700 mb-1.5">Usuario</label>
                      <div className="relative">
                        <UserCircle className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" size={20} />
                        <input 
                          type="text" 
                          required 
                          disabled={!sysAuthUser || isSyncing && users.length === 0}
                          className="w-full bg-white border border-gray-300 rounded-xl py-3 pl-10 pr-4 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all font-medium disabled:bg-gray-100 disabled:text-gray-400" 
                          placeholder="ej. admin" 
                          value={loginForm.username} 
                          onChange={(e) => setLoginForm({...loginForm, username: e.target.value})} 
                        />
                      </div>
                    </div>
                    <div>
                      <label className="block text-sm font-bold text-gray-700 mb-1.5">Contraseña</label>
                      <div className="relative">
                        <Key className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" size={20} />
                        <input 
                          type="password" 
                          required 
                          disabled={!sysAuthUser || isSyncing && users.length === 0}
                          className="w-full bg-white border border-gray-300 rounded-xl py-3 pl-10 pr-4 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all font-medium disabled:bg-gray-100 disabled:text-gray-400" 
                          placeholder="••••••••" 
                          value={loginForm.password} 
                          onChange={(e) => setLoginForm({...loginForm, password: e.target.value})} 
                        />
                      </div>
                    </div>
                    <button 
                      type="submit" 
                      disabled={!sysAuthUser || isSyncing && users.length === 0}
                      className="w-full py-3.5 rounded-xl font-bold text-white bg-indigo-600 hover:bg-indigo-700 shadow-lg shadow-indigo-600/30 transition-all mt-4 disabled:bg-indigo-400 disabled:shadow-none"
                    >
                      {!sysAuthUser ? 'Conectando...' : 'Ingresar al Sistema'}
                    </button>
                  </form>
                  <div className="mt-6 text-center text-xs font-bold text-gray-500 bg-gray-200/50 p-4 rounded-xl border border-gray-200">
                    <p className="mb-2 uppercase tracking-wide">Credenciales de Prueba:</p>
                    <div className="grid grid-cols-2 gap-2 text-left">
                      <div className="bg-white p-2 rounded border border-gray-200"><span className="text-indigo-600">Admin:</span> admin / 123</div>
                      <div className="bg-white p-2 rounded border border-gray-200"><span className="text-blue-600">Cajero:</span> barras / 123</div>
                      <div className="bg-white p-2 rounded border border-gray-200 col-span-2"><span className="text-emerald-600">Almacén (Solo Ingresos):</span> almacen / 123</div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          );

          if (!currentUser) {
            return (
              <>
                {renderLoginScreen()}
                {dialog && (
                  <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-[100] p-4">
                    <div className="bg-white rounded-2xl shadow-2xl p-6 max-w-sm w-full text-center">
                      <div className={`w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 ${dialog.type === 'alert' ? 'bg-indigo-100' : 'bg-amber-100'}`}>
                         {dialog.type === 'alert' ? <AlertCircle size={32} className="text-indigo-600"/> : <AlertCircle size={32} className="text-amber-500"/>}
                      </div>
                      <p className="text-gray-800 font-bold mb-6">{dialog.message}</p>
                      <div className="flex gap-3">
                        {dialog.type === 'confirm' && (
                          <button onClick={() => setDialog(null)} className="flex-1 py-3 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-xl font-bold transition-colors">Cancelar</button>
                        )}
                        <button 
                          onClick={() => { if (dialog.type === 'confirm' && dialog.onConfirm) dialog.onConfirm(); setDialog(null); }} 
                          className="flex-1 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-bold transition-colors"
                        >
                          {dialog.type === 'confirm' ? 'Confirmar' : 'Aceptar'}
                        </button>
                      </div>
                    </div>
                  </div>
                )}
              </>
            );
          }

          return (
            <div className="flex h-screen w-full bg-gray-50 font-sans text-gray-900 selection:bg-indigo-100 selection:text-indigo-900">
              
              {/* Sidebar Claro */}
              <div className="w-20 lg:w-64 bg-white border-r border-gray-200 flex flex-col z-20 shadow-sm">
                <div className="h-24 flex items-center justify-center lg:justify-start lg:px-6 border-b border-gray-100">
                  <img 
                    src="icon-512 (1).png" 
                    alt="Logo San Duba Terraza Club" 
                    className="w-14 h-14 object-contain rounded-full border border-gray-100 shadow-sm"
                    onError={(e) => {
                      e.target.onerror = null;
                      e.target.src = 'https://ui-avatars.com/api/?name=SD&background=4f46e5&color=fff&rounded=true';
                    }}
                  />
                  <div className="hidden lg:block ml-3 flex flex-col">
                    <h1 className="font-black text-lg tracking-wider text-gray-900 leading-none">SAN DUBA</h1>
                    <span className="text-[10px] font-bold text-gray-500 tracking-widest uppercase mt-0.5">Terraza Club</span>
                  </div>
                </div>
                
                <nav className="flex-1 py-6 flex flex-col gap-2 px-3 overflow-y-auto custom-scrollbar">
                  {[
                    { id: 'pos', name: 'Punto de Venta', icon: ShoppingCart, hideAdmin: true },
                    { id: 'inventory', name: 'Inventario', icon: Package },
                    { id: 'purchases', name: 'Compras', icon: ShoppingBag },
                    { id: 'expenses', name: 'Egresos', icon: TrendingDown },
                    { id: 'sales', name: 'Reportes y Ventas', icon: History },
                    { id: 'users', name: 'Usuarios', icon: Users, adminOnly: true },
                  ]
                  .filter(tab => {
                     if (currentUser.role === 'admin') return !tab.hideAdmin;
                     if (tab.adminOnly) return false;
                     return currentUser.allowedSections?.includes(tab.id);
                  })
                  .map(tab => {
                    const Icon = tab.icon;
                    const isActive = activeTab === tab.id;
                    return (
                      <button
                        key={tab.id}
                        onClick={() => setActiveTab(tab.id)}
                        className={`flex items-center p-3 rounded-xl transition-all duration-200 group ${
                          isActive 
                            ? 'bg-indigo-50 text-indigo-700 border border-indigo-100 font-bold' 
                            : 'text-gray-500 hover:bg-gray-50 hover:text-gray-900 border border-transparent font-semibold'
                        }`}
                      >
                        <Icon size={24} className={isActive ? 'text-indigo-600' : 'text-gray-400 group-hover:text-indigo-500'} />
                        <span className="hidden lg:block ml-3">{tab.name}</span>
                      </button>
                    )
                  })}
                </nav>

                {/* Indicador Status de Caja y Usuario (Sidebar Bottom) */}
                <div className="p-4 border-t border-gray-100 flex flex-col gap-3">
                  <div className="flex items-center gap-3 p-2">
                     <div className="w-10 h-10 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-700 font-black uppercase shadow-sm">
                       {currentUser.name.charAt(0)}
                     </div>
                     <div className="hidden lg:block overflow-hidden">
                       <div className="text-sm font-bold text-gray-900 truncate leading-tight">{currentUser.name}</div>
                       <div className="text-[10px] font-bold text-gray-500 uppercase tracking-widest">{currentUser.role === 'admin' ? 'Administrador' : 'Personal'}</div>
                     </div>
                  </div>

                  {currentUser.role !== 'admin' && (
                    <>
                      <div className={`p-3 rounded-xl flex items-center justify-between ${boxSession ? 'bg-emerald-50 border border-emerald-100' : 'bg-red-50 border border-red-100'}`}>
                        <div className="flex items-center gap-3">
                          <div className={`w-8 h-8 rounded-full flex items-center justify-center ${boxSession ? 'bg-emerald-100 text-emerald-600' : 'bg-red-100 text-red-600'}`}>
                            {boxSession ? <Unlock size={16}/> : <Lock size={16}/>}
                          </div>
                          <div className="hidden lg:block">
                            <div className={`text-xs font-bold uppercase tracking-wide ${boxSession ? 'text-emerald-700' : 'text-red-700'}`}>
                              {boxSession ? 'Caja Abierta' : 'Caja Cerrada'}
                            </div>
                            {boxSession && <div className="text-[10px] text-emerald-600 font-medium">Sincronizada</div>}
                          </div>
                        </div>
                      </div>

                      {boxSession && (
                         <button
                           onClick={() => setShowCloseBoxModal(true)}
                           className="w-full flex items-center justify-center gap-2 p-3 rounded-xl text-white bg-red-600 hover:bg-red-700 shadow-md shadow-red-600/20 transition-all font-bold"
                         >
                           <Lock size={18} />
                           <span className="hidden lg:inline">Cerrar Caja</span>
                         </button>
                      )}
                    </>
                  )}

                  <button
                    onClick={handleLogout}
                    className="w-full flex items-center justify-center gap-2 p-3 rounded-xl text-gray-500 hover:bg-gray-200 hover:text-gray-700 transition-colors font-bold border border-transparent"
                  >
                    <LogOut size={18} />
                    <span className="hidden lg:inline">Cerrar Sesión</span>
                  </button>
                </div>
              </div>

              {/* Main Content */}
              <main className="flex-1 relative">
                {activeTab === 'pos' && renderPOS()}
                {activeTab === 'inventory' && renderInventory()}
                {activeTab === 'purchases' && renderPurchases()}
                {activeTab === 'expenses' && renderExpenses()}
                {activeTab === 'sales' && renderSales()}
                {activeTab === 'users' && currentUser.role === 'admin' && renderUsers()}
              </main>

              {/* Modales de la Aplicación */}
              {showPaymentModal && (
                <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                  <div className="bg-white border border-gray-200 rounded-3xl w-full max-w-md overflow-hidden shadow-2xl">
                    <div className="p-8 text-center border-b border-gray-100 bg-gray-50">
                      <h3 className="text-lg font-bold text-gray-500 mb-2 uppercase tracking-wide">Total a Cobrar</h3>
                      <div className="text-5xl font-black text-gray-900">{formatCurrency(cartTotal)}</div>
                    </div>
                    <div className="p-8">
                      <p className="text-gray-500 mb-6 text-center text-sm font-semibold">Selecciona el método de pago</p>
                      <div className="grid grid-cols-2 gap-4">
                        {PAYMENT_METHODS.map(method => {
                          const Icon = method.icon;
                          return (
                            <button
                              key={method.id}
                              onClick={() => handleCheckout(method.id)}
                              className={`${method.color} hover:brightness-110 text-white p-5 rounded-2xl flex flex-col items-center justify-center gap-3 transition-all active:scale-95 shadow-md`}
                            >
                              <Icon size={32} />
                              <span className="font-bold">{method.name}</span>
                            </button>
                          )
                        })}
                      </div>
                    </div>
                    <div className="p-4 bg-gray-50">
                      <button 
                        onClick={() => setShowPaymentModal(false)}
                        className="w-full py-3.5 rounded-xl font-bold text-gray-600 hover:bg-gray-200 transition-colors"
                      >
                        Cancelar
                      </button>
                    </div>
                  </div>
                </div>
              )}

              {/* Modal de Compras (Facturas/Boletas) */}
              {showPurchaseModal && (
                <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                  <div className="bg-white border border-gray-200 rounded-3xl w-full max-w-2xl overflow-hidden shadow-2xl flex flex-col max-h-[90vh]">
                    <div className="p-6 border-b border-gray-100 bg-gray-50 flex-shrink-0">
                      <h3 className="text-xl font-bold text-gray-900 flex items-center gap-2">
                        <ShoppingBag className="text-emerald-600" /> Registrar Compra de Mercadería
                      </h3>
                    </div>
                    
                    <div className="flex flex-col flex-1 overflow-hidden">
                      <div className="p-6 space-y-5 overflow-y-auto custom-scrollbar">
                        {/* Datos del Comprobante */}
                        <div className="bg-gray-50 p-4 rounded-xl border border-gray-200 grid grid-cols-1 md:grid-cols-3 gap-4">
                           <div className="md:col-span-1">
                             <label className="block text-xs font-bold text-gray-700 mb-1">Tipo Doc.</label>
                             <select 
                               className="w-full bg-white border border-gray-300 rounded-lg p-2 text-gray-900 focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm"
                               value={purchaseForm.docType}
                               onChange={(e) => setPurchaseForm({...purchaseForm, docType: e.target.value})}
                             >
                               <option value="Factura">Factura</option>
                               <option value="Boleta">Boleta</option>
                               <option value="Nota de Venta">Nota de Venta</option>
                             </select>
                           </div>
                           <div className="md:col-span-1">
                             <label className="block text-xs font-bold text-gray-700 mb-1">Nº Documento</label>

                               type="text"

                               placeholder="F001-00123"

                               onChange={(e) => setPurchaseForm({...purchaseForm, docNumber: e.target.value})}
                             />

                             <label className="block text-xs font-bold text-gray-700 mb-1">Proveedor / RUC</label>

                               type="text" 
                               required
                               placeholder="Distribuidora S.A."

                               value={purchaseForm.provider}
                               onChange={(e) => setPurchaseForm({...purchaseForm, provider: e.target.value})}

                                onChange={(e) => setPurchaseItemTemp({...purchaseItemTemp, productId: e.target.value})}
                              >
                                <option value="">- Seleccione producto -</option>
                                {products.map(p => (
                                  <option key={p.id} value={p.id}>{p.name} (Cat: {p.category})</option>
                                ))}
                              </select>
                            </div>

                              <label className="block text-xs font-bold text-gray-700 mb-1">Cant.</label>
                              <input 
                                type="number" min="1"
                                className="w-full bg-white border border-gray-300 rounded-lg p-2 text-gray-900 focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm"
                                value={purchaseItemTemp.qty}
                                onChange={(e) => setPurchaseItemTemp({...purchaseItemTemp, qty: e.target.value})}
                              />
                            </div>
                            <div className="w-24">
                              <label className="block text-xs font-bold text-gray-700 mb-1">Costo (U)</label>
                              <input 
                                type="number" step="0.10" min="0" placeholder="0.00"
                                className="w-full bg-white border border-gray-300 rounded-lg p-2 text-gray-900 focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm"
                                value={purchaseItemTemp.cost}
                                onChange={(e) => setPurchaseItemTemp({...purchaseItemTemp, cost: e.target.value})}
                              />
                            </div>
                            <button 
                              type="button"
                              onClick={handleAddPurchaseItem}
                              className="bg-gray-800 hover:bg-gray-900 text-white p-2 rounded-lg transition-colors shadow-sm"
                            >
                              <Plus size={20} />
                            </button>
                          </div>
                        </div>

                        {/* Lista de Productos Agregados */}
                        {purchaseForm.items.length > 0 && (
                          <div className="border border-emerald-200 rounded-xl overflow-hidden shadow-sm">
                            <table className="w-full text-left text-sm">
                              <thead className="bg-emerald-50 text-emerald-800 font-bold">
                                <tr>
                                  <th className="px-3 py-2">Producto</th>
                                  <th className="px-3 py-2 text-center">Cant</th>
                                  <th className="px-3 py-2 text-right">Costo U.</th>
                                  <th className="px-3 py-2 text-right">Subtotal</th>
                                  <th className="px-3 py-2 text-center"></th>
                                </tr>
                              </thead>
                              <tbody className="divide-y divide-gray-100 bg-white">
                                {purchaseForm.items.map((item, idx) => (
                                  <tr key={idx}>
                                    <td className="px-3 py-2 text-gray-800">{item.productName}</td>
                                    <td className="px-3 py-2 text-center font-bold text-emerald-600">+{item.qty}</td>
                                    <td className="px-3 py-2 text-right text-gray-500">{formatCurrency(item.cost)}</td>
                                    <td className="px-3 py-2 text-right font-black text-gray-800">{formatCurrency(item.qty * item.cost)}</td>
                                    <td className="px-3 py-2 text-center">
                                      <button onClick={() => handleRemovePurchaseItem(idx)} className="text-red-500 hover:bg-red-50 p-1 rounded transition-colors"><Trash2 size={16}/></button>
                                    </td>
                                  </tr>
                                ))}
                              </tbody>
                            </table>
                            <div className="bg-gray-50 p-3 text-right border-t border-gray-200">
                               <span className="text-gray-500 font-bold mr-3">TOTAL COMPRA:</span>
                               <span className="text-2xl font-black text-rose-600">
                                 {formatCurrency(purchaseForm.items.reduce((sum, item) => sum + (item.qty * item.cost), 0))}
                               </span>
                            </div>
                          </div>
                        )}
                      </div>

                      <div className="p-6 flex gap-3 border-t border-gray-100 bg-gray-50 flex-shrink-0">
                        <button 
                          type="button"
                          onClick={() => setShowPurchaseModal(false)}
                          className="flex-1 py-3.5 rounded-xl font-bold text-gray-600 bg-gray-200 hover:bg-gray-300 transition-colors"
                        >
                          Cancelar
                        </button>
                        <button 
                          type="button"
                          onClick={handleSavePurchase}
                          className="flex-1 py-3.5 rounded-xl font-bold text-white bg-emerald-600 hover:bg-emerald-700 shadow-lg shadow-emerald-600/30 transition-all flex justify-center items-center gap-2"
                        >
                          <ShoppingBag size={18}/> Guardar y Actualizar Stock
                        </button>
                      </div>
                    </div>
                  </div>
                </div>
              )}

              {/* Modal de Egresos */}
              {showExpenseModal && (

                  <div className="bg-white border border-gray-200 rounded-3xl w-full max-w-sm overflow-hidden shadow-2xl">
                    <div className="p-6 border-b border-gray-100 bg-gray-50">
                      <h3 className="text-xl font-bold text-gray-900 flex items-center gap-2">
                        <TrendingDown className="text-rose-600" /> Registrar Egreso
                      </h3>
                    </div>
                    <form onSubmit={handleSaveExpense} className="p-6 space-y-5">

                      <div>
                        <label className="block text-sm font-bold text-gray-700 mb-1.5">Descripción / Destino</label>
                        <input 
                          type="text" 
                          required
                          className="w-full bg-white border border-gray-300 rounded-xl p-3 text-gray-900 focus:outline-none focus:ring-2 focus:ring-rose-500 focus:border-transparent font-medium"
                          value={expenseForm.description}
                          onChange={(e) => setExpenseForm({...expenseForm, description: e.target.value})}
                          placeholder="Ej: Pago personal de limpieza, Compra hielo..."
                        />
                      </div>

                      <div>
                        <label className="block text-sm font-bold text-gray-700 mb-1.5">Monto (S/)</label>
                        <input 
                          type="number" 
                          step="0.10"
                          min="0.1"
                          required
                          className="w-full bg-white border border-gray-300 rounded-xl p-3 text-gray-900 focus:outline-none focus:ring-2 focus:ring-rose-500 focus:border-transparent font-medium"
                          value={expenseForm.amount}
                          onChange={(e) => setExpenseForm({...expenseForm, amount: e.target.value})}
                          placeholder="0.00"
                        />
                      </div>

                      <div className="flex gap-3 pt-4">
                        <button 
                          type="button"
                          onClick={() => setShowExpenseModal(false)}
                          className="flex-1 py-3.5 rounded-xl font-bold text-gray-600 bg-gray-100 hover:bg-gray-200 transition-colors"
                        >
                          Cancelar
                        </button>
                        <button 
                          type="submit"
                          className="flex-1 py-3.5 rounded-xl font-bold text-white bg-rose-600 hover:bg-rose-700 shadow-lg shadow-rose-600/30 transition-all"
                        >
                          Registrar
                        </button>
                      </div>
                    </form>
                  </div>
                </div>
              )}

                      <h3 className="text-xl font-bold text-gray-900 flex items-center gap-2">
                        <Edit2 className="text-gray-600" /> Ajuste de Stock Manual
                      </h3>
                    </div>
                    <form onSubmit={handleAddStock} className="p-6 space-y-5">
                      <div className="bg-amber-50 p-3 rounded-xl border border-amber-200 flex items-start gap-2 text-amber-800 text-xs font-bold mb-4">

                        <p>Usa esto solo para corregir diferencias o mermas. Para compras reales con factura, usa el módulo "Compras".</p>
                      </div>

                      <div>
                        <label className="block text-sm font-bold text-gray-700 mb-1.5">Producto a ajustar</label>
                        <select 
                          required
                          className="w-full bg-white border border-gray-300 rounded-xl p-3 text-gray-900 focus:outline-none focus:ring-2 focus:ring-gray-500 focus:border-transparent font-medium"
                          value={stockForm.productId}
                          onChange={(e) => setStockForm({...stockForm, productId: e.target.value})}
                        >
                          <option value="">-- Seleccionar Producto --</option>
                          {products.map(p => (
                            <option key={p.id} value={p.id}>{p.name} (Stock: {p.stock})</option>

                        </select>
                      </div>

                      <div>
                        <label className="block text-sm font-bold text-gray-700 mb-1.5">Cantidad a sumar</label>
                        <input 
                          type="number" 
                          min="1"
                          required
                          className="w-full bg-white border border-gray-300 rounded-xl p-3 text-gray-900 focus:outline-none focus:ring-2 focus:ring-gray-500 focus:border-transparent font-medium"
                          value={stockForm.quantity}
                          onChange={(e) => setStockForm({...stockForm, quantity: e.target.value})}
                        />
                      </div>

                      <div>
                        <label className="block text-sm font-bold text-gray-700 mb-1.5">Motivo del ajuste</label>
                        <input 
                          type="text" 
                          required
                          className="w-full bg-white border border-gray-300 rounded-xl p-3 text-gray-900 focus:outline-none focus:ring-2 focus:ring-gray-500 focus:border-transparent font-medium"
                          value={stockForm.reason}
                          onChange={(e) => setStockForm({...stockForm, reason: e.target.value})}
                          placeholder="Ej: Sobrante de inventario, Regalo..."
                        />
                      </div>

                      <div className="flex gap-3 pt-4">
                        <button 
                          type="button"
                          onClick={() => setShowStockModal(false)}
                          className="flex-1 py-3.5 rounded-xl font-bold text-gray-600 bg-gray-100 hover:bg-gray-200 transition-colors"
                        >
                          Cancelar
                        </button>
                        <button 
                          type="submit"
                          className="flex-1 py-3.5 rounded-xl font-bold text-white bg-gray-800 hover:bg-gray-900 shadow-lg transition-all"
                        >
                          Ajustar
                        </button>
                      </div>
                    </form>
                  </div>
                </div>
              )}

                <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                  <div className="bg-white border border-gray-200 rounded-3xl w-full max-w-lg overflow-hidden shadow-2xl">
                    <div className="p-6 border-b border-gray-100 bg-gray-50">
                      <h3 className="text-xl font-bold text-gray-900 flex items-center gap-2">
                        <Package className="text-indigo-600" /> 
                        {productForm.id ? 'Editar Producto' : 'Nuevo Producto'}
                      </h3>
                    </div>
                    <form onSubmit={handleSaveProduct} className="p-6 space-y-4">
                      
                      <div>
                        <label className="block text-sm font-bold text-gray-700 mb-1.5">Nombre del Producto</label>
                        <input 
                          type="text" 
                          required
                          className="w-full bg-white border border-gray-300 rounded-xl p-3 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent font-medium"
                          value={productForm.name}
                          onChange={(e) => setProductForm({...productForm, name: e.target.value})}
                          placeholder="Ej: Cerveza Cristal 650ml"
                        />
                      </div>

                      <div className="grid grid-cols-2 gap-4">
                        <div>
                          <label className="block text-sm font-bold text-gray-700 mb-1.5">Categoría</label>
                          <select 
                            required
                            className="w-full bg-white border border-gray-300 rounded-xl p-3 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent font-medium"
                            value={productForm.category}
                            onChange={(e) => setProductForm({...productForm, category: e.target.value})}
                          >
                            <option value="" disabled>Seleccione...</option>
                            {categories.map(cat => (
                              <option key={cat} value={cat}>{cat}</option>
                            ))}
                          </select>
                        </div>
                        <div>
                          <label className="block text-sm font-bold text-gray-700 mb-1.5">Precio de Venta (S/)</label>
                          <input 
                            type="number" 
                            step="0.10"
                            min="0"
                            required
                            className="w-full bg-white border border-gray-300 rounded-xl p-3 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent font-medium"
                            value={productForm.price}
                            onChange={(e) => setProductForm({...productForm, price: e.target.value})}
                            placeholder="0.00"
                          />
                        </div>
                      </div>

                      <div className="grid grid-cols-2 gap-4">
                        <div>
                          <label className="block text-sm font-bold text-gray-700 mb-1.5">Stock Inicial</label>
                          <input 
                            type="number" 
                            min="0"
                            required={!productForm.id}
                            disabled={!!productForm.id} 
                            className="w-full bg-white border border-gray-300 rounded-xl p-3 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent font-medium disabled:bg-gray-100 disabled:text-gray-500"
                            value={productForm.stock}
                            onChange={(e) => setProductForm({...productForm, stock: e.target.value})}
                            placeholder="0"
                          />
                          {!!productForm.id && <p className="text-[10px] text-gray-500 mt-1 leading-tight">Para ingresar más stock, usa el módulo "Compras".</p>}

                          <label className="block text-sm font-bold text-gray-700 mb-1.5">URL de Imagen</label>
                          <input 
                            type="url" 
                            className="w-full bg-white border border-gray-300 rounded-xl p-3 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent font-medium"
                            value={productForm.image}
                            onChange={(e) => setProductForm({...productForm, image: e.target.value})}
                            placeholder="https://..."
                          />
                          <p className="text-[10px] text-gray-500 mt-1 leading-tight">Dejar vacío para auto-generar miniatura.</p>
                        </div>
                      </div>

                      <div className="flex gap-3 pt-4">
                        <button 
                          type="button"
                          onClick={() => setShowProductModal(false)}
                          className="flex-1 py-3.5 rounded-xl font-bold text-gray-600 bg-gray-100 hover:bg-gray-200 transition-colors"
                        >
                          Cancelar
                        </button>
                        <button 
                          type="submit"
                          className="flex-1 py-3.5 rounded-xl font-bold text-white bg-indigo-600 hover:bg-indigo-700 shadow-lg shadow-indigo-600/30 transition-all"
                        >
                          {productForm.id ? 'Guardar Cambios' : 'Crear Producto'}
                        </button>
                      </div>
                    </form>
                  </div>
                </div>
              )}

              {showCategoryModal && (
                <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">

                    <div className="p-6 border-b border-gray-100 bg-gray-50 flex justify-between items-center">
                      <h3 className="text-xl font-bold text-gray-900 flex items-center gap-2">
                        <Tags className="text-indigo-600" /> Categorías
                      </h3>
                    </div>
                    
                    <div className="p-6 overflow-y-auto custom-scrollbar flex-1">
                      <form onSubmit={handleAddCategory} className="flex gap-2 mb-6">
                        <input 
                          type="text" 
                          required
                          placeholder="Nueva categoría..."
                          className="flex-1 bg-white border border-gray-300 rounded-xl px-4 py-2 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 font-medium"
                          value={newCategoryName}
                          onChange={(e) => setNewCategoryName(e.target.value)}
                        />
                        <button type="submit" className="bg-indigo-600 hover:bg-indigo-700 text-white p-2.5 rounded-xl transition-all shadow-sm">
                          <Plus size={20} />
                        </button>
                      </form>

                      <div className="space-y-2">
                        {categories.map(cat => (
                          <div key={cat} className="flex justify-between items-center p-3 bg-gray-50 border border-gray-100 rounded-xl">
                            <span className="font-bold text-gray-700">{cat}</span>
                            <button 
                              onClick={() => handleDeleteCategory(cat)}
                              className="text-gray-400 hover:text-red-500 transition-colors p-1"
                              title="Eliminar Categoría"
                            >
                              <Trash2 size={16} />
                            </button>
                          </div>
                        ))}
                      </div>
                    </div>

                    <div className="p-4 bg-gray-50 border-t border-gray-100">
                      <button 
                        onClick={() => setShowCategoryModal(false)}
                        className="w-full py-3 rounded-xl font-bold text-gray-600 bg-gray-200 hover:bg-gray-300 transition-colors"
                      >
                        Cerrar
                      </button>
                    </div>
                  </div>
                </div>
              )}

              {showCloseBoxModal && boxSession && (
                <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                  <div className="bg-white border border-gray-200 rounded-3xl w-full max-w-md overflow-hidden shadow-2xl">
                    <div className="p-8 text-center border-b border-gray-100 bg-red-50">
                      <div className="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
                        <AlertCircle size={32} className="text-red-600" />
                      </div>
                      <h3 className="text-xl font-black text-gray-900 mb-2">Cierre de Caja</h3>
                      <p className="text-gray-600 font-medium">Cuenta todo el efectivo que tienes en físico e ingrésalo a continuación.</p>
                    </div>
                    
                    <form onSubmit={handleCloseBox}>
                      <div className="p-6">
                        <label className="block text-sm font-bold text-gray-700 mb-2">Efectivo Declarado (Billetes y Monedas)</label>

                          <span className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 font-bold">S/</span>
                          <input 
                            type="number" 
                            step="0.10"
                            min="0"
                            required
                            autoFocus
                            className="w-full bg-white border border-gray-300 rounded-xl py-3 pl-10 pr-4 text-gray-900 font-bold text-lg focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent transition-all"
                            value={declaredCashForm}
                            onChange={(e) => setDeclaredCashForm(e.target.value)}
                            placeholder="0.00"
                          />
                        </div>
                        <p className="text-xs text-gray-500 mt-2 font-medium">Este valor se guardará en el reporte para cuadrar caja.</p>
                      </div>

                      <div className="p-6 flex gap-3 pt-0">
                        <button 
                          type="button"
                          onClick={() => {
                            setShowCloseBoxModal(false);
                            setDeclaredCashForm('');
                          }}
                          className="flex-1 py-3.5 rounded-xl font-bold text-gray-600 bg-gray-100 hover:bg-gray-200 transition-colors"
                        >
                          Cancelar
                        </button>
                        <button 
                          type="submit"
                          className="flex-1 py-3.5 rounded-xl font-bold text-white bg-red-600 hover:bg-red-700 shadow-lg shadow-red-600/30 transition-all flex justify-center items-center gap-2"
                        >
                          <Lock size={18}/> Cerrar Turno
                        </button>
                      </div>
                    </form>
                  </div>
                </div>

              {showUserModal && (
                <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">

                    <div className="p-6 border-b border-gray-100 bg-gray-50 flex-shrink-0">
                      <h3 className="text-xl font-bold text-gray-900 flex items-center gap-2">
                        <UserCircle className="text-indigo-600" /> 
                        {userForm.id ? 'Editar Usuario' : 'Nuevo Usuario'}
                      </h3>
                    </div>
                    
                    <form onSubmit={handleSaveUser} className="flex flex-col flex-1 overflow-hidden">
                      <div className="p-6 space-y-5 overflow-y-auto custom-scrollbar">
                        <div>
                          <label className="block text-sm font-bold text-gray-700 mb-1.5">Nombre Completo</label>
                          <input 
                            type="text" 
                            required
                            className="w-full bg-white border border-gray-300 rounded-xl p-3 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 font-medium"
                            value={userForm.name}
                            onChange={(e) => setUserForm({...userForm, name: e.target.value})}
                            placeholder="Ej: Juan Pérez"
                          />
                        </div>

                        <div className="grid grid-cols-2 gap-4">
                          <div>
                            <label className="block text-sm font-bold text-gray-700 mb-1.5">Usuario (Login)</label>
                            <input 
                              type="text" 
                              required
                              className="w-full bg-white border border-gray-300 rounded-xl p-3 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 font-medium"
                              value={userForm.username}
                              onChange={(e) => setUserForm({...userForm, username: e.target.value})}
                              placeholder="Ej: jperez"
                            />
                          </div>
                          <div>
                            <label className="block text-sm font-bold text-gray-700 mb-1.5">Contraseña</label>
                            <input 
                              type="text" 
                              required

                              value={userForm.password}
                              onChange={(e) => setUserForm({...userForm, password: e.target.value})}
                              placeholder="Contraseña"
                            />
                          </div>
                        </div>

                        <div>
                          <label className="block text-sm font-bold text-gray-700 mb-1.5">Nivel de Acceso</label>

                            required
                            className="w-full bg-white border border-gray-300 rounded-xl p-3 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 font-medium"
                            value={userForm.role}
                            onChange={(e) => setUserForm({...userForm, role: e.target.value})}
                          >
                            <option value="personal">Personal / Empleado (Permisos a medida)</option>
                            <option value="admin">Administrador (Acceso Total a Todo)</option>
                          </select>
                        </div>

                        {userForm.role === 'personal' && (
                          <div className="bg-gray-50 border border-gray-200 rounded-2xl p-4 space-y-4">
                            <div>
                              <label className="block text-sm font-bold text-gray-900 mb-2 border-b border-gray-200 pb-2">Secciones Permitidas</label>
                              <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                                {SECTION_OPTIONS.map(sec => (
                                  <label key={sec.id} className={`flex items-center gap-2 p-2.5 rounded-xl border cursor-pointer transition-colors ${userForm.allowedSections?.includes(sec.id) ? 'bg-indigo-50 border-indigo-200' : 'bg-white border-gray-200 hover:bg-gray-100'}`}>
                                    <input
                                      type="checkbox"
                                      checked={userForm.allowedSections?.includes(sec.id) || false}
                                      onChange={(e) => {
                                        const current = userForm.allowedSections || [];
                                        if (e.target.checked) setUserForm({...userForm, allowedSections: [...current, sec.id]});
                                        else setUserForm({...userForm, allowedSections: current.filter(s => s !== sec.id)});
                                      }}
                                      className="w-4 h-4 text-indigo-600 rounded border-gray-300 focus:ring-indigo-500 cursor-pointer"
                                    />
                                    <span className={`text-sm font-bold ${userForm.allowedSections?.includes(sec.id) ? 'text-indigo-700' : 'text-gray-700'}`}>{sec.name}</span>
                                  </label>
                                ))}
                              </div>
                            </div>

                            {userForm.allowedSections?.includes('pos') && (
                              <div className="animate-in fade-in slide-in-from-top-2">
                                <label className="block text-sm font-bold text-gray-900 mb-2 border-b border-gray-200 pb-2 flex items-center gap-2">
                                  <ShoppingCart size={16}/> Permisos de Venta en POS (Categorías)
                                </label>
                                <div className="grid grid-cols-2 gap-2">
                                  {categories.map(cat => (
                                    <label key={cat} className={`flex items-center gap-2 p-2 rounded-lg cursor-pointer transition-colors ${userForm.allowedCategories?.includes(cat) ? 'text-indigo-700 font-bold' : 'text-gray-600 font-medium hover:bg-gray-200'}`}>
                                      {userForm.allowedCategories?.includes(cat) ? <CheckSquare size={16} className="text-indigo-600"/> : <Square size={16} className="text-gray-400"/>}
                                      <input
                                        type="checkbox"
                                        className="hidden"
                                        checked={userForm.allowedCategories?.includes(cat) || false}
                                        onChange={(e) => {
                                          const current = userForm.allowedCategories || [];
                                          if (e.target.checked) setUserForm({...userForm, allowedCategories: [...current, cat]});
                                          else setUserForm({...userForm, allowedCategories: current.filter(c => c !== cat)});
                                        }}
                                      />
                                      <span className="text-sm">{cat}</span>
                                    </label>
                                  ))}
                                </div>
                              </div>
                            )}
                          </div>
                        )}
                      </div>

                      <div className="p-6 flex gap-3 border-t border-gray-100 bg-gray-50 flex-shrink-0">
                        <button 
                          type="button"
                          onClick={() => setShowUserModal(false)}
                          className="flex-1 py-3.5 rounded-xl font-bold text-gray-600 bg-gray-200 hover:bg-gray-300 transition-colors"
                        >
                          Cancelar
                        </button>
                        <button 
                          type="submit"
                          className="flex-1 py-3.5 rounded-xl font-bold text-white bg-indigo-600 hover:bg-indigo-700 shadow-lg shadow-indigo-600/30 transition-all"
                        >
                          {userForm.id ? 'Guardar Cambios' : 'Crear Usuario'}
                        </button>
                      </div>
                    </form>
                  </div>
                </div>
              )}

              {/* Custom Modal Rendering for Global Alerts */}
              {dialog && (
                <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-[100] p-4">
                  <div className="bg-white rounded-2xl shadow-2xl p-6 max-w-sm w-full text-center">
                    <div className={`w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 ${dialog.type === 'alert' ? 'bg-indigo-100' : 'bg-amber-100'}`}>
                       {dialog.type === 'alert' ? <AlertCircle size={32} className="text-indigo-600"/> : <AlertCircle size={32} className="text-amber-500"/>}
                    </div>
                    <p className="text-gray-800 font-bold mb-6">{dialog.message}</p>
                    <div className="flex gap-3">
                      {dialog.type === 'confirm' && (
                        <button onClick={() => setDialog(null)} className="flex-1 py-3 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-xl font-bold transition-colors">Cancelar</button>
                      )}
                      <button 
                        onClick={() => { if (dialog.type === 'confirm' && dialog.onConfirm) dialog.onConfirm(); setDialog(null); }} 
                        className="flex-1 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-bold transition-colors"
                      >
                        {dialog.type === 'confirm' ? 'Confirmar' : 'Aceptar'}
                      </button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<DiscotecaPOS />);
    </script>
</body>
</html>
