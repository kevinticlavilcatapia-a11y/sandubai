<body class="bg-gray-50 text-gray-900 font-sans selection:bg-indigo-100 selection:text-indigo-900">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        import { 
          ShoppingCart, Package, ClipboardList, Wallet, 
          CreditCard, Banknote, Smartphone, Plus, Minus, 
          Trash2, Search, ArrowUpCircle, ArrowDownCircle,
          History, Wine, Beer, CupSoda, Cigarette, Edit2, 
          Image as ImageIcon, Tags, Lock, Unlock, FileText,
          AlertCircle, Utensils, Pizza, Martini,
          Users, LogOut, UserCircle, Key, CheckSquare, Square,
          Calendar, PieChart, Download, Printer,
          Cloud, CloudOff, Activity, ShoppingBag, TrendingDown, Receipt, Gift, ListChecks,
          ClipboardCheck, WifiOff
        } from 'https://esm.sh/lucide-react@0.292.0';

        // --- Importaciones de Firebase ---
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, enableIndexedDbPersistence } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';
        import { getStorage, ref, uploadBytes, getDownloadURL } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js';

        // --- Configuración Global de Firebase ---
        let app, auth, db, storage, appId;
        try {
          const firebaseConfig = {
            apiKey: "AIzaSyBIW9X4iolnzyD39G4rNhe7YU_CNIUjVDE",
            authDomain: "sandubai-64fa2.firebaseapp.com",
            projectId: "sandubai-64fa2",
            storageBucket: "sandubai-64fa2.firebasestorage.app",
            messagingSenderId: "1024958244985",
            appId: "1:1024958244985:web:34f353e0208c56655f0ca8"
          };
          app = initializeApp(firebaseConfig);
          auth = getAuth(app);
          db = getFirestore(app);
          
          // HABILITAR PERSISTENCIA OFFLINE (Ventas sin internet)
          enableIndexedDbPersistence(db).catch((err) => {
            if (err.code == 'failed-precondition') {
                console.warn('Múltiples pestañas abiertas, la persistencia offline solo funciona en una.');
            } else if (err.code == 'unimplemented') {
                console.warn('El navegador actual no soporta persistencia offline.');
            }
          });

          storage = getStorage(app);
          appId = 'sandubai-pos'; // Identificador para las colecciones en tu base de datos
        } catch (e) {
          console.error("Error inicializando Firebase:", e);
        }

        // --- Datos Iniciales ---
        const INITIAL_PRODUCTS = [
          { id: 1, name: 'Cerveza Pilsen 630ml', category: 'Cervezas', price: 10.00, stock: 0, image: 'https://picsum.photos/seed/beer1/200/300' },
          { id: 2, name: 'Cusqueña Trigo 620ml', category: 'Cervezas', price: 12.00, stock: 0, image: 'https://picsum.photos/seed/beer2/200/300' },
          { id: 3, name: 'Corona Extra 355ml', category: 'Cervezas', price: 15.00, stock: 0, image: 'https://picsum.photos/seed/beer3/200/300' },
          { id: 4, name: 'Agua San Mateo 600ml', category: 'Aguas', price: 5.00, stock: 0, image: 'https://picsum.photos/seed/water1/200/300' },
          { id: 5, name: 'Agua Cielo 625ml', category: 'Aguas', price: 4.00, stock: 0, image: 'https://picsum.photos/seed/water2/200/300' },
          { id: 6, name: 'Coca Cola 500ml', category: 'Gaseosas', price: 6.00, stock: 0, image: 'https://picsum.photos/seed/soda1/200/300' },
          { id: 7, name: 'Inca Kola 500ml', category: 'Gaseosas', price: 6.00, stock: 0, image: 'https://picsum.photos/seed/soda2/200/300' },
          { id: 8, name: 'Guaraná 500ml', category: 'Gaseosas', price: 5.00, stock: 0, image: 'https://picsum.photos/seed/soda3/200/300' },
          { id: 9, name: 'Lucky Strike (Cajetilla)', category: 'Cigarros', price: 20.00, stock: 0, image: 'https://picsum.photos/seed/cigar1/200/300' },
          { id: 10, name: 'Hamilton (Cajetilla)', category: 'Cigarros', price: 18.00, stock: 0, image: 'https://picsum.photos/seed/cigar2/200/300' },
          { id: 11, name: 'Tequeños con Guacamole (10 und)', category: 'Piqueos', price: 18.00, stock: 0, image: 'https://picsum.photos/seed/tequenos/200/300' },
          { id: 12, name: 'Alitas BBQ (8 und)', category: 'Piqueos', price: 22.00, stock: 0, image: 'https://picsum.photos/seed/alitas/200/300' },
          { id: 13, name: 'Salchipapa Clásica', category: 'Comidas', price: 15.00, stock: 0, image: 'https://picsum.photos/seed/salchipapa/200/300' },
          { id: 14, name: 'Hamburguesa Royal', category: 'Comidas', price: 18.00, stock: 0, image: 'https://picsum.photos/seed/burger/200/300' },
          { id: 15, name: 'Chilcano de Pisco', category: 'Tragos Cortos', price: 20.00, stock: 0, image: 'https://picsum.photos/seed/chilcano/200/300' },
          { id: 16, name: 'Cuba Libre', category: 'Tragos Cortos', price: 18.00, stock: 0, image: 'https://picsum.photos/seed/cubalibre/200/300' },
        ];

        const INITIAL_CATEGORIES = ['Cervezas', 'Aguas', 'Gaseosas', 'Cigarros', 'Piqueos', 'Comidas', 'Tragos Cortos', 'Promociones'];

        const SECTION_OPTIONS = [
          { id: 'pos', name: 'Punto de Venta (Caja)' },
          { id: 'inventory', name: 'Inventario (Solo ingreso)' },
          { id: 'purchases', name: 'Compras de Mercadería' },
          { id: 'expenses', name: 'Egresos y Gastos' },
          { id: 'sales', name: 'Reportes y Ventas' }
        ];

        const INITIAL_USERS = [
          { id: 1, name: 'Administrador General', username: 'admin', password: '123', role: 'admin', allowedSections: [], allowedCategories: [] }
        ];

        const DEFAULT_USER_FORM = { id: null, name: '', username: '', password: '', role: 'personal', allowedSections: ['pos'], allowedCategories: [] };

        const PAYMENT_METHODS = [
          { id: 'efectivo', name: 'Efectivo', icon: Banknote, color: 'bg-emerald-600' },
          { id: 'tarjeta', name: 'Tarjeta (POS)', icon: CreditCard, color: 'bg-blue-600' },
          { id: 'yape', name: 'Yape', icon: Smartphone, color: 'bg-purple-600' },
          { id: 'credito', name: 'Crédito', icon: FileText, color: 'bg-orange-600' }
        ];

        const DEFAULT_PRODUCT_FORM = { id: null, name: '', category: 'Cervezas', price: '', stock: '', image: '', isPromotion: false, baseProductId: '', baseQuantity: 1 };

        function DiscotecaPOS() {
          // --- Estados de Conexión (Firebase) ---
          const [sysAuthUser, setSysAuthUser] = useState(null);
          const [isSyncing, setIsSyncing] = useState(true);
          const [isOffline, setIsOffline] = useState(!navigator.onLine);

          // --- Estado Global para Alertas Customizadas ---
          const [dialog, setDialog] = useState(null); 

          // --- Estados Principales Sincronizados ---
          const [activeTab, setActiveTab] = useState('pos');
          const [salesTab, setSalesTab] = useState('actual');
          const [expandedReportId, setExpandedReportId] = useState(null);
          const [products, setProducts] = useState([]);
          const [categories, setCategories] = useState([]);
          const [sales, setSales] = useState([]);
          const [users, setUsers] = useState([]);
          const [boxReports, setBoxReports] = useState([]);
          const [activeSessions, setActiveSessions] = useState([]); 
          const [purchases, setPurchases] = useState([]);
          const [expenses, setExpenses] = useState([]);

          // --- Fechas para Filtros de Historial ---
          const getTodayStr = () => {
            const today = new Date();
            const offset = today.getTimezoneOffset() * 60000;
            return (new Date(Date.now() - offset)).toISOString().split('T')[0];
          };
          const getFirstDayOfMonthStr = () => {
            const today = new Date();
            const offset = today.getTimezoneOffset() * 60000;
            const localDate = new Date(Date.now() - offset);
            localDate.setDate(1); // Set to 1st day of the current month
            return localDate.toISOString().split('T')[0];
          };

          const [purchasesStartDate, setPurchasesStartDate] = useState(getFirstDayOfMonthStr());
          const [purchasesEndDate, setPurchasesEndDate] = useState(getTodayStr());
          const [expensesStartDate, setExpensesStartDate] = useState(getFirstDayOfMonthStr());
          const [expensesEndDate, setExpensesEndDate] = useState(getTodayStr());
          const [historyStartDate, setHistoryStartDate] = useState(getFirstDayOfMonthStr());
          const [historyEndDate, setHistoryEndDate] = useState(getTodayStr());

          // --- Estados de Sesión Local (Persistente con LocalStorage) ---
          const [currentUser, setCurrentUser] = useState(() => {
            try {
              const savedUser = localStorage.getItem('sandubai_user');
              return savedUser ? JSON.parse(savedUser) : null;
            } catch (e) {
              return null;
            }
          }); 
          const [loginForm, setLoginForm] = useState({ username: '', password: '' });
          const [cart, setCart] = useState([]);
          const [boxSession, setBoxSession] = useState(null); 
          const [initialCashForm, setInitialCashForm] = useState('');
          const [closeBoxPassword, setCloseBoxPassword] = useState(''); 
          const [lastSale, setLastSale] = useState(null);
          const [lastCloseReport, setLastCloseReport] = useState(null);

          // Controles para evitar dobles peticiones
          const [isProcessingOpen, setIsProcessingOpen] = useState(false);
          const [isProcessingClose, setIsProcessingClose] = useState(false);

          // Identificador único de computadora para evitar sesión doble
          const [deviceId] = useState(() => {
            let id = localStorage.getItem('sandubai_device_id');
            if (!id) {
              id = Math.random().toString(36).substr(2, 9) + Date.now().toString(36);
              localStorage.setItem('sandubai_device_id', id);
            }
            return id;
          });

          // --- Estados de UI ---
          const [selectedCategory, setSelectedCategory] = useState('Todos');
          const [searchQuery, setSearchQuery] = useState('');
          
          // Modales
          const [showPaymentModal, setShowPaymentModal] = useState(false);
          const [showStockModal, setShowStockModal] = useState(false);
          const [showProductModal, setShowProductModal] = useState(false);
          const [showCategoryModal, setShowCategoryModal] = useState(false);
          const [showCloseBoxModal, setShowCloseBoxModal] = useState(false);
          const [showUserModal, setShowUserModal] = useState(false);
          const [showPurchaseModal, setShowPurchaseModal] = useState(false);
          const [showExpenseModal, setShowExpenseModal] = useState(false);
          
          // --- Modales para Control de Stock por Barra ---
          const [showAssignStockModal, setShowAssignStockModal] = useState(false);
          const [selectedSessionForStock, setSelectedSessionForStock] = useState(null);
          const [assignStockForm, setAssignStockForm] = useState({ productId: '', quantity: 1 });

          // --- Auditoría de Stock ---
          const [showAuditModal, setShowAuditModal] = useState(false);
          const [auditData, setAuditData] = useState({});
          const [auditSearch, setAuditSearch] = useState('');
          
          // --- Créditos y Pagos Divididos ---
          const [creditCode, setCreditCode] = useState('0000');
          const [pendingCreditValidation, setPendingCreditValidation] = useState(false);
          const [inputCreditCode, setInputCreditCode] = useState('');
          const [showAdminCreditModal, setShowAdminCreditModal] = useState(false);
          const [isSplitPayment, setIsSplitPayment] = useState(false);
          const [splitAmounts, setSplitAmounts] = useState({ efectivo: '', tarjeta: '', yape: '', credito: '' });

          // Formularios
          const [stockForm, setStockForm] = useState({ productId: '', quantity: 1, reason: 'Compra a proveedor' });
          const [productForm, setProductForm] = useState(DEFAULT_PRODUCT_FORM);
          const [isSavingProduct, setIsSavingProduct] = useState(false);
          const [newCategoryName, setNewCategoryName] = useState('');
          const [userForm, setUserForm] = useState(DEFAULT_USER_FORM);
          const [purchaseForm, setPurchaseForm] = useState({ provider: '', docType: 'Factura', docNumber: '', items: [] });
          const [purchaseItemTemp, setPurchaseItemTemp] = useState({ productId: '', qty: 1, cost: '' });
          const [expenseForm, setExpenseForm] = useState({ description: '', amount: '' });

          // --- Utilidades Firebase ---
          const getColRef = (colName) => collection(db, 'artifacts', appId, 'public', 'data', colName);
          const getDocRef = (colName, docId) => doc(db, 'artifacts', appId, 'public', 'data', colName, docId);

          // --- 1. Inicialización de Firebase Auth ---
          useEffect(() => {
            // Detección de caída de internet en tiempo real
            const handleOnline = () => setIsOffline(false);
            const handleOffline = () => setIsOffline(true);
            window.addEventListener('online', handleOnline);
            window.addEventListener('offline', handleOffline);

            const initAuth = async () => {
              try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                  try {
                    await signInWithCustomToken(auth, __initial_auth_token);
                  } catch (tokenError) {
                    console.warn("Token mismatch detectado. Usando autenticación anónima por defecto.", tokenError);
                    await signInAnonymously(auth);
                  }
                } else {
                  await signInAnonymously(auth);
                }
              } catch (error) {
                console.error("Error autenticando con Firebase", error);
              }
            };
            if(auth) initAuth();
            
            if(auth) {
              const unsubscribe = onAuthStateChanged(auth, (u) => {
                setSysAuthUser(u);
              });
              return () => {
                unsubscribe();
                window.removeEventListener('online', handleOnline);
                window.removeEventListener('offline', handleOffline);
              };
            }
          }, []);

          // --- 2. Sincronización en Tiempo Real (Listeners) ---
          useEffect(() => {
            if (!sysAuthUser) return;

            setIsSyncing(true);

            const unsubUsers = onSnapshot(getColRef('pos_users'), (snap) => {
              if (snap.empty) {
                INITIAL_USERS.forEach(u => setDoc(getDocRef('pos_users', u.id.toString()), u));
                INITIAL_PRODUCTS.forEach(p => setDoc(getDocRef('pos_products', p.id.toString()), p));
                setDoc(getDocRef('pos_settings', 'categories'), { list: INITIAL_CATEGORIES });
              } else {
                const items = snap.docs.map(d => d.data()).sort((a,b) => a.id - b.id);
                setUsers(items);
              }
            }, console.error);

            const unsubProducts = onSnapshot(getColRef('pos_products'), (snap) => {
              const items = snap.docs.map(d => d.data()).sort((a,b) => a.id - b.id);
              setProducts(items);
              setIsSyncing(false);
            }, console.error);

            const unsubSettings = onSnapshot(getDocRef('pos_settings', 'categories'), (snap) => {
              if (snap.exists()) setCategories(snap.data().list || []);
            }, console.error);

            const unsubSales = onSnapshot(getColRef('pos_sales'), (snap) => {
              const items = snap.docs.map(d => ({...d.data(), date: new Date(d.data().date) })).sort((a,b) => b.date - a.date);
              setSales(items);
            }, console.error);

            const unsubReports = onSnapshot(getColRef('pos_reports'), (snap) => {
              const items = snap.docs.map(d => ({
                ...d.data(), 
                startTime: new Date(d.data().startTime),
                endTime: new Date(d.data().endTime)
              })).sort((a,b) => b.endTime - a.endTime);
              setBoxReports(items);
            }, console.error);

            const unsubSessions = onSnapshot(getColRef('pos_sessions'), (snap) => {
              const items = snap.docs.map(d => ({
                ...d.data(), 
                startTime: new Date(d.data().startTime)
              })).sort((a,b) => b.startTime - a.startTime);
              setActiveSessions(items);
            }, console.error);

            const unsubPurchases = onSnapshot(getColRef('pos_purchases'), (snap) => {
              const items = snap.docs.map(d => ({...d.data(), date: new Date(d.data().date) })).sort((a,b) => b.date - a.date);
              setPurchases(items);
            }, console.error);

            const unsubExpenses = onSnapshot(getColRef('pos_expenses'), (snap) => {
              const items = snap.docs.map(d => ({...d.data(), date: new Date(d.data().date) })).sort((a,b) => b.date - a.date);
              setExpenses(items);
            }, console.error);

            const unsubSettingsCredit = onSnapshot(getDocRef('pos_settings', 'credit_auth'), (snap) => {
              if (snap.exists()) setCreditCode(snap.data().code || '0000');
            }, console.error);

            return () => {
              unsubUsers(); unsubProducts(); unsubSettings(); 
              unsubSales(); unsubReports(); unsubSessions(); unsubPurchases(); unsubExpenses(); unsubSettingsCredit();
            };
          }, [sysAuthUser]);

          // --- 3. Mantener la Sesión Local Sincronizada ---
          useEffect(() => {
            if (currentUser && currentUser.role !== 'admin') {
              const mySession = activeSessions.find(s => s.openedBy === currentUser.username);
              setBoxSession(mySession || null);
            } else {
              setBoxSession(null);
            }
          }, [activeSessions, currentUser]);

          // --- Mantener el usuario actualizado si el admin le cambia roles o lo elimina ---
          useEffect(() => {
            if (currentUser && users.length > 0) {
              const dbUser = users.find(u => u.username === currentUser.username);
              if (!dbUser) {
                // Usuario eliminado de la base de datos
                setCurrentUser(null);
                localStorage.removeItem('sandubai_user');
              } else if (JSON.stringify(dbUser) !== JSON.stringify(currentUser)) {
                // Permisos u otros datos actualizados
                setCurrentUser(dbUser);
                localStorage.setItem('sandubai_user', JSON.stringify(dbUser));
              }
            }
          }, [users]);

          // --- Exportar Historial Completo a PDF ---
          const exportHistoryToPDF = () => {
            const element = document.getElementById('history-report-content');
            if (!element) return;

            const opt = {
              margin:       [0.4, 0.4, 0.4, 0.4],
              filename:     `Reporte_Ventas_y_Cajas_${historyStartDate}_al_${historyEndDate}.pdf`,
              image:        { type: 'jpeg', quality: 0.98 },
              html2canvas:  { scale: 2, useCORS: true },
              jsPDF:        { unit: 'in', format: 'a4', orientation: 'portrait' },
              pagebreak:    { mode: ['css', 'legacy'] }
            };

            setDialog({ type: 'alert', message: 'Generando PDF con el resumen de ventas. Por favor, espera un momento...' });
            
            window.html2pdf().set(opt).from(element).save().then(() => {
              setDialog(null);
            }).catch(err => {
              console.error("Error al generar PDF:", err);
              setDialog({ type: 'alert', message: 'Hubo un problema al generar el PDF.' });
            });
          };

          // --- Exportar Cierre de Caja Individual a PDF ---
          const exportSingleReportToPDF = (report) => {
            setLastSale(null);
            setLastCloseReport(report);
            
            setDialog({ type: 'alert', message: 'Generando PDF del reporte de cierre...' });
            
            setTimeout(() => {
              const element = document.getElementById('receipt-print-content');
              if (!element) return;
              
              // Removemos temporalmente las clases de visualización condicional para que html2pdf lo capture bien sin importar la pantalla
              const originalClass = element.className;
              element.className = "w-[80mm] bg-white text-black font-mono text-sm p-4 absolute top-0 left-[-9999px]";

              const opt = {
                margin:       [2, 2, 2, 2],
                filename:     `Cierre_Caja_${report.openedBy}_${formatDate(new Date(report.endTime)).replace(/[: \/]/g, '')}.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true },
                jsPDF:        { unit: 'mm', format: [80, 250], orientation: 'portrait' }
              };
              
              window.html2pdf().set(opt).from(element).save().then(() => {
                element.className = originalClass; // restauramos clases originales
                setDialog(null);
              }).catch(err => {
                console.error("Error al generar PDF:", err);
                element.className = originalClass;
                setDialog({ type: 'alert', message: 'Hubo un problema al generar el PDF.' });
              });
            }, 600); // Tiempo para que React renderice la estructura
          };

          // --- Lógica de Promociones y Stock Virtual ---
          const getVirtualStock = (product) => {
            if (product.isPromotion) {
              const baseProd = products.find(p => p.id === parseInt(product.baseProductId));
              if (!baseProd) return 0;
              return Math.floor(baseProd.stock / (parseInt(product.baseQuantity) || 1));
            }
            return product.stock;
          };

          const canAddToCart = (productToAdd, qtyToAdd) => {
            const projectedCart = cart.map(item => ({...item}));
            const existing = projectedCart.find(i => i.id === productToAdd.id);
            
            if (existing) {
              existing.quantity += qtyToAdd;
              if (existing.quantity < 1) return true;
            } else {
              if (qtyToAdd > 0) projectedCart.push({ ...productToAdd, quantity: qtyToAdd });
            }
            
            const stockReq = {};
            for (const item of projectedCart) {
              if (item.isPromotion) {
                const bId = parseInt(item.baseProductId);
                stockReq[bId] = (stockReq[bId] || 0) + (item.quantity * parseInt(item.baseQuantity));
              } else {
                stockReq[item.id] = (stockReq[item.id] || 0) + item.quantity;
              }
            }
            
            for (const [pId, reqQty] of Object.entries(stockReq)) {
              const dbProd = products.find(p => p.id === parseInt(pId));
              if (!dbProd || dbProd.stock < reqQty) return false;
            }
            return true;
          };

          // --- Funciones de Caja ---
          const handleOpenBox = async (e) => {
            e.preventDefault();
            if (isProcessingOpen) return;
            setIsProcessingOpen(true);

            try {
              const initialCash = parseFloat(initialCashForm) || 0;
              const sessionData = {
                id: Math.random().toString(36).substr(2, 9),
                startTime: new Date().toISOString(),
                initialCash: initialCash,
                salesEfectivo: 0,
                salesTarjeta: 0,
                salesYape: 0,
                salesCredito: 0,
                totalSalesCount: 0,
                openedBy: currentUser.username,
                deviceId: deviceId,
                assignedStock: {}
              };
              
              await setDoc(getDocRef('pos_sessions', sessionData.id), sessionData);
              setInitialCashForm('');
            } finally {
              setIsProcessingOpen(false);
            }
          };

          const handleCloseBox = async (e) => {
            e.preventDefault();
            if (!boxSession || isProcessingClose) return;
            
            if (closeBoxPassword !== currentUser.password) {
              setDialog({ type: 'alert', message: 'Contraseña incorrecta. No puedes cerrar la caja.' });
              return;
            }

            setIsProcessingClose(true);

            try {
              const sessionSales = sales.filter(s => s.sessionId === boxSession.id);
              const soldItems = {};
              sessionSales.forEach(sale => {
                sale.items.forEach(item => {
                  if (item.isPromotion) {
                    const bId = item.baseProductId;
                    soldItems[bId] = (soldItems[bId] || 0) + (item.quantity * item.baseQuantity);
                  } else {
                    soldItems[item.id] = (soldItems[item.id] || 0) + item.quantity;
                  }
                });
              });

              const efectivoEsperado = boxSession.initialCash + boxSession.salesEfectivo;
              const declaredCash = efectivoEsperado; 

              const report = {
                ...boxSession,
                endTime: new Date(),
                totalVentas: boxSession.salesEfectivo + boxSession.salesTarjeta + boxSession.salesYape + (boxSession.salesCredito || 0),
                efectivoEsperado: efectivoEsperado,
                efectivoDeclarado: declaredCash,
                descuadre: declaredCash - efectivoEsperado,
                closedBy: currentUser.username,
                closedByName: currentUser.name,
                soldItems: soldItems 
              };
              
              // Usamos el MISMO ID de la sesión para el reporte, garantizando que NUNCA se duplique
              const reportId = boxSession.id;
              await setDoc(getDocRef('pos_reports', reportId), {
                ...report,
                id: reportId,
                startTime: typeof report.startTime === 'string' ? report.startTime : report.startTime.toISOString(),
                endTime: report.endTime.toISOString()
              });

              await deleteDoc(getDocRef('pos_sessions', boxSession.id));

              setShowCloseBoxModal(false);
              setCloseBoxPassword('');
              
              setLastSale(null);
              setLastCloseReport(report);
              setTimeout(() => { window.print(); }, 500);
            } catch (error) {
              console.error("Error cerrando caja:", error);
              setDialog({ type: 'alert', message: 'Hubo un error al cerrar la caja. Por favor, reintenta.' });
            } finally {
              setIsProcessingClose(false);
            }
          };

          // --- Función para Forzar Cierre de Caja (Solo Admin) ---
          const forceCloseSession = async (sessionToClose) => {
            setDialog({
              type: 'confirm',
              message: `¿Estás seguro de forzar el cierre de la caja de ${sessionToClose.openedBy}? (El sistema realizará un cuadre automático con lo vendido).`,
              onConfirm: async () => {
                if (isProcessingClose) return;
                setIsProcessingClose(true);
                try {
                  const sessionSales = sales.filter(s => s.sessionId === sessionToClose.id);
                  const soldItems = {};
                  sessionSales.forEach(sale => {
                    sale.items.forEach(item => {
                      if (item.isPromotion) {
                        const bId = item.baseProductId;
                        soldItems[bId] = (soldItems[bId] || 0) + (item.quantity * item.baseQuantity);
                      } else {
                        soldItems[item.id] = (soldItems[item.id] || 0) + item.quantity;
                      }
                    });
                  });

                  const efectivoEsperado = sessionToClose.initialCash + sessionToClose.salesEfectivo;
                  const declaredCash = efectivoEsperado; 

                  const report = {
                    ...sessionToClose,
                    endTime: new Date(),
                    totalVentas: sessionToClose.salesEfectivo + sessionToClose.salesTarjeta + sessionToClose.salesYape + (sessionToClose.salesCredito || 0),
                    efectivoEsperado: efectivoEsperado,
                    efectivoDeclarado: declaredCash,
                    descuadre: declaredCash - efectivoEsperado,
                    closedBy: currentUser.username,
                    closedByName: currentUser.name + ' (Forzado por Admin)',
                    soldItems: soldItems 
                  };
                  
                  const reportId = sessionToClose.id;
                  await setDoc(getDocRef('pos_reports', reportId), {
                    ...report,
                    id: reportId,
                    startTime: typeof report.startTime === 'string' ? report.startTime : report.startTime.toISOString(),
                    endTime: report.endTime.toISOString()
                  });

                  await deleteDoc(getDocRef('pos_sessions', sessionToClose.id));
                  setDialog({ type: 'alert', message: `Caja de ${sessionToClose.openedBy} cerrada exitosamente.` });
                } catch (error) {
                  console.error("Error forzando cierre:", error);
                  setDialog({ type: 'alert', message: 'Hubo un error al forzar el cierre.' });
                } finally {
                  setIsProcessingClose(false);
                }
              }
            });
          };

          // --- Funciones para Asignar Stock de Control (Solo Admin) ---
          const handleAddAssignedStock = async (e) => {
            e.preventDefault();
            if (!selectedSessionForStock || !assignStockForm.productId) return;
            const pId = assignStockForm.productId;
            const qty = parseInt(assignStockForm.quantity);
            
            const currentStock = selectedSessionForStock.assignedStock || {};
            const newStock = { ...currentStock, [pId]: (currentStock[pId] || 0) + qty };
            
            const updatedSession = { ...selectedSessionForStock, assignedStock: newStock };
            
            await setDoc(getDocRef('pos_sessions', selectedSessionForStock.id), {
              ...updatedSession,
              startTime: typeof updatedSession.startTime === 'string' ? updatedSession.startTime : updatedSession.startTime.toISOString()
            });
            
            setSelectedSessionForStock(updatedSession);
            setAssignStockForm({ productId: '', quantity: 1 });
          };

          const handleRemoveAssignedStock = async (pId) => {
            const currentStock = { ...selectedSessionForStock.assignedStock };
            delete currentStock[pId];
            
            const updatedSession = { ...selectedSessionForStock, assignedStock: currentStock };
            
            await setDoc(getDocRef('pos_sessions', selectedSessionForStock.id), {
              ...updatedSession,
              startTime: typeof updatedSession.startTime === 'string' ? updatedSession.startTime : updatedSession.startTime.toISOString()
            });
            
            setSelectedSessionForStock(updatedSession);
          };

          // --- Funciones del Carrito y Ventas ---
          const addToCart = (product) => {
            if (!canAddToCart(product, 1)) {
              setDialog({ type: 'alert', message: '¡No hay suficiente stock base para agregar este producto! (Revisa las promociones o el stock actual)' });
              return;
            }

            const existingItem = cart.find(item => item.id === product.id);
            if (existingItem) {
              setCart(cart.map(item => 
                item.id === product.id ? { ...item, quantity: item.quantity + 1 } : item
              ));
            } else {
              setCart([...cart, { ...product, quantity: 1 }]);
            }
          };

          const updateCartQuantity = (id, delta) => {
            const product = products.find(p => p.id === id);
            
            if (delta > 0 && !canAddToCart(product, delta)) {
                setDialog({ type: 'alert', message: '¡Stock máximo alcanzado en este momento para la suma de tus pedidos!' });
                return;
            }

            setCart(cart.map(item => {
              if (item.id === id) {
                return { ...item, quantity: Math.max(1, item.quantity + delta) };
              }
              return item;
            }));
          };

          const removeFromCart = (id) => setCart(cart.filter(item => item.id !== id));

          const cartTotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);

          const processCreditCheckout = () => {
            if (inputCreditCode !== creditCode) {
              setDialog({ type: 'alert', message: 'Código de autorización incorrecto.' });
              return;
            }
            setPendingCreditValidation(false);
            setInputCreditCode('');
            if (isSplitPayment) {
              handleCheckout('dividido', splitAmounts);
            } else {
              handleCheckout('credito');
            }
          };

          const handleCheckout = async (paymentMethodId, splitData = null) => {
            if (cart.length === 0 || !boxSession) return;

            const saleId = Math.random().toString(36).substr(2, 9);
            const now = new Date();

            const stockDeductions = {}; 
            for (const item of cart) {
              if (item.isPromotion) {
                const bId = parseInt(item.baseProductId);
                stockDeductions[bId] = (stockDeductions[bId] || 0) + (item.quantity * parseInt(item.baseQuantity));
              } else {
                stockDeductions[item.id] = (stockDeductions[item.id] || 0) + item.quantity;
              }
            }

            for (const [pId, deductQty] of Object.entries(stockDeductions)) {
              const dbProduct = products.find(p => p.id === parseInt(pId));
              if (!dbProduct || dbProduct.stock < deductQty) {
                 setDialog({ type: 'alert', message: `No hay stock suficiente de "${dbProduct?.name || 'un producto base'}". Alguien más pudo haberlo vendido. Revisa el stock y reintenta.` });
                 return;
              }
            }

            // Descuenta del Inventario General Global
            for (const [pId, deductQty] of Object.entries(stockDeductions)) {
              const dbProduct = products.find(p => p.id === parseInt(pId));
              const newStock = dbProduct.stock - deductQty;
              // SIN AWAIT: Operación instantánea, Firebase lo sube en segundo plano
              setDoc(getDocRef('pos_products', dbProduct.id.toString()), { ...dbProduct, stock: newStock });
            }

            let amtEfectivo = 0, amtTarjeta = 0, amtYape = 0, amtCredito = 0;
            if (paymentMethodId === 'dividido' && splitData) {
              amtEfectivo = parseFloat(splitData.efectivo) || 0;
              amtTarjeta = parseFloat(splitData.tarjeta) || 0;
              amtYape = parseFloat(splitData.yape) || 0;
              amtCredito = parseFloat(splitData.credito) || 0;
            } else {
              if (paymentMethodId === 'efectivo') amtEfectivo = cartTotal;
              if (paymentMethodId === 'tarjeta') amtTarjeta = cartTotal;
              if (paymentMethodId === 'yape') amtYape = cartTotal;
              if (paymentMethodId === 'credito') amtCredito = cartTotal;
            }

            const newSale = {
              id: saleId,
              sessionId: boxSession.id,
              date: now.toISOString(),
              items: [...cart],
              total: cartTotal,
              paymentMethod: paymentMethodId,
              splitAmounts: paymentMethodId === 'dividido' ? { efectivo: amtEfectivo, tarjeta: amtTarjeta, yape: amtYape, credito: amtCredito } : null,
              soldBy: currentUser.username
            };
            // SIN AWAIT: Guarda venta localmente de inmediato
            setDoc(getDocRef('pos_sales', saleId), newSale);

            const updatedSession = {
              ...boxSession,
              salesEfectivo: boxSession.salesEfectivo + amtEfectivo,
              salesTarjeta: boxSession.salesTarjeta + amtTarjeta,
              salesYape: boxSession.salesYape + amtYape,
              salesCredito: (boxSession.salesCredito || 0) + amtCredito,
              totalSalesCount: boxSession.totalSalesCount + 1
            };
            
            // SIN AWAIT: Actualiza turno localmente de inmediato
            setDoc(getDocRef('pos_sessions', boxSession.id), {
              ...updatedSession,
              startTime: typeof updatedSession.startTime === 'string' ? updatedSession.startTime : updatedSession.startTime.toISOString()
            });

            setLastCloseReport(null);
            setLastSale(newSale);
            setCart([]);
            setShowPaymentModal(false);
            setIsSplitPayment(false);
            setSplitAmounts({ efectivo: '', tarjeta: '', yape: '', credito: '' });

            setTimeout(() => { window.print(); }, 500);
          };

          // --- Funciones de Compras (Purchases) ---
          const handleAddPurchaseItem = () => {
            if (!purchaseItemTemp.productId || purchaseItemTemp.qty <= 0 || purchaseItemTemp.cost < 0) return;
            const product = products.find(p => p.id === parseInt(purchaseItemTemp.productId));
            if (!product) return;
            const newItem = {
              productId: product.id, productName: product.name,
              qty: parseInt(purchaseItemTemp.qty), cost: parseFloat(purchaseItemTemp.cost)
            };
            setPurchaseForm({ ...purchaseForm, items: [...purchaseForm.items, newItem] });
            setPurchaseItemTemp({ productId: '', qty: 1, cost: '' });
          };

          const handleRemovePurchaseItem = (index) => {
            const newItems = [...purchaseForm.items];
            newItems.splice(index, 1);
            setPurchaseForm({ ...purchaseForm, items: newItems });
          };

          const handleSavePurchase = async (e) => {
            e.preventDefault();
            if (purchaseForm.items.length === 0) {
              setDialog({ type: 'alert', message: 'Agrega al menos un producto a la compra.' });
              return;
            }
            const purchaseId = Math.random().toString(36).substr(2, 9);
            const now = new Date();
            const totalCompra = purchaseForm.items.reduce((sum, item) => sum + (item.qty * item.cost), 0);
            const newPurchase = {
              id: purchaseId, date: now.toISOString(),
              provider: purchaseForm.provider, docType: purchaseForm.docType, docNumber: purchaseForm.docNumber,
              items: purchaseForm.items, total: totalCompra, registeredBy: currentUser.username
            };
            await setDoc(getDocRef('pos_purchases', purchaseId), newPurchase);

            for (const item of purchaseForm.items) {
              const dbProduct = products.find(p => p.id === item.productId);
              if (dbProduct) {
                const newStock = dbProduct.stock + item.qty;
                await setDoc(getDocRef('pos_products', dbProduct.id.toString()), { ...dbProduct, stock: newStock });
              }
            }
            setShowPurchaseModal(false);
            setPurchaseForm({ provider: '', docType: 'Factura', docNumber: '', items: [] });
            setDialog({ type: 'alert', message: 'Compra registrada con éxito y stock actualizado.' });
          };

          // --- Funciones de Egresos (Expenses) ---
          const handleSaveExpense = async (e) => {
            e.preventDefault();
            const amount = parseFloat(expenseForm.amount);
            if (!amount || amount <= 0) return;
            const expenseId = Math.random().toString(36).substr(2, 9);
            const newExpense = {
              id: expenseId, date: new Date().toISOString(), description: expenseForm.description,
              amount: amount, registeredBy: currentUser.username
            };
            await setDoc(getDocRef('pos_expenses', expenseId), newExpense);
            setShowExpenseModal(false);
            setExpenseForm({ description: '', amount: '' });
          };

          // --- Funciones de Categorías, Usuarios, Productos ... ---
          const handleAddCategory = async (e) => {
            e.preventDefault();
            if (newCategoryName.trim() && !categories.includes(newCategoryName.trim())) {
              const newCatList = [...categories, newCategoryName.trim()];
              await setDoc(getDocRef('pos_settings', 'categories'), { list: newCatList });
              setNewCategoryName('');
            }
          };

          const handleDeleteCategory = async (cat) => {
            const isUsed = products.some(p => p.category === cat);
            if (isUsed) {
              setDialog({ type: 'alert', message: `No puedes eliminar la categoría "${cat}" porque hay productos que la están usando.` });
              return;
            }
            setDialog({ type: 'confirm', message: `¿Eliminar la categoría "${cat}" de forma permanente?`, onConfirm: async () => {
              const newCatList = categories.filter(c => c !== cat);
              await setDoc(getDocRef('pos_settings', 'categories'), { list: newCatList });
              if (selectedCategory === cat) setSelectedCategory('Todos');
            }});
          };

          const handleLogin = (e) => {
            e.preventDefault();
            const user = users.find(u => u.username === loginForm.username && u.password === loginForm.password);
            if (user) {
              // Validar si el usuario tiene sesión en otro dispositivo
              const userSession = activeSessions.find(s => s.openedBy === user.username);
              if (userSession && userSession.deviceId && userSession.deviceId !== deviceId) {
                setDialog({ type: 'alert', message: `El usuario "${user.username}" ya tiene una caja abierta en otra computadora. Debe cerrar el turno allá para poder ingresar aquí.` });
                return;
              }

              setCurrentUser(user);
              localStorage.setItem('sandubai_user', JSON.stringify(user));
              if (user.role === 'admin') {
                setActiveTab('sales'); setSalesTab('actual');
              } else {
                setActiveTab(user.allowedSections?.includes('pos') ? 'pos' : (user.allowedSections?.[0] || 'pos'));
                setSalesTab('actual');
              }
              setLoginForm({ username: '', password: '' });
            } else {
              setDialog({ type: 'alert', message: 'Usuario o contraseña incorrectos. Verifica tus datos.' });
            }
          };

          const handleLogout = () => {
            if (boxSession) {
              setDialog({ type: 'confirm', message: 'Tu caja está abierta. ¿Deseas cerrar sesión? (Tu turno y ventas seguirán activos en la nube)', onConfirm: () => {
                  setCurrentUser(null);
                  localStorage.removeItem('sandubai_user');
              }});
              return;
            }
            setCurrentUser(null);
            localStorage.removeItem('sandubai_user');
          };

          const handleOpenUserModal = (user = null) => { setUserForm(user ? user : DEFAULT_USER_FORM); setShowUserModal(true); };
          const handleSaveUser = async (e) => {
            e.preventDefault();
            const newId = userForm.id || (users.length > 0 ? Math.max(...users.map(u => u.id)) + 1 : 1);
            await setDoc(getDocRef('pos_users', newId.toString()), { ...userForm, id: newId });
            setShowUserModal(false);
          };
          const handleDeleteUser = async (id) => {
            if (id === currentUser.id) { setDialog({ type: 'alert', message: 'No puedes eliminar tu propio usuario.' }); return; }
            setDialog({ type: 'confirm', message: '¿Eliminar este usuario del sistema permanentemente?', onConfirm: async () => {
              await deleteDoc(getDocRef('pos_users', id.toString()));
            }});
          };

          const handleOpenProductModal = (product = null) => {
            setProductForm(product ? product : { ...DEFAULT_PRODUCT_FORM, category: categories[0] || '' });
            setIsSavingProduct(false); setShowProductModal(true);
          };
          
          const handleSaveProduct = async (e) => {
            e.preventDefault();
            setIsSavingProduct(true);
            try {
              const newId = productForm.id || (products.length > 0 ? Math.max(...products.map(p => p.id)) + 1 : 1);
              const productData = { ...productForm, id: newId, price: parseFloat(productForm.price), stock: parseInt(productForm.stock) || 0 };
              await setDoc(getDocRef('pos_products', newId.toString()), productData);
              
              setShowProductModal(false);
            } catch (error) {
              console.error("Error:", error); setDialog({ type: 'alert', message: 'Error guardando producto.' });
            } finally {
              setIsSavingProduct(false);
            }
          };
          const handleDeleteProduct = async (id) => {
            setDialog({ type: 'confirm', message: '¿Eliminar este producto permanentemente de todas las pantallas?', onConfirm: async () => {
              await deleteDoc(getDocRef('pos_products', id.toString())); setCart(cart.filter(item => item.id !== id));
            }});
          };

          const handleAddStock = async (e) => {
            e.preventDefault();
            const productId = parseInt(stockForm.productId); const qty = parseInt(stockForm.quantity);
            if (!productId || qty <= 0) return;
            const product = products.find(p => p.id === productId);
            if (product.isPromotion) return; 
            const newStock = product.stock + qty;
            await setDoc(getDocRef('pos_products', productId.toString()), { ...product, stock: newStock });
            setShowStockModal(false); setStockForm({ productId: '', quantity: 1, reason: 'Ajuste manual' });
          };

          // --- Funciones de Auditoría de Stock ---
          const handleOpenAudit = () => {
            const initialAudit = {};
            products.filter(p => !p.isPromotion).forEach(p => {
              initialAudit[p.id] = p.stock;
            });
            setAuditData(initialAudit);
            setAuditSearch('');
            setShowAuditModal(true);
          };

          const handleSaveAudit = () => {
            setDialog({
              type: 'confirm',
              message: '¿Estás seguro de aplicar estos ajustes? El stock del sistema se actualizará con los valores físicos ingresados.',
              onConfirm: async () => {
                try {
                  const updatePromises = [];
                  for (const p of products) {
                    if (p.isPromotion) continue;
                    const newStock = parseInt(auditData[p.id]);
                    if (isNaN(newStock) || newStock < 0) continue;
                    if (newStock !== p.stock) {
                       updatePromises.push(
                         setDoc(getDocRef('pos_products', p.id.toString()), { ...p, stock: newStock })
                       );
                    }
                  }
                  await Promise.all(updatePromises);
                  setShowAuditModal(false);
                  setDialog({ type: 'alert', message: 'Inventario y stock sincronizados con éxito.' });
                } catch (error) {
                  console.error("Error al guardar auditoría:", error);
                  setDialog({ type: 'alert', message: 'Hubo un error al actualizar el stock.' });
                }
              }
            });
          };

          const formatCurrency = (amount) => `S/ ${amount.toFixed(2)}`;
          const formatDate = (date) => new Intl.DateTimeFormat('es-PE', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }).format(date);
          const formatTime = (date) => new Intl.DateTimeFormat('es-PE', { hour: '2-digit', minute: '2-digit' }).format(date);

          const isAllowedProduct = (product) => {
            if (currentUser?.role === 'admin') return true;
            return currentUser?.allowedCategories?.includes(product.category);
          };

          const filteredProducts = products.filter(p => {
            if (!isAllowedProduct(p)) return false; 
            const matchCategory = selectedCategory === 'Todos' || p.category === selectedCategory;
            const matchSearch = p.name.toLowerCase().includes(searchQuery.toLowerCase());
            return matchCategory && matchSearch;
          });

          const getCategoryIcon = (category) => {
            switch(category.toLowerCase()) {
              case 'cervezas': return <Beer size={18} />;
              case 'aguas': return <Wine size={18} />;
              case 'gaseosas': return <CupSoda size={18} />;
              case 'cigarros': return <Cigarette size={18} />;
              case 'piqueos': return <Pizza size={18} />;
              case 'comidas': return <Utensils size={18} />;
              case 'tragos cortos': return <Martini size={18} />;
              case 'promociones': return <Gift size={18} />;
              default: return <Package size={18} />;
            }
          };

          const userCategories = currentUser?.role === 'admin' ? categories : categories.filter(cat => currentUser?.allowedCategories?.includes(cat));


          // ================= RENDERIZADO PRINCIPAL =================

          const renderOpenBoxScreen = () => (
            <div className="flex-1 flex flex-col items-center justify-center bg-gray-50 h-full p-6">
              <div className="bg-white p-8 rounded-3xl shadow-xl border border-gray-200 w-full max-w-md text-center relative overflow-hidden">
                {isSyncing && (
                  <div className="absolute top-0 left-0 w-full bg-blue-500 text-white text-xs py-1 font-bold animate-pulse">Sincronizando con la nube...</div>
                )}
                <div className="w-20 h-20 bg-indigo-100 rounded-full flex items-center justify-center mx-auto mb-6 mt-4">
                  <Lock size={40} className="text-indigo-600" />
                </div>
                <h2 className="text-2xl font-black text-gray-900 mb-2">Caja Cerrada</h2>
                <p className="text-gray-500 mb-8 font-medium">Apertura la caja ingresando el fondo inicial para comenzar a realizar ventas.</p>
                <form onSubmit={handleOpenBox} className="space-y-6">
                  <div className="text-left">
                    <label className="block text-sm font-bold text-gray-700 mb-2">Monto Inicial en Efectivo (S/)</label>
                    <div className="relative">
                      <span className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 font-bold">S/</span>
                      <input type="number" step="0.10" min="0" required autoFocus className="w-full bg-gray-50 border border-gray-300 rounded-xl py-3 pl-10 pr-4 text-gray-900 font-bold text-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all" value={initialCashForm} onChange={(e) => setInitialCashForm(e.target.value)} placeholder="0.00" />
                    </div>
                  </div>
                  <button type="submit" disabled={isProcessingOpen} className="w-full py-4 rounded-xl font-bold text-white bg-indigo-600 hover:bg-indigo-700 shadow-lg shadow-indigo-600/30 transition-all flex items-center justify-center gap-2 text-lg disabled:opacity-50">
                    <Unlock size={22} /> {isProcessingOpen ? 'Abriendo Turno...' : 'Iniciar Turno de Caja'}
                  </button>
                </form>
              </div>
            </div>
          );

          const renderPOS = () => {
            if (!boxSession) return renderOpenBoxScreen();

            return (
              <div className="flex h-full w-full bg-gray-50 overflow-hidden">
                {/* Catálogo */}
                <div className="flex-1 flex flex-col p-4 overflow-hidden">
                  {/* Top Bar POS */}
                  <div className="flex gap-4 mb-4">
                    <div className="flex-1 relative shadow-sm">
                      <Search className="absolute left-3 top-3 text-gray-400" size={20} />
                      <input type="text" placeholder="Buscar producto..." className="w-full bg-white text-gray-800 rounded-xl pl-10 pr-4 py-2 border border-gray-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all font-medium" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} />
                    </div>
                    {isOffline ? (
                      <div className="bg-amber-50 text-amber-600 border border-amber-200 px-4 py-2 rounded-xl flex items-center gap-2 font-bold shadow-sm text-sm" title="Las ventas se guardan localmente y se subirán al volver el internet">
                        <WifiOff size={18}/> Sin Internet
                      </div>
                    ) : isSyncing ? (
                      <div className="bg-blue-50 text-blue-600 border border-blue-200 px-4 py-2 rounded-xl flex items-center gap-2 font-bold shadow-sm animate-pulse text-sm">
                        <Cloud size={18} /> Conectando...
                      </div>
                    ) : (
                      <div className="bg-emerald-50 text-emerald-600 border border-emerald-200 px-4 py-2 rounded-xl flex items-center gap-2 font-bold shadow-sm text-sm" title="Stock sincronizado en vivo">
                        <Cloud size={18} /> En línea
                      </div>
                    )}
                  </div>

                  {/* Categorías */}
                  <div className="flex gap-2 mb-4 overflow-x-auto pb-2 custom-scrollbar">
                    {['Todos', ...userCategories].map(cat => (
                      <button
                        key={cat} onClick={() => setSelectedCategory(cat)}
                        className={`px-4 py-2 rounded-full whitespace-nowrap font-medium flex items-center gap-2 transition-all shadow-sm ${selectedCategory === cat ? 'bg-indigo-600 text-white shadow-indigo-600/30' : 'bg-white text-gray-600 border border-gray-200 hover:bg-gray-100 hover:text-gray-900'}`}
                      >
                        {cat !== 'Todos' && getCategoryIcon(cat)} {cat}
                      </button>
                    ))}
                  </div>

                  {/* Grilla de Productos */}
                  <div className="flex-1 overflow-y-auto custom-scrollbar pr-2">
                    <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3 md:gap-4 pb-20">
                      {filteredProducts.map(product => {
                        const stockVisual = getVirtualStock(product);
                        return (
                        <div 
                          key={product.id} onClick={() => stockVisual > 0 && addToCart(product)}
                          className={`relative bg-white rounded-2xl p-3 md:p-4 border-2 transition-all cursor-pointer select-none flex flex-col justify-between aspect-square shadow-sm hover:shadow-lg hover:-translate-y-1 ${stockVisual > 0 ? 'border-gray-200 hover:border-indigo-500 active:scale-95' : 'border-red-100 opacity-60 cursor-not-allowed grayscale-[50%]'}`}
                        >
                          {product.isPromotion && (
                             <div className="absolute top-0 right-0 bg-rose-500 text-white text-[9px] font-black uppercase px-2 py-1 rounded-bl-xl rounded-tr-xl z-10 shadow-sm flex items-center gap-1">
                               <Gift size={12} /> Combo
                             </div>
                          )}
                          <div className="flex-1 flex flex-col overflow-hidden pr-2 md:pr-4">
                            <div className="text-[10px] md:text-xs text-indigo-600 font-black uppercase tracking-widest mb-1 truncate">{product.category}</div>
                            <h3 className="text-gray-900 font-black text-sm sm:text-base md:text-lg leading-tight uppercase line-clamp-3">{product.name}</h3>
                          </div>
                          <div className="flex justify-between items-end mt-2 border-t border-gray-100 pt-2 md:pt-3">
                            <span className="text-lg sm:text-xl md:text-2xl font-black text-red-600 tracking-tighter truncate pr-1">{formatCurrency(product.price)}</span>
                            <span className={`text-[10px] md:text-xs px-2 py-1 rounded-lg font-bold transition-colors duration-500 flex flex-col items-center flex-shrink-0 ${stockVisual > 10 ? 'bg-gray-100 text-gray-700' : 'bg-red-100 text-red-700 animate-pulse'}`}>
                              {product.isPromotion ? <span className="text-[8px] uppercase font-bold leading-none mb-0.5">Máx</span> : 'Stock'} 
                              <span className="text-sm md:text-base leading-none">{stockVisual}</span>
                            </span>
                          </div>
                        </div>
                      )})}
                    </div>
                  </div>
                </div>

                {/* Carrito Lateral */}
                <div className="w-96 bg-white border-l border-gray-200 flex flex-col shadow-2xl z-10">
                  <div className="p-4 border-b border-gray-200 flex justify-between items-center bg-white/90 backdrop-blur-md">
                    <h2 className="text-xl font-bold text-gray-800 flex items-center gap-2"><ShoppingCart className="text-indigo-600" /> Pedido Actual</h2>
                    <span className="bg-indigo-600 text-white px-3 py-1 rounded-full text-sm font-bold shadow-sm">{cart.reduce((sum, item) => sum + item.quantity, 0)} items</span>
                  </div>
                  <div className="flex-1 overflow-y-auto p-4 custom-scrollbar bg-gray-50/50">
                    {cart.length === 0 ? (
                      <div className="h-full flex flex-col items-center justify-center text-gray-400">
                        <ShoppingCart size={48} className="mb-4 text-gray-300" />
                        <p className="font-medium">El carrito está vacío</p>
                      </div>
                    ) : (
                      <div className="space-y-3">
                        {cart.map(item => (
                          <div key={item.id} className="bg-white rounded-xl p-3 flex flex-col gap-2 border border-gray-200 shadow-sm relative overflow-hidden">
                            {item.isPromotion && <div className="absolute top-0 right-0 bg-rose-500 w-1.5 h-full"></div>}
                            <div className="flex justify-between items-start gap-2">
                              <span className="font-semibold text-gray-800 text-sm leading-tight flex-1">{item.isPromotion && <Gift size={12} className="inline mr-1 text-rose-500 -mt-0.5"/>}{item.name}</span>
                              <button onClick={() => removeFromCart(item.id)} className="text-red-500 hover:text-red-700 bg-red-50 p-1.5 rounded-lg transition-colors"><Trash2 size={16} /></button>
                            </div>
                            <div className="flex justify-between items-center mt-1">
                              <span className="text-emerald-600 font-black">{formatCurrency(item.price)}</span>
                              <div className="flex items-center gap-2 bg-gray-100 rounded-lg p-1 border border-gray-200">
                                <button onClick={() => updateCartQuantity(item.id, -1)} className="bg-white hover:bg-gray-50 border border-gray-200 rounded p-1 text-gray-600 transition-colors shadow-sm"><Minus size={14} /></button>
                                <span className="text-gray-800 font-bold w-6 text-center text-sm">{item.quantity}</span>
                                <button onClick={() => updateCartQuantity(item.id, 1)} className="bg-white hover:bg-gray-50 border border-gray-200 rounded p-1 text-gray-600 transition-colors shadow-sm"><Plus size={14} /></button>
                              </div>
                            </div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                  <div className="p-5 bg-white border-t border-gray-200">
                    <div className="flex justify-between items-center mb-4"><span className="text-gray-500 font-medium">Total a Pagar</span><span className="text-3xl font-black text-gray-900">{formatCurrency(cartTotal)}</span></div>
                    <div className="flex flex-col gap-2">
                      <button 
                        onClick={() => handleCheckout('efectivo')} 
                        disabled={cart.length === 0} 
                        className={`w-full py-4 rounded-xl font-black text-lg flex items-center justify-center gap-2 transition-all ${cart.length > 0 ? 'bg-emerald-500 hover:bg-emerald-600 text-white shadow-lg shadow-emerald-500/30 active:scale-95' : 'bg-gray-200 text-gray-400 cursor-not-allowed'}`}
                        title="Cobra en efectivo e imprime ticket al instante"
                      >
                        <Banknote size={24} /> Cobro Rápido (Efectivo)
                      </button>
                      <button 
                        onClick={() => {
                          setIsSplitPayment(false);
                          setSplitAmounts({ efectivo: '', tarjeta: '', yape: '', credito: '' });
                          setShowPaymentModal(true);
                        }} 
                        disabled={cart.length === 0} 
                        className={`w-full py-3 rounded-xl font-bold flex items-center justify-center gap-2 transition-all ${cart.length > 0 ? 'bg-indigo-100 hover:bg-indigo-200 text-indigo-700 active:scale-95' : 'bg-gray-100 text-gray-400 cursor-not-allowed'}`}
                      >
                        <Wallet size={20} /> Otros Medios / Dividir Pago
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            );
          };

          const renderInventory = () => (
             <div className="p-6 h-full flex flex-col bg-gray-50 text-gray-800 overflow-hidden">
                <div className="flex justify-between items-center mb-6">
                  <h2 className="text-2xl font-bold flex items-center gap-2 text-gray-900"><Package className="text-indigo-600" /> Inventario y Productos</h2>
                  <div className="flex gap-3">
                    {currentUser?.role === 'admin' && (
                      <>
                      <button onClick={handleOpenAudit} className="bg-amber-500 hover:bg-amber-600 text-white px-4 py-2.5 rounded-xl font-bold flex items-center gap-2 transition-all shadow-sm shadow-amber-500/20"><ClipboardCheck size={18} /> Auditoría de Stock</button>
                      <button onClick={() => setShowCategoryModal(true)} className="bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 px-4 py-2.5 rounded-xl font-bold flex items-center gap-2 transition-all shadow-sm"><Tags size={18} /> Categorías</button>
                      <button onClick={() => handleOpenProductModal()} className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2.5 rounded-xl font-bold flex items-center gap-2 transition-all shadow-sm shadow-indigo-600/20"><Plus size={18} /> Nuevo Producto / Promo</button>
                      </>
                    )}
                    <button onClick={() => setShowStockModal(true)} className="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2.5 rounded-xl font-bold flex items-center gap-2 transition-all shadow-sm" title="Solo para cuadrar diferencias. Usa el módulo Compras para ingresos reales."><Edit2 size={18} /> Ajuste de Stock</button>
                  </div>
                </div>
                <div className="bg-white rounded-2xl overflow-hidden border border-gray-200 shadow-sm flex-1 flex flex-col">
                  <div className="overflow-x-auto flex-1 custom-scrollbar">
                    <table className="w-full text-left border-collapse">
                      <thead className="bg-gray-100 text-gray-600 text-sm uppercase font-semibold sticky top-0 z-10">
                        <tr><th className="px-6 py-4">Producto</th><th className="px-6 py-4">Categoría</th><th className="px-6 py-4">Precio</th><th className="px-6 py-4 text-center">Stock Actual</th><th className="px-6 py-4 text-center">Estado</th>{currentUser?.role === 'admin' && <th className="px-6 py-4 text-right">Acciones</th>}</tr>
                      </thead>
                      <tbody className="divide-y divide-gray-100">
                        {products.map(p => {
                          const visualStock = getVirtualStock(p);
                          return (
                          <tr key={p.id} className="hover:bg-gray-50/80 transition-colors">
                            <td className="px-6 py-4"><div className="font-bold text-gray-800">{p.name}</div>{p.isPromotion && <div className="text-[10px] text-gray-500 font-bold uppercase mt-0.5">Combo (Descuenta {p.baseQuantity}x Base ID:{p.baseProductId})</div>}</td>
                            <td className="px-6 py-4"><span className="bg-gray-100 text-gray-600 border border-gray-200 px-3 py-1 rounded-full text-xs font-semibold">{p.category}</span></td>
                            <td className="px-6 py-4 font-bold text-emerald-600">{formatCurrency(p.price)}</td>
                            <td className="px-6 py-4 text-center font-black text-lg text-gray-700 transition-colors">{p.isPromotion ? (<div className="flex flex-col items-center leading-tight"><span className="text-rose-600">{visualStock}</span><span className="text-[9px] text-gray-400 font-bold uppercase mt-1">Máx Posible</span></div>) : (visualStock)}</td>
                            <td className="px-6 py-4 text-center">{visualStock > 20 ? <span className="inline-flex items-center gap-1.5 bg-emerald-100 text-emerald-700 px-2.5 py-1 rounded-full text-xs font-bold">Óptimo</span> : visualStock > 0 ? <span className="inline-flex items-center gap-1.5 bg-amber-100 text-amber-700 px-2.5 py-1 rounded-full text-xs font-bold">Bajo</span> : <span className="inline-flex items-center gap-1.5 bg-red-100 text-red-700 px-2.5 py-1 rounded-full text-xs font-bold">Agotado</span>}</td>
                            {currentUser?.role === 'admin' && (
                              <td className="px-6 py-4 text-right"><div className="flex items-center justify-end gap-2"><button onClick={() => handleOpenProductModal(p)} className="p-2 text-indigo-600 hover:bg-indigo-50 rounded-lg transition-colors"><Edit2 size={18} /></button><button onClick={() => handleDeleteProduct(p.id)} className="p-2 text-red-600 hover:bg-red-50 rounded-lg transition-colors"><Trash2 size={18} /></button></div></td>
                            )}
                          </tr>
                        )})}
                      </tbody>
                    </table>
                  </div>
                </div>
             </div>
          );

          const renderPurchases = () => { 
             const startObjP = purchasesStartDate ? new Date(purchasesStartDate + 'T00:00:00') : new Date('2000-01-01');
             const endObjP = purchasesEndDate ? new Date(purchasesEndDate + 'T23:59:59') : new Date('2100-01-01');
             const filteredPurchases = purchases.filter(p => { const d = new Date(p.date); return d >= startObjP && d <= endObjP; });
             return (
               <div className="p-6 h-full flex flex-col bg-gray-50 text-gray-800 overflow-hidden">
                 <div className="flex justify-between items-center mb-6">
                   <h2 className="text-2xl font-bold flex items-center gap-2 text-gray-900"><ShoppingBag className="text-indigo-600" /> Compras e Ingresos a Almacén</h2>
                   <button onClick={() => setShowPurchaseModal(true)} className="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2.5 rounded-xl font-bold flex items-center gap-2 transition-all shadow-sm shadow-emerald-600/20"><Plus size={18} /> Registrar Compra (Factura/Boleta)</button>
                 </div>
                 <div className="bg-white p-4 rounded-2xl border border-gray-200 shadow-sm flex flex-wrap items-center gap-4 mb-4 flex-shrink-0">
                   <div className="flex items-center gap-2"><Calendar className="text-gray-400" size={20} /><span className="font-bold text-gray-700">Desde:</span><input type="date" value={purchasesStartDate} onChange={e => setPurchasesStartDate(e.target.value)} className="border border-gray-300 rounded-lg px-3 py-1.5 text-sm font-medium focus:ring-2 focus:ring-emerald-500 outline-none" /></div>
                   <div className="flex items-center gap-2"><span className="font-bold text-gray-700">Hasta:</span><input type="date" value={purchasesEndDate} onChange={e => setPurchasesEndDate(e.target.value)} className="border border-gray-300 rounded-lg px-3 py-1.5 text-sm font-medium focus:ring-2 focus:ring-emerald-500 outline-none" /></div>
                   <div className="ml-auto flex items-center gap-3">
                     <span className="text-sm font-bold text-gray-500 bg-gray-100 px-3 py-1.5 rounded-lg border border-gray-200">{filteredPurchases.length} registros</span>
                     <div className="flex items-center gap-2"><span className="text-sm font-bold text-gray-500">Total Invertido:</span><span className="text-xl font-black text-emerald-600">{formatCurrency(filteredPurchases.reduce((sum, p) => sum + p.total, 0))}</span></div>
                   </div>
                 </div>
                 <div className="bg-white rounded-2xl overflow-hidden border border-gray-200 shadow-sm flex-1 flex flex-col">
                   <div className="overflow-x-auto flex-1 custom-scrollbar">
                     <table className="w-full text-left border-collapse">
                       <thead className="bg-gray-100 text-gray-600 text-sm uppercase font-semibold sticky top-0">
                         <tr><th className="px-6 py-4">Fecha</th><th className="px-6 py-4">Documento</th><th className="px-6 py-4">Proveedor</th><th className="px-6 py-4">Detalle de Compra</th><th className="px-6 py-4 text-right">Total Invertido</th><th className="px-6 py-4">Registrado por</th></tr>
                       </thead>
                       <tbody className="divide-y divide-gray-100">
                         {filteredPurchases.map(p => (
                           <tr key={p.id} className="hover:bg-gray-50/80 transition-colors">
                             <td className="px-6 py-4 text-sm text-gray-500 font-medium">{formatDate(new Date(p.date))}</td>
                             <td className="px-6 py-4"><span className="font-bold text-gray-700 uppercase">{p.docType}</span><div className="text-xs text-gray-500">#{p.docNumber}</div></td>
                             <td className="px-6 py-4 font-bold text-gray-800">{p.provider || 'Sin Nombre'}</td>
                             <td className="px-6 py-4">
                               <ul className="text-xs space-y-1">
                                 {p.items.map((item, i) => (
                                   <li key={i} className="text-gray-700"><span className="font-bold text-indigo-600">{item.qty}x</span> {item.productName} <span className="text-gray-400">({formatCurrency(item.cost)} c/u)</span></li>
                                 ))}
                               </ul>
                             </td>
                             <td className="px-6 py-4 text-right font-black text-rose-600">{formatCurrency(p.total)}</td>
                             <td className="px-6 py-4 text-sm text-gray-600 uppercase">{p.registeredBy}</td>
                           </tr>
                         ))}
                       </tbody>
                     </table>
                   </div>
                 </div>
               </div>
             );
          };

          const renderExpenses = () => { 
             const startObjE = expensesStartDate ? new Date(expensesStartDate + 'T00:00:00') : new Date('2000-01-01');
             const endObjE = expensesEndDate ? new Date(expensesEndDate + 'T23:59:59') : new Date('2100-01-01');
             const filteredExpenses = expenses.filter(e => { const d = new Date(e.date); return d >= startObjE && d <= endObjE; });
             return (
               <div className="p-6 h-full flex flex-col bg-gray-50 text-gray-800 overflow-hidden">
                 <div className="flex justify-between items-center mb-6">
                   <h2 className="text-2xl font-bold flex items-center gap-2 text-gray-900"><TrendingDown className="text-rose-600" /> Registro de Egresos y Gastos</h2>
                   <button onClick={() => setShowExpenseModal(true)} className="bg-rose-600 hover:bg-rose-700 text-white px-4 py-2.5 rounded-xl font-bold flex items-center gap-2 transition-all shadow-sm shadow-rose-600/20"><Plus size={18} /> Nuevo Egreso</button>
                 </div>
                 <div className="bg-white p-4 rounded-2xl border border-gray-200 shadow-sm flex flex-wrap items-center gap-4 mb-4 flex-shrink-0">
                   <div className="flex items-center gap-2"><Calendar className="text-gray-400" size={20} /><span className="font-bold text-gray-700">Desde:</span><input type="date" value={expensesStartDate} onChange={e => setExpensesStartDate(e.target.value)} className="border border-gray-300 rounded-lg px-3 py-1.5 text-sm font-medium focus:ring-2 focus:ring-rose-500 outline-none" /></div>
                   <div className="flex items-center gap-2"><span className="font-bold text-gray-700">Hasta:</span><input type="date" value={expensesEndDate} onChange={e => setExpensesEndDate(e.target.value)} className="border border-gray-300 rounded-lg px-3 py-1.5 text-sm font-medium focus:ring-2 focus:ring-rose-500 outline-none" /></div>
                   <div className="ml-auto flex items-center gap-3">
                     <span className="text-sm font-bold text-gray-500 bg-gray-100 px-3 py-1.5 rounded-lg border border-gray-200">{filteredExpenses.length} registros</span>
                     <div className="flex items-center gap-2"><span className="text-sm font-bold text-gray-500">Total Gastado:</span><span className="text-xl font-black text-rose-600">{formatCurrency(filteredExpenses.reduce((sum, e) => sum + e.amount, 0))}</span></div>
                   </div>
                 </div>
                 <div className="bg-white rounded-2xl overflow-hidden border border-gray-200 shadow-sm flex-1 flex flex-col">
                   <div className="overflow-x-auto flex-1 custom-scrollbar">
                     <table className="w-full text-left border-collapse">
                       <thead className="bg-gray-100 text-gray-600 text-sm uppercase font-semibold sticky top-0">
                         <tr><th className="px-6 py-4">Fecha</th><th className="px-6 py-4">Descripción / Motivo</th><th className="px-6 py-4 text-right">Monto</th><th className="px-6 py-4">Registrado por</th></tr>
                       </thead>
                       <tbody className="divide-y divide-gray-100">
                         {filteredExpenses.map(e => (
                           <tr key={e.id} className="hover:bg-gray-50/80 transition-colors">
                             <td className="px-6 py-4 text-sm text-gray-500 font-medium">{formatDate(new Date(e.date))}</td>
                             <td className="px-6 py-4 text-gray-800">{e.description}</td>
                             <td className="px-6 py-4 text-right font-black text-rose-600">{formatCurrency(e.amount)}</td>
                             <td className="px-6 py-4 text-sm text-gray-600 uppercase">{e.registeredBy}</td>
                           </tr>
                         ))}
                       </tbody>
                     </table>
                   </div>
                 </div>
               </div>
             );
          };

          // ================= MÓDULO VENTAS Y REPORTES (ACTUALIZADO) =================
          const renderSales = () => {
            // Lógica de filtrado por Fechas para el Historial
            const startObjH = historyStartDate ? new Date(historyStartDate + 'T00:00:00') : new Date('2000-01-01');
            const endObjH = historyEndDate ? new Date(historyEndDate + 'T23:59:59') : new Date('2100-01-01');

            // Filtrar VENTAS INDIVIDUALES en ese rango
            const filteredSales = sales.filter(s => {
              const d = new Date(s.date);
              return d >= startObjH && d <= endObjH;
            });

            // Filtrar CIERRES DE CAJA en ese rango
            let filteredReports = boxReports.filter(report => {
              const d = new Date(report.endTime);
              return d >= startObjH && d <= endObjH;
            });

            // Eliminar cierres duplicados generados por errores de conexión en el pasado
            const seenSessions = new Set();
            filteredReports = filteredReports.filter(report => {
              const signature = `${report.startTime.getTime()}_${report.openedBy}`;
              if (seenSessions.has(signature)) return false; 
              seenSessions.add(signature);
