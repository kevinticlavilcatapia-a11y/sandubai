                                    </div>
                                    <div className="bg-white p-3 rounded-xl border border-blue-100 shadow-sm">
                                      <div className="text-[10px] font-bold text-blue-400 uppercase mb-1">Tarjetas (POS)</div>
                                      <div className="font-bold text-blue-600">{formatCurrency(session.salesTarjeta)}</div>
                                    </div>
                                    <div className="bg-white p-3 rounded-xl border border-purple-100 shadow-sm">
                                      <div className="text-[10px] font-bold text-purple-400 uppercase mb-1">Digital (Yape/Plin)</div>
                                      <div className="font-bold text-purple-600">{formatCurrency(session.salesYape + session.salesPlin)}</div>
                                    </div>
                                  </div>
                                  <div className="flex justify-between items-center text-sm border-t border-gray-200 pt-3">
                                    <span className="font-bold text-gray-500">Total Transacciones: {session.totalSalesCount}</span>
                                    <span className="font-black text-gray-800">Total Venta: {formatCurrency(totalVendido)}</span>
                                  </div>
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      )}
                    </div>
                  ) : (
                    // VISTA CAJERO: Turno Actual
                    <div className="flex-1 flex flex-col gap-6 overflow-hidden">
                      {boxSession ? (
                        <>
                          <div className="grid grid-cols-2 lg:grid-cols-3 gap-4">
                            <div className="bg-white p-4 rounded-2xl border border-gray-200 shadow-sm flex flex-col">
                              <span className="text-gray-500 text-sm font-bold mb-1">Monto Inicial (Caja)</span>
                              <span className="text-2xl font-black text-gray-800">{formatCurrency(boxSession.initialCash)}</span>
                            </div>
                            <div className="bg-white p-4 rounded-2xl border border-gray-200 shadow-sm flex flex-col">
                              <span className="text-gray-500 text-sm font-bold mb-1">Ventas en Efectivo</span>
                              <span className="text-2xl font-black text-emerald-600">{formatCurrency(boxSession.salesEfectivo)}</span>
                            </div>
                            <div className="bg-indigo-600 p-4 rounded-2xl border border-indigo-700 shadow-sm flex flex-col text-white relative overflow-hidden">
                              <div className="absolute -right-4 -bottom-4 opacity-20">
                                <Wallet size={80} />
                              </div>
                              <span className="text-indigo-100 text-sm font-bold mb-1">Efectivo Total en Caja</span>
                              <span className="text-2xl font-black">{formatCurrency(boxSession.initialCash + boxSession.salesEfectivo)}</span>
                            </div>
                            <div className="bg-white p-4 rounded-2xl border border-blue-200 shadow-sm flex flex-col">
                              <span className="text-gray-500 text-sm font-bold mb-1 flex items-center gap-1"><CreditCard size={16} className="text-blue-600"/> Tarjeta (POS)</span>
                              <span className="text-2xl font-black text-blue-600">{formatCurrency(boxSession.salesTarjeta)}</span>
                            </div>
                            <div className="bg-white p-4 rounded-2xl border border-purple-200 shadow-sm flex flex-col">
                              <span className="text-gray-500 text-sm font-bold mb-1 flex items-center gap-1"><Smartphone size={16} className="text-purple-600"/> Yape</span>
                              <span className="text-2xl font-black text-purple-600">{formatCurrency(boxSession.salesYape)}</span>
                            </div>
                            <div className="bg-white p-4 rounded-2xl border border-cyan-200 shadow-sm flex flex-col">
                              <span className="text-gray-500 text-sm font-bold mb-1 flex items-center gap-1"><Smartphone size={16} className="text-cyan-600"/> Plin</span>
                              <span className="text-2xl font-black text-cyan-600">{formatCurrency(boxSession.salesPlin)}</span>
                            </div>
                          </div>

                          <div className="bg-white rounded-2xl overflow-hidden border border-gray-200 shadow-sm flex-1 flex flex-col relative">
                            <div className="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                              <h3 className="font-bold text-gray-800 flex items-center gap-2"><ShoppingCart size={18}/> Ventas de este turno (Local)</h3>
                              <button 
                                onClick={() => setShowCloseBoxModal(true)}
                                className="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-xl font-bold flex items-center gap-2 transition-all shadow-sm shadow-red-600/20"
                              >
                                <Lock size={18} /> Cerrar Turno Activo
                              </button>
                            </div>
                            <div className="overflow-x-auto flex-1 custom-scrollbar">
                              <table className="w-full text-left border-collapse">
                                <thead className="bg-white text-gray-500 text-xs uppercase font-bold sticky top-0 z-10 shadow-sm">
                                  <tr>
                                    <th className="px-6 py-3">ID Venta</th>
                                    <th className="px-6 py-3">Hora</th>
                                    <th className="px-6 py-3">Detalle</th>
                                    <th className="px-6 py-3">Método Pago</th>
                                    <th className="px-6 py-3 text-right">Total</th>
                                  </tr>
                                </thead>
                                <tbody className="divide-y divide-gray-100">
                                  {sales.filter(s => s.sessionId === boxSession.id).map(sale => {
                                    const method = PAYMENT_METHODS.find(m => m.id === sale.paymentMethod);
                                    const MethodIcon = method?.icon || Banknote;
                                    return (
                                      <tr key={sale.id} className="hover:bg-gray-50/80 transition-colors">
                                        <td className="px-6 py-4 font-mono text-indigo-600 font-bold uppercase text-xs">#{sale.id}</td>
                                        <td className="px-6 py-4 text-sm text-gray-600 font-medium">{formatTime(new Date(sale.date))}</td>
                                        <td className="px-6 py-4">
                                          <ul className="text-xs space-y-1">
                                            {sale.items.map(item => (
                                              <li key={item.id} className="text-gray-700 font-medium">
                                                <span className="text-indigo-600 font-bold">{item.quantity}x</span> {item.name}
                                              </li>
                                            ))}
                                          </ul>
                                        </td>
                                        <td className="px-6 py-4">
                                          <span className={`inline-flex items-center gap-1.5 px-2.5 py-1 rounded-md text-[10px] font-bold text-white uppercase ${method?.color || 'bg-gray-600'}`}>
                                            <MethodIcon size={12} /> {method?.name}
                                          </span>
                                        </td>
                                        <td className="px-6 py-4 text-right font-black text-emerald-600">{formatCurrency(sale.total)}</td>
                                      </tr>
                                    );
                                  })}
                                  {sales.filter(s => s.sessionId === boxSession.id).length === 0 && (
                                    <tr><td colSpan="5" className="text-center py-12 text-gray-400 font-medium">Aún no hay ventas en este turno local.</td></tr>
                                  )}
                                </tbody>
                              </table>
                            </div>
                          </div>
                        </>
                      ) : (
                        <div className="flex-1 flex flex-col items-center justify-center bg-white rounded-2xl border border-gray-200 shadow-sm">
                          <Lock size={64} className="text-gray-300 mb-4" />
                          <h3 className="text-xl font-bold text-gray-800 mb-2">La caja está cerrada en este dispositivo</h3>
                          <p className="text-gray-500">Abre un turno para ver tu progreso local.</p>
                        </div>
                      )}
                    </div>
                  )
                ) : (
                  // VISTA HISTORIAL DE CAJAS
                  <div className="bg-white rounded-2xl overflow-hidden border border-gray-200 shadow-sm flex-1 flex flex-col">
                    <div className="overflow-x-auto flex-1 custom-scrollbar">
                      <table className="w-full text-left border-collapse">
                        <thead className="bg-gray-100 text-gray-600 text-sm uppercase font-semibold sticky top-0 z-10">
                          <tr>
                            <th className="px-6 py-4">Apertura / Cierre</th>
                            <th className="px-6 py-4 text-center">N° Ventas</th>
                            <th className="px-6 py-4 text-right">Ingresos Digitales</th>
                            <th className="px-6 py-4 text-right">Efectivo Sistema</th>
                            <th className="px-6 py-4 text-right">Ef. Declarado</th>
                            <th className="px-6 py-4 text-right border-l-2 border-gray-200">Descuadre</th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-gray-100">
                          {boxReports.map(report => (
                            <tr key={report.id} className="hover:bg-gray-50/80 transition-colors">
                              <td className="px-6 py-4 text-sm text-gray-700 font-medium">
                                <div className="flex flex-col gap-1">
                                  <span className="flex items-center gap-1 text-emerald-600"><Unlock size={14}/> {formatDate(new Date(report.startTime))}</span>
                                  <span className="flex items-center gap-1 text-red-600"><Lock size={14}/> {formatDate(new Date(report.endTime))}</span>
                                  <span className="text-[10px] text-gray-400 mt-1 uppercase">Cajero: {report.openedBy}</span>
                                </div>
                              </td>
                              <td className="px-6 py-4 text-center font-bold text-gray-600">{report.totalSalesCount}</td>
                              <td className="px-6 py-4 text-right">
                                <div className="flex flex-col items-end gap-1">
                                  <span className="text-[11px] font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded shadow-sm border border-blue-100 min-w-[100px] text-right">POS: {formatCurrency(report.salesTarjeta)}</span>
                                  <span className="text-[11px] font-bold text-purple-600 bg-purple-50 px-2 py-0.5 rounded shadow-sm border border-purple-100 min-w-[100px] text-right">Yape: {formatCurrency(report.salesYape)}</span>
                                  <span className="text-[11px] font-bold text-cyan-600 bg-cyan-50 px-2 py-0.5 rounded shadow-sm border border-cyan-100 min-w-[100px] text-right">Plin: {formatCurrency(report.salesPlin)}</span>
                                </div>
                              </td>
                              <td className="px-6 py-4 text-right">
                                <div className="flex flex-col items-end">
                                  <span className="font-black text-gray-800">{formatCurrency(report.efectivoEsperado)}</span>
                                  <span className="text-[10px] text-gray-400 font-bold uppercase">Incluye fondo inicial</span>
                                </div>
                              </td>
                              <td className="px-6 py-4 text-right">
                                <span className="font-black text-gray-800">{formatCurrency(report.efectivoDeclarado)}</span>
                              </td>
                              <td className="px-6 py-4 text-right border-l-2 border-gray-200">
                                <div className={`inline-flex items-center gap-1 px-3 py-1.5 rounded-lg font-black text-sm shadow-sm border ${
                                  report.descuadre === 0 
                                    ? 'bg-emerald-50 text-emerald-600 border-emerald-200' 
                                    : report.descuadre > 0 
                                      ? 'bg-blue-50 text-blue-600 border-blue-200' 
                                      : 'bg-red-50 text-red-600 border-red-200'
                                }`}>
                                  {report.descuadre === 0 ? 'CUADRADO' : report.descuadre > 0 ? `SOBRA: ${formatCurrency(report.descuadre)}` : `FALTA: ${formatCurrency(Math.abs(report.descuadre))}`}
                                </div>
                              </td>
                            </tr>
                          ))}
                          {boxReports.length === 0 && (
                            <tr><td colSpan="6" className="text-center py-16 text-gray-400 font-medium">No hay reportes de cajas de ningún usuario.</td></tr>
                          )}
                        </tbody>
                      </table>
                    </div>
                  </div>
                )}
              </div>
            );
          };

          const renderUsers = () => (
            <div className="p-6 h-full flex flex-col bg-gray-50 text-gray-800 overflow-hidden">
              <div className="flex justify-between items-center mb-6">
                <h2 className="text-2xl font-bold flex items-center gap-2 text-gray-900">
                  <Users className="text-indigo-600" /> Gestión de Usuarios
                </h2>
                <button 
                  onClick={() => handleOpenUserModal()}
                  className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2.5 rounded-xl font-bold flex items-center gap-2 transition-all shadow-sm shadow-indigo-600/20"
                >
                  <Plus size={18} /> Nuevo Usuario
                </button>
              </div>

              <div className="bg-white rounded-2xl overflow-hidden border border-gray-200 shadow-sm flex-1 flex flex-col">
                <div className="overflow-x-auto flex-1 custom-scrollbar">
                  <table className="w-full text-left border-collapse">
                    <thead className="bg-gray-100 text-gray-600 text-sm uppercase font-semibold sticky top-0 z-10">
                      <tr>
                        <th className="px-6 py-4">ID</th>
                        <th className="px-6 py-4">Nombre Completo</th>
                        <th className="px-6 py-4">Usuario (Login)</th>
                        <th className="px-6 py-4">Rol de Acceso</th>
                        <th className="px-6 py-4 text-right">Acciones</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-gray-100">
                      {users.map(u => (
                        <tr key={u.id} className="hover:bg-gray-50/80 transition-colors">
                          <td className="px-6 py-4 font-bold text-gray-500">#{u.id}</td>
                          <td className="px-6 py-4 font-bold text-gray-800">{u.name}</td>
                          <td className="px-6 py-4 text-gray-600 font-medium">{u.username}</td>
                          <td className="px-6 py-4">
                            <span className={`inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-bold uppercase ${u.role === 'admin' ? 'bg-purple-100 text-purple-700' : 'bg-blue-100 text-blue-700'}`}>
                              {u.role === 'admin' ? 'Administrador' : 'Personal'}
                            </span>
                          </td>
                          <td className="px-6 py-4 text-right">
                            <div className="flex items-center justify-end gap-2">
                              <button 
                                onClick={() => handleOpenUserModal(u)}
                                className="p-2 text-indigo-600 hover:bg-indigo-50 rounded-lg transition-colors"
                                title="Editar"
                              >
                                <Edit2 size={18} />
                              </button>
                              <button 
                                onClick={() => handleDeleteUser(u.id)}
                                disabled={u.id === currentUser?.id}
                                className="p-2 text-red-600 hover:bg-red-50 rounded-lg transition-colors disabled:opacity-30 disabled:cursor-not-allowed"
                                title="Eliminar"
                              >
                                <Trash2 size={18} />
                              </button>
                            </div>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          );

          const renderLoginScreen = () => (
            <div className="flex h-screen w-full bg-gray-900 items-center justify-center p-4 selection:bg-indigo-500/30">
              <div className="bg-white rounded-3xl shadow-2xl overflow-hidden w-full max-w-4xl flex flex-col md:flex-row relative">
                <div className="md:w-1/2 bg-indigo-600 p-12 flex flex-col justify-center items-center text-white relative overflow-hidden min-h-[400px]">
                  <div className="absolute top-0 left-0 w-full h-full opacity-10 pointer-events-none">
                    <Wine size={300} className="absolute -left-10 -top-10" />
                    <Beer size={200} className="absolute right-10 bottom-10" />
                  </div>
                  <img 
                    src="icon-512 (1).png" 
                    alt="Logo SANDUABI" 
                    className="w-32 h-32 object-contain rounded-full border-4 border-white/20 shadow-xl mb-6 relative z-10 bg-white"
                    onError={(e) => {
                      e.target.onerror = null;
                      e.target.src = 'https://ui-avatars.com/api/?name=SD&background=4f46e5&color=fff&rounded=true';
                    }}
                  />
                  <h1 className="text-4xl font-black tracking-wider text-center mb-2 relative z-10">SANDUABI</h1>
                  <p className="text-indigo-200 font-bold tracking-widest uppercase text-sm relative z-10">Terraza Club</p>
                </div>
                <div className="md:w-1/2 p-12 flex flex-col justify-center bg-gray-50 relative">
                  
                  {/* Indicador de Nube en el Login */}
                  <div className="absolute top-6 right-6 flex items-center gap-2">
                    {!sysAuthUser ? (
                      <span className="flex items-center gap-1.5 text-xs font-bold text-amber-500 bg-amber-50 px-3 py-1.5 rounded-full border border-amber-200">
                        <CloudOff size={14}/> Conectando BD...
                      </span>
                    ) : (
                      <span className="flex items-center gap-1.5 text-xs font-bold text-emerald-500 bg-emerald-50 px-3 py-1.5 rounded-full border border-emerald-200">
                        <Cloud size={14}/> Sincronizado
                      </span>
                    )}
                  </div>

                  <div className="mb-8 mt-4">
                    <h2 className="text-2xl font-black text-gray-900 mb-1">Iniciar Sesión</h2>
                    <p className="text-gray-500 font-medium text-sm">Ingresa tus credenciales para acceder al POS.</p>
                  </div>
                  <form onSubmit={handleLogin} className="space-y-5">
                    <div>
                      <label className="block text-sm font-bold text-gray-700 mb-1.5">Usuario</label>
                      <div className="relative">
                        <UserCircle className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" size={20} />
                        <input 
                          type="text" 
                          required 
                          disabled={!sysAuthUser || (isSyncing && users.length === 0)}
                          className="w-full bg-white border border-gray-300 rounded-xl py-3 pl-10 pr-4 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all font-medium disabled:bg-gray-100 disabled:text-gray-400" 
                          placeholder="ej. admin" 
                          value={loginForm.username} 
                          onChange={(e) => setLoginForm({...loginForm, username: e.target.value})} 
                        />
                      </div>
                    </div>
                    <div>
                      <label className="block text-sm font-bold text-gray-700 mb-1.5">Contraseña</label>
                      <div className="relative">
                        <Key className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" size={20} />
                        <input 
                          type="password" 
                          required 
                          disabled={!sysAuthUser || (isSyncing && users.length === 0)}
                          className="w-full bg-white border border-gray-300 rounded-xl py-3 pl-10 pr-4 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all font-medium disabled:bg-gray-100 disabled:text-gray-400" 
                          placeholder="••••••••" 
                          value={loginForm.password} 
                          onChange={(e) => setLoginForm({...loginForm, password: e.target.value})} 
                        />
                      </div>
                    </div>
                    <button 
                      type="submit" 
                      disabled={!sysAuthUser || (isSyncing && users.length === 0)}
                      className="w-full py-3.5 rounded-xl font-bold text-white bg-indigo-600 hover:bg-indigo-700 shadow-lg shadow-indigo-600/30 transition-all mt-4 disabled:bg-indigo-400 disabled:shadow-none"
                    >
                      {!sysAuthUser ? 'Conectando...' : 'Ingresar al Sistema'}
                    </button>
                  </form>
                </div>
              </div>
            </div>
          );

          if (!currentUser) {
            return (
              <>
                {renderLoginScreen()}
                {dialog && (
                  <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-[100] p-4">
                    <div className="bg-white rounded-2xl shadow-2xl p-6 max-w-sm w-full text-center">
                      <div className={`w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 ${dialog.type === 'alert' ? 'bg-indigo-100' : 'bg-amber-100'}`}>
                         {dialog.type === 'alert' ? <AlertCircle size={32} className="text-indigo-600"/> : <AlertCircle size={32} className="text-amber-500"/>}
                      </div>
                      <p className="text-gray-800 font-bold mb-6">{dialog.message}</p>
                      <div className="flex gap-3">
                        {dialog.type === 'confirm' && (
                          <button onClick={() => setDialog(null)} className="flex-1 py-3 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-xl font-bold transition-colors">Cancelar</button>
                        )}
                        <button 
                          onClick={() => { if (dialog.type === 'confirm' && dialog.onConfirm) dialog.onConfirm(); setDialog(null); }} 
                          className="flex-1 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-bold transition-colors"
                        >
                          {dialog.type === 'confirm' ? 'Confirmar' : 'Aceptar'}
                        </button>
                      </div>
                    </div>
                  </div>
                )}
              </>
            );
          }

          return (
            <>
              <div className="flex h-screen w-full bg-gray-50 font-sans text-gray-900 selection:bg-indigo-100 selection:text-indigo-900 print:hidden">
                
                {/* Sidebar Claro */}
                <div className="w-20 lg:w-64 bg-white border-r border-gray-200 flex flex-col z-20 shadow-sm">
                  <div className="h-24 flex items-center justify-center lg:justify-start lg:px-6 border-b border-gray-100">
                    <img 
                      src="icon-512 (1).png" 
                      alt="Logo SANDUABI Terraza Club" 
                      className="w-14 h-14 object-contain rounded-full border border-gray-100 shadow-sm"
                      onError={(e) => {
                        e.target.onerror = null;
                        e.target.src = 'https://ui-avatars.com/api/?name=SD&background=4f46e5&color=fff&rounded=true';
                      }}
                    />
                    <div className="hidden lg:block ml-3 flex flex-col">
                      <h1 className="font-black text-lg tracking-wider text-gray-900 leading-none">SANDUABI</h1>
                      <span className="text-[10px] font-bold text-gray-500 tracking-widest uppercase mt-0.5">Terraza Club</span>
                    </div>
                  </div>
                  
                  <nav className="flex-1 py-6 flex flex-col gap-2 px-3 overflow-y-auto custom-scrollbar">
                    {[
                      { id: 'pos', name: 'Punto de Venta', icon: ShoppingCart },
                      { id: 'inventory', name: 'Inventario', icon: Package },
                      { id: 'purchases', name: 'Compras', icon: ShoppingBag },
                      { id: 'expenses', name: 'Egresos', icon: TrendingDown },
                      { id: 'kardex', name: 'Kardex', icon: ClipboardList },
                      { id: 'sales', name: 'Reportes y Ventas', icon: History },
                      { id: 'users', name: 'Usuarios', icon: Users, adminOnly: true },
                    ]
                    .filter(tab => currentUser.role === 'admin' || (!tab.adminOnly && currentUser.allowedSections?.includes(tab.id)))
                    .map(tab => {
                      const Icon = tab.icon;
                      const isActive = activeTab === tab.id;
                      return (
                        <button
                          key={tab.id}
                          onClick={() => setActiveTab(tab.id)}
                          className={`flex items-center p-3 rounded-xl transition-all duration-200 group ${
                            isActive 
                              ? 'bg-indigo-50 text-indigo-700 border border-indigo-100 font-bold' 
                              : 'text-gray-500 hover:bg-gray-50 hover:text-gray-900 border border-transparent font-semibold'
                          }`}
                        >
                          <Icon size={24} className={isActive ? 'text-indigo-600' : 'text-gray-400 group-hover:text-indigo-500'} />
                          <span className="hidden lg:block ml-3 whitespace-nowrap">{tab.name}</span>
                        </button>
                      )
                    })}
                  </nav>

                  {/* Indicador Status de Caja y Usuario (Sidebar Bottom) */}
                  <div className="p-4 border-t border-gray-100 flex flex-col gap-3">
                    <div className="flex items-center gap-3 p-2">
                       <div className="w-10 h-10 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-700 font-black uppercase shadow-sm">
                         {currentUser.name.charAt(0)}
                       </div>
                       <div className="hidden lg:block overflow-hidden">
                         <div className="text-sm font-bold text-gray-900 truncate leading-tight">{currentUser.name}</div>
                         <div className="text-[10px] font-bold text-gray-500 uppercase tracking-widest">{currentUser.role === 'admin' ? 'Administrador' : 'Personal'}</div>
                       </div>
                    </div>

                    <div className={`p-3 rounded-xl flex items-center justify-between ${boxSession ? 'bg-emerald-50 border border-emerald-100' : 'bg-red-50 border border-red-100'}`}>
                      <div className="flex items-center gap-3">
                        <div className={`w-8 h-8 rounded-full flex items-center justify-center ${boxSession ? 'bg-emerald-100 text-emerald-600' : 'bg-red-100 text-red-600'}`}>
                          {boxSession ? <Unlock size={16}/> : <Lock size={16}/>}
                        </div>
                        <div className="hidden lg:block">
                          <div className={`text-xs font-bold uppercase tracking-wide ${boxSession ? 'text-emerald-700' : 'text-red-700'}`}>
                            {boxSession ? 'Caja Abierta' : 'Caja Cerrada'}
                          </div>
                          {boxSession && <div className="text-[10px] text-emerald-600 font-medium">Local</div>}
                        </div>
                      </div>
                    </div>

                    {boxSession && (
                       <button
                         onClick={() => setShowCloseBoxModal(true)}
                         className="w-full flex items-center justify-center gap-2 p-3 rounded-xl text-white bg-red-600 hover:bg-red-700 shadow-md shadow-red-600/20 transition-all font-bold"
                       >
                         <Lock size={18} />
                         <span className="hidden lg:inline">Cerrar Caja</span>
                       </button>
                    )}

                    <button
                      onClick={handleLogout}
                      className="w-full flex items-center justify-center gap-2 p-3 rounded-xl text-gray-500 hover:bg-gray-200 hover:text-gray-700 transition-colors font-bold border border-transparent"
                    >
                      <LogOut size={18} />
                      <span className="hidden lg:inline">Cerrar Sesión</span>
                    </button>
                  </div>
                </div>

                {/* Main Content */}
                <main className="flex-1 relative">
                  {activeTab === 'pos' && renderPOS()}
                  {activeTab === 'inventory' && renderInventory()}
                  {activeTab === 'purchases' && renderPurchases()}
                  {activeTab === 'expenses' && renderExpenses()}
                  {activeTab === 'kardex' && renderKardex()}
                  {activeTab === 'sales' && renderSales()}
                  {activeTab === 'users' && currentUser.role === 'admin' && renderUsers()}
                </main>

                {/* Modales de la Aplicación */}
                
                {/* Modal de Pago */}
                {showPaymentModal && (
                  <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                    <div className="bg-white border border-gray-200 rounded-3xl w-full max-w-md overflow-hidden shadow-2xl">
                      <div className="p-8 text-center border-b border-gray-100 bg-gray-50">
                        <h3 className="text-lg font-bold text-gray-500 mb-2 uppercase tracking-wide">Total a Cobrar</h3>
                        <div className="text-5xl font-black text-gray-900">{formatCurrency(cartTotal)}</div>
                      </div>
                      <div className="p-8">
                        <p className="text-gray-500 mb-6 text-center text-sm font-semibold">Selecciona el método de pago</p>
                        <div className="grid grid-cols-2 gap-4">
                          {PAYMENT_METHODS.map(method => {
                            const Icon = method.icon;
                            return (
                              <button
                                key={method.id}
                                onClick={() => handleCheckout(method.id)}
                                className={`${method.color} hover:brightness-110 text-white p-5 rounded-2xl flex flex-col items-center justify-center gap-3 transition-all active:scale-95 shadow-md`}
                              >
                                <Icon size={32} />
                                <span className="font-bold">{method.name}</span>
                              </button>
                            )
                          })}
                        </div>
                      </div>
                      <div className="p-4 bg-gray-50">
                        <button 
                          onClick={() => setShowPaymentModal(false)}
                          className="w-full py-3.5 rounded-xl font-bold text-gray-600 hover:bg-gray-200 transition-colors"
                        >
                          Cancelar
                        </button>
                      </div>
                    </div>
                  </div>
                )}

                {/* Modal de Stock Manual */}
                {showStockModal && (
                  <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                    <div className="bg-white border border-gray-200 rounded-3xl w-full max-w-md overflow-hidden shadow-2xl">
                      <div className="p-6 border-b border-gray-100 bg-gray-50">
                        <h3 className="text-xl font-bold text-gray-900 flex items-center gap-2">
                          <ArrowUpCircle className="text-emerald-600" /> Ingreso de Stock Manual
                        </h3>
                      </div>
                      <form onSubmit={handleAddStock} className="p-6 space-y-5">
                        
                        <div>
                          <label className="block text-sm font-bold text-gray-700 mb-1.5">Producto</label>
                          <select 
                            required
                            className="w-full bg-white border border-gray-300 rounded-xl p-3 text-gray-900 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent font-medium"
                            value={stockForm.productId}
                            onChange={(e) => setStockForm({...stockForm, productId: e.target.value})}
                          >
                            <option value="">-- Seleccionar Producto --</option>
                            {products.filter(p => !p.isPromotion).map(p => (
                              <option key={p.id} value={p.id}>{p.name} (Stock: {p.stock})</option>
                            ))}
                          </select>
                        </div>

                        <div>
                          <label className="block text-sm font-bold text-gray-700 mb-1.5">Cantidad a ingresar</label>
                          <input 
                            type="number" 
                            min="1"
                            required
                            className="w-full bg-white border border-gray-300 rounded-xl p-3 text-gray-900 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent font-medium"
                            value={stockForm.quantity}
                            onChange={(e) => setStockForm({...stockForm, quantity: e.target.value})}
                          />
                        </div>

                        <div>
                          <label className="block text-sm font-bold text-gray-700 mb-1.5">Motivo / Detalle</label>
                          <input 
                            type="text" 
                            required
                            className="w-full bg-white border border-gray-300 rounded-xl p-3 text-gray-900 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent font-medium"
                            value={stockForm.reason}
                            onChange={(e) => setStockForm({...stockForm, reason: e.target.value})}
                            placeholder="Ej: Ajuste manual o compra menor"
                          />
                        </div>

                        <div className="flex gap-3 pt-4">
                          <button 
                            type="button"
                            onClick={() => setShowStockModal(false)}
                            className="flex-1 py-3.5 rounded-xl font-bold text-gray-600 bg-gray-100 hover:bg-gray-200 transition-colors"
                          >
                            Cancelar
                          </button>
                          <button 
                            type="submit"
                            className="flex-1 py-3.5 rounded-xl font-bold text-white bg-emerald-600 hover:bg-emerald-700 shadow-lg shadow-emerald-600/30 transition-all"
                          >
                            Registrar
                          </button>
                        </div>
                      </form>
                    </div>
                  </div>
                )}

                {/* Modal de Producto / Promoción */}
                {showProductModal && (
                  <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                    <div className="bg-white border border-gray-200 rounded-3xl w-full max-w-lg overflow-hidden shadow-2xl">
                      <div className="p-6 border-b border-gray-100 bg-gray-50 flex items-center justify-between">
                        <h3 className="text-xl font-bold text-gray-900 flex items-center gap-2">
                          <Package className="text-indigo-600" /> 
                          {productForm.id ? 'Editar Producto/Promo' : 'Nuevo Producto/Promo'}
                        </h3>
                      </div>
                      <form onSubmit={handleSaveProduct} className="p-6 space-y-4 max-h-[70vh] overflow-y-auto custom-scrollbar">
                        
                        <div>
                          <label className="block text-sm font-bold text-gray-700 mb-1.5">Nombre del Producto / Combo</label>
                          <input 
                            type="text" 
                            required
                            className="w-full bg-white border border-gray-300 rounded-xl p-3 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent font-medium"
                            value={productForm.name}
                            onChange={(e) => setProductForm({...productForm, name: e.target.value})}
                            placeholder="Ej: Cerveza Cristal 650ml / Promo 3x2"
                          />
                        </div>

                        <div className="grid grid-cols-2 gap-4">
                          <div>
                            <label className="block text-sm font-bold text-gray-700 mb-1.5">Categoría</label>
                            <select 
                              required
                              className="w-full bg-white border border-gray-300 rounded-xl p-3 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent font-medium"
                              value={productForm.category}
                              onChange={(e) => setProductForm({...productForm, category: e.target.value})}
                            >
                              <option value="" disabled>Seleccione...</option>
                              {categories.map(cat => (
                                <option key={cat} value={cat}>{cat}</option>
                              ))}
                            </select>
                          </div>
                          <div>
                            <label className="block text-sm font-bold text-gray-700 mb-1.5">Precio de Venta (S/)</label>
                            <input 
                              type="number" 
                              step="0.10"
                              min="0"
                              required
                              className="w-full bg-white border border-gray-300 rounded-xl p-3 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent font-medium"
                              value={productForm.price}
                              onChange={(e) => setProductForm({...productForm, price: e.target.value})}
                              placeholder="0.00"
                            />
                          </div>
                        </div>

                        <div className="grid grid-cols-2 gap-4">
                          <div>
                            <label className="block text-sm font-bold text-gray-700 mb-1.5">Stock Inicial</label>
                            <input 
                              type="number" 
                              min="0"
                              required={!productForm.id && !productForm.isPromotion}
                              disabled={!!productForm.id || productForm.isPromotion} 
                              className="w-full bg-white border border-gray-300 rounded-xl p-3 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent font-medium disabled:bg-gray-100 disabled:text-gray-500"
                              value={productForm.stock}
                              onChange={(e) => setProductForm({...productForm, stock: e.target.value})}
                              placeholder="0"
                            />
                            {!!productForm.id && !productForm.isPromotion && <p className="text-[10px] text-gray-500 mt-1 leading-tight">Usa "Ingresar Stock" para modificar inventario real.</p>}
                          </div>
                          <div>
                            <label className="block text-sm font-bold text-gray-700 mb-1.5">Foto del Producto</label>
                            <div className="flex items-center gap-3">
                              <div className="w-12 h-12 rounded-lg border border-gray-300 bg-gray-100 overflow-hidden flex items-center justify-center flex-shrink-0 shadow-sm">
                                 {imagePreview ? <img src={imagePreview} className="w-full h-full object-cover"/> : <ImageIcon size={20} className="text-gray-400" />}
                              </div>
                              <input 
                                type="file" 
                                accept="image/*"
                                className="w-full bg-white border border-gray-300 rounded-xl px-2 py-1.5 text-xs text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 font-medium file:mr-3 file:py-1.5 file:px-3 file:rounded-lg file:border-0 file:text-xs file:font-bold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 cursor-pointer"
                                onChange={handleImageChange}
                              />
                            </div>
                            <p className="text-[10px] text-gray-500 mt-1 leading-tight">Sube una foto desde tu dispositivo. Dejar vacío para imagen genérica.</p>
                          </div>
                        </div>

                        {/* Combo Promotion Logic */}
                        <div className="mt-2 bg-rose-50 p-4 rounded-xl border border-rose-200 shadow-sm">
                          <label className="flex items-center gap-2 cursor-pointer mb-2">
                             <input 
                               type="checkbox" 
                               className="w-4 h-4 rounded text-rose-500 focus:ring-rose-500 cursor-pointer border-gray-300" 
                               checked={productForm.isPromotion} 
                               onChange={e => setProductForm({...productForm, isPromotion: e.target.checked})} 
                             />
                             <span className="font-bold text-rose-700 text-sm">Este artículo es un COMBO / PROMOCIÓN</span>
                          </label>
                          {productForm.isPromotion && (
                            <div className="grid grid-cols-2 gap-3 mt-3 pt-3 border-t border-rose-200">
                               <div>
                                 <label className="block text-xs font-bold text-rose-900 mb-1">Producto Base a Descontar</label>
                                 <select 
                                   className="w-full bg-white border border-rose-300 rounded-lg p-2 text-sm focus:ring-rose-500 focus:border-rose-500" 
                                   value={productForm.baseProductId} 
                                   onChange={e => setProductForm({...productForm, baseProductId: e.target.value})} 
                                   required={productForm.isPromotion}
                                 >
                                   <option value="">Selecciona...</option>
                                   {products.filter(p => !p.isPromotion).map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                                 </select>
                               </div>
                               <div>
                                 <label className="block text-xs font-bold text-rose-900 mb-1">Cant. que descuenta</label>
                                 <input 
                                   type="number" 
                                   min="1" 
                                   className="w-full bg-white border border-rose-300 rounded-lg p-2 text-sm focus:ring-rose-500 focus:border-rose-500" 
                                   value={productForm.baseQuantity} 
                                   onChange={e => setProductForm({...productForm, baseQuantity: e.target.value})} 
                                   required={productForm.isPromotion}
                                 />
                               </div>
                            </div>
                          )}
                        </div>

                        <div className="flex gap-3 pt-4 border-t border-gray-100 mt-4">
                          <button 
                            type="button"
                            disabled={isSavingProduct}
                            onClick={() => setShowProductModal(false)}
                            className="flex-1 py-3.5 rounded-xl font-bold text-gray-600 bg-gray-100 hover:bg-gray-200 transition-colors disabled:opacity-50"
                          >
                            Cancelar
                          </button>
                          <button 
                            type="submit"
                            disabled={isSavingProduct}
                            className="flex-1 py-3.5 rounded-xl font-bold text-white bg-indigo-600 hover:bg-indigo-700 shadow-lg shadow-indigo-600/30 transition-all flex justify-center items-center gap-2 disabled:opacity-70 disabled:cursor-not-allowed"
                          >
                            {isSavingProduct ? (
                              <><Cloud size={18} className="animate-pulse" /> Guardando...</>
                            ) : (
                              productForm.id ? 'Guardar Cambios' : 'Crear Producto'
                            )}
                          </button>
                        </div>
                      </form>
                    </div>
                  </div>
                )}

                {/* Modal de Registro de Compras (Purchases) */}
                {showPurchaseModal && (
                  <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                    <div className="bg-white border border-gray-200 rounded-3xl w-full max-w-2xl overflow-hidden shadow-2xl flex flex-col max-h-[90vh]">
                      <div className="p-6 border-b border-gray-100 bg-gray-50 flex items-center gap-2">
                         <ShoppingBag className="text-emerald-600" />
                         <h3 className="text-xl font-bold text-gray-900">Registrar Compra a Proveedor</h3>
                      </div>
                      
                      <div className="flex-1 overflow-y-auto p-6 custom-scrollbar bg-white">
                        <div className="grid grid-cols-3 gap-4 mb-6 pb-6 border-b border-gray-200">
                           <div className="col-span-1">
                             <label className="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1">Proveedor (Opcional)</label>
                             <input type="text" className="w-full border border-gray-300 rounded-lg p-2.5 text-sm" placeholder="Ej: Backus SA" value={purchaseForm.provider} onChange={e => setPurchaseForm({...purchaseForm, provider: e.target.value})} />
                           </div>
                           <div className="col-span-1">
                             <label className="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1">Tipo de Documento</label>
                             <select className="w-full border border-gray-300 rounded-lg p-2.5 text-sm" value={purchaseForm.docType} onChange={e => setPurchaseForm({...purchaseForm, docType: e.target.value})}>
                               <option value="Factura">Factura</option>
                               <option value="Boleta">Boleta</option>
                               <option value="Guia">Guía / Recibo</option>
                             </select>
                           </div>
                           <div className="col-span-1">
                             <label className="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1">Nro Documento</label>
                             <input type="text" className="w-full border border-gray-300 rounded-lg p-2.5 text-sm" placeholder="F001-00142" value={purchaseForm.docNumber} onChange={e => setPurchaseForm({...purchaseForm, docNumber: e.target.value})} />
                           </div>
                        </div>

                        <div className="mb-4">
                          <h4 className="text-sm font-bold text-gray-800 mb-3 flex items-center gap-2"><Package size={16}/> Añadir Productos a la Compra</h4>
                          <div className="flex items-end gap-2 bg-gray-50 p-3 rounded-xl border border-gray-200">
                             <div className="flex-1">
                               <label className="block text-xs text-gray-500 font-bold mb-1">Producto</label>
                               <select className="w-full border border-gray-300 rounded-lg p-2 text-sm" value={purchaseItemTemp.productId} onChange={e => setPurchaseItemTemp({...purchaseItemTemp, productId: e.target.value})}>
                                 <option value="">Seleccionar...</option>
                                 {products.filter(p => !p.isPromotion).map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                               </select>
                             </div>
                             <div className="w-24">
                               <label className="block text-xs text-gray-500 font-bold mb-1">Cantidad</label>
                               <input type="number" min="1" className="w-full border border-gray-300 rounded-lg p-2 text-sm" value={purchaseItemTemp.qty} onChange={e => setPurchaseItemTemp({...purchaseItemTemp, qty: e.target.value})} />
                             </div>
                             <div className="w-32">
                               <label className="block text-xs text-gray-500 font-bold mb-1">Costo Unit. (S/)</label>
                               <input type="number" step="0.10" min="0" className="w-full border border-gray-300 rounded-lg p-2 text-sm" value={purchaseItemTemp.cost} onChange={e => setPurchaseItemTemp({...purchaseItemTemp, cost: e.target.value})} />
                             </div>
                             <button type="button" onClick={handleAddPurchaseItem} className="bg-emerald-600 hover:bg-emerald-700 text-white p-2 rounded-lg font-bold transition-colors">
                               <Plus size={20} />
                             </button>
                          </div>
                        </div>

                        {purchaseForm.items.length > 0 && (
                          <div className="border border-gray-200 rounded-xl overflow-hidden shadow-sm">
                             <table className="w-full text-sm text-left">
                               <thead className="bg-gray-100 text-gray-600 text-xs uppercase font-bold">
                                 <tr>
                                   <th className="px-4 py-2">Producto</th>
                                   <th className="px-4 py-2 text-center">Cant.</th>
                                   <th className="px-4 py-2 text-right">Costo U.</th>
                                   <th className="px-4 py-2 text-right">Subtotal</th>
                                   <th className="px-4 py-2 text-center">X</th>
                                 </tr>
                               </thead>
                               <tbody className="divide-y divide-gray-100">
                                 {purchaseForm.items.map((it, idx) => (
                                   <tr key={idx} className="hover:bg-gray-50">
                                     <td className="px-4 py-2 font-medium text-gray-800">{it.productName}</td>
                                     <td className="px-4 py-2 text-center text-indigo-600 font-bold">{it.qty}</td>
                                     <td className="px-4 py-2 text-right">{formatCurrency(it.cost)}</td>
                                     <td className="px-4 py-2 text-right font-bold text-gray-700">{formatCurrency(it.qty * it.cost)}</td>
                                     <td className="px-4 py-2 text-center">
                                       <button type="button" onClick={() => handleRemovePurchaseItem(idx)} className="text-red-500 hover:text-red-700 bg-red-50 p-1.5 rounded-lg"><Trash2 size={14}/></button>
                                     </td>
                                   </tr>
                                 ))}
                               </tbody>
                             </table>
                             <div className="bg-gray-50 p-4 flex justify-end items-center gap-4 border-t border-gray-200">
                               <span className="text-gray-500 font-bold">Total Compra:</span>
                               <span className="text-2xl font-black text-emerald-600">{formatCurrency(purchaseForm.items.reduce((sum, item) => sum + (item.qty * item.cost), 0))}</span>
                             </div>
                          </div>
                        )}
                      </div>

                      <div className="p-4 bg-gray-50 border-t border-gray-100 flex gap-3">
                         <button type="button" onClick={() => setShowPurchaseModal(false)} className="flex-1 py-3.5 rounded-xl font-bold text-gray-600 bg-gray-200 hover:bg-gray-300 transition-colors">Cancelar</button>
                         <button type="button" onClick={handleSavePurchase} className="flex-1 py-3.5 rounded-xl font-bold text-white bg-emerald-600 hover:bg-emerald-700 shadow-lg shadow-emerald-600/30 transition-all flex justify-center gap-2"><ShoppingCart size={18}/> Procesar e Ingresar Stock</button>
                      </div>
                    </div>
                  </div>
                )}

                {/* Modal de Registro de Egresos (Expenses) */}
                {showExpenseModal && (
                  <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                    <div className="bg-white border border-gray-200 rounded-3xl w-full max-w-sm overflow-hidden shadow-2xl">
                      <div className="p-6 border-b border-gray-100 bg-rose-50 flex items-center gap-2 text-rose-700">
                         <TrendingDown size={24} />
                         <h3 className="text-xl font-bold">Registrar Egreso</h3>
                      </div>
                      <form onSubmit={handleSaveExpense} className="p-6 space-y-4 bg-white">
                        <div>
                          <label className="block text-sm font-bold text-gray-700 mb-1.5">Descripción / Motivo</label>
                          <input type="text" required className="w-full border border-gray-300 rounded-xl p-3 text-sm focus:ring-rose-500 focus:border-rose-500" placeholder="Ej: Pago de Luz, Compra de hielo, etc." value={expenseForm.description} onChange={e => setExpenseForm({...expenseForm, description: e.target.value})} />
                        </div>
                        <div>
                          <label className="block text-sm font-bold text-gray-700 mb-1.5">Monto (S/)</label>
                          <input type="number" step="0.10" min="0" required className="w-full border border-gray-300 rounded-xl p-3 text-lg font-bold text-rose-600 focus:ring-rose-500 focus:border-rose-500" placeholder="0.00" value={expenseForm.amount} onChange={e => setExpenseForm({...expenseForm, amount: e.target.value})} />
                        </div>
                        <div className="pt-4 flex gap-3">
                          <button type="button" onClick={() => setShowExpenseModal(false)} className="flex-1 py-3.5 rounded-xl font-bold text-gray-600 bg-gray-100 hover:bg-gray-200">Cancelar</button>
                          <button type="submit" className="flex-1 py-3.5 rounded-xl font-bold text-white bg-rose-600 hover:bg-rose-700 shadow-lg shadow-rose-600/30">Guardar Egreso</button>
                        </div>
                      </form>
                    </div>
                  </div>
                )}

                {/* Modal de Categorías */}
                {showCategoryModal && (
                  <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                    <div className="bg-white border border-gray-200 rounded-3xl w-full max-w-sm overflow-hidden shadow-2xl flex flex-col max-h-[80vh]">
                      <div className="p-6 border-b border-gray-100 bg-gray-50 flex justify-between items-center">
                        <h3 className="text-xl font-bold text-gray-900 flex items-center gap-2">
                          <Tags className="text-indigo-600" /> Categorías
                        </h3>
                      </div>
                      
                      <div className="p-6 overflow-y-auto custom-scrollbar flex-1">
                        <form onSubmit={handleAddCategory} className="flex gap-2 mb-6">
                          <input 
                            type="text" 
                            required
                            placeholder="Nueva categoría..."
                            className="flex-1 bg-white border border-gray-300 rounded-xl px-4 py-2 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 font-medium"
                            value={newCategoryName}
                            onChange={(e) => setNewCategoryName(e.target.value)}
                          />
                          <button type="submit" className="bg-indigo-600 hover:bg-indigo-700 text-white p-2.5 rounded-xl transition-all shadow-sm">
                            <Plus size={20} />
                          </button>
                        </form>

                        <div className="space-y-2">
                          {categories.map(cat => (
                            <div key={cat} className="flex justify-between items-center p-3 bg-gray-50 border border-gray-100 rounded-xl">
                              <span className="font-bold text-gray-700">{cat}</span>
                              <button 
                                onClick={() => handleDeleteCategory(cat)}
                                className="text-gray-400 hover:text-red-500 transition-colors p-1"
                                title="Eliminar Categoría"
                              >
                                <Trash2 size={16} />
                              </button>
                            </div>
                          ))}
                        </div>
                      </div>

                      <div className="p-4 bg-gray-50 border-t border-gray-100">
                        <button 
                          onClick={() => setShowCategoryModal(false)}
                          className="w-full py-3 rounded-xl font-bold text-gray-600 bg-gray-200 hover:bg-gray-300 transition-colors"
                        >
                          Cerrar
                        </button>
                      </div>
                    </div>
                  </div>
                )}

                {/* Modal de Cierre de Caja */}
                {showCloseBoxModal && boxSession && (
                  <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                    <div className="bg-white border border-gray-200 rounded-3xl w-full max-w-md overflow-hidden shadow-2xl">
                      <div className="p-8 text-center border-b border-gray-100 bg-red-50">
                        <div className="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
                          <AlertCircle size={32} className="text-red-600" />
                        </div>
                        <h3 className="text-xl font-black text-gray-900 mb-2">Cierre de Caja</h3>
                        <p className="text-gray-600 font-medium">Cuenta todo el efectivo que tienes en físico e ingrésalo a continuación.</p>
                      </div>
                      
                      <form onSubmit={handleCloseBox}>
                        <div className="p-6">
                          <label className="block text-sm font-bold text-gray-700 mb-2">Efectivo Declarado (Billetes y Monedas)</label>
                          <div className="relative">
                            <span className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 font-bold">S/</span>
                            <input 
                              type="number" 
                              step="0.10"
                              min="0"
                              required
                              autoFocus
                              className="w-full bg-white border border-gray-300 rounded-xl py-3 pl-10 pr-4 text-gray-900 font-bold text-lg focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent transition-all"
                              value={declaredCashForm}
                              onChange={(e) => setDeclaredCashForm(e.target.value)}
                              placeholder="0.00"
                            />
                          </div>
                          <p className="text-xs text-gray-500 mt-2 font-medium">Este valor se guardará en el reporte para cuadrar caja.</p>
                        </div>

                        <div className="p-6 flex gap-3 pt-0">
                          <button 
                            type="button"
                            onClick={() => {
                              setShowCloseBoxModal(false);
                              setDeclaredCashForm('');
                            }}
                            className="flex-1 py-3.5 rounded-xl font-bold text-gray-600 bg-gray-100 hover:bg-gray-200 transition-colors"
                          >
                            Cancelar
                          </button>
                          <button 
                            type="submit"
                            className="flex-1 py-3.5 rounded-xl font-bold text-white bg-red-600 hover:bg-red-700 shadow-lg shadow-red-600/30 transition-all flex justify-center items-center gap-2"
                          >
                            <Lock size={18}/> Cerrar Turno
                          </button>
                        </div>
                      </form>
                    </div>
                  </div>
                )}

                {/* Modal de Usuarios */}
                {showUserModal && (
                  <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                    <div className="bg-white border border-gray-200 rounded-3xl w-full max-w-lg overflow-hidden shadow-2xl flex flex-col max-h-[90vh]">
                      <div className="p-6 border-b border-gray-100 bg-gray-50 flex-shrink-0">
                        <h3 className="text-xl font-bold text-gray-900 flex items-center gap-2">
                          <UserCircle className="text-indigo-600" /> 
                          {userForm.id ? 'Editar Usuario' : 'Nuevo Usuario'}
                        </h3>
                      </div>
                      
                      <form onSubmit={handleSaveUser} className="flex flex-col flex-1 overflow-hidden">
                        <div className="p-6 space-y-5 overflow-y-auto custom-scrollbar">
                          <div>
                            <label className="block text-sm font-bold text-gray-700 mb-1.5">Nombre Completo</label>
                            <input 
                              type="text" 
                              required
                              className="w-full bg-white border border-gray-300 rounded-xl p-3 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 font-medium"
                              value={userForm.name}
                              onChange={(e) => setUserForm({...userForm, name: e.target.value})}
                              placeholder="Ej: Juan Pérez"
                            />
                          </div>

                          <div className="grid grid-cols-2 gap-4">
                            <div>
                              <label className="block text-sm font-bold text-gray-700 mb-1.5">Usuario (Login)</label>
                              <input 
                                type="text" 
                                required
                                className="w-full bg-white border border-gray-300 rounded-xl p-3 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 font-medium"
                                value={userForm.username}
                                onChange={(e) => setUserForm({...userForm, username: e.target.value})}
                                placeholder="Ej: jperez"
                              />
                            </div>
                            <div>
                              <label className="block text-sm font-bold text-gray-700 mb-1.5">Contraseña</label>
                              <input 
                                type="text" 
                                required
                                className="w-full bg-white border border-gray-300 rounded-xl p-3 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 font-medium"
                                value={userForm.password}
                                onChange={(e) => setUserForm({...userForm, password: e.target.value})}
                                placeholder="Contraseña"
                              />
                            </div>
                          </div>

                          <div>
                            <label className="block text-sm font-bold text-gray-700 mb-1.5">Nivel de Acceso</label>
                            <select 
                              required
                              className="w-full bg-white border border-gray-300 rounded-xl p-3 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 font-medium"
                              value={userForm.role}
                              onChange={(e) => setUserForm({...userForm, role: e.target.value})}
                            >
                              <option value="personal">Personal / Empleado (Permisos a medida)</option>
                              <option value="admin">Administrador (Acceso Total a Todo)</option>
                            </select>
                          </div>

                          {userForm.role === 'personal' && (
                            <div className="bg-gray-50 border border-gray-200 rounded-2xl p-4 space-y-4">
                              <div>
                                <label className="block text-sm font-bold text-gray-900 mb-2 border-b border-gray-200 pb-2">Secciones Permitidas</label>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                                  {SECTION_OPTIONS.map(sec => (
                                    <label key={sec.id} className={`flex items-center gap-2 p-2.5 rounded-xl border cursor-pointer transition-colors ${userForm.allowedSections?.includes(sec.id) ? 'bg-indigo-50 border-indigo-200' : 'bg-white border-gray-200 hover:bg-gray-100'}`}>
                                      <input
                                        type="checkbox"
                                        checked={userForm.allowedSections?.includes(sec.id) || false}
                                        onChange={(e) => {
                                          const current = userForm.allowedSections || [];
                                          if (e.target.checked) setUserForm({...userForm, allowedSections: [...current, sec.id]});
                                          else setUserForm({...userForm, allowedSections: current.filter(s => s !== sec.id)});
                                        }}
                                        className="w-4 h-4 text-indigo-600 rounded border-gray-300 focus:ring-indigo-500 cursor-pointer"
                                      />
                                      <span className={`text-sm font-bold ${userForm.allowedSections?.includes(sec.id) ? 'text-indigo-700' : 'text-gray-700'}`}>{sec.name}</span>
                                    </label>
                                  ))}
                                </div>
                              </div>

                              {userForm.allowedSections?.includes('pos') && (
                                <div className="animate-in fade-in slide-in-from-top-2">
                                  <label className="block text-sm font-bold text-gray-900 mb-2 border-b border-gray-200 pb-2 flex items-center gap-2">
                                    <ShoppingCart size={16}/> Permisos de Venta en POS (Categorías)
                                  </label>
                                  <div className="grid grid-cols-2 gap-2">
                                    {categories.map(cat => (
                                      <label key={cat} className={`flex items-center gap-2 p-2 rounded-lg cursor-pointer transition-colors ${userForm.allowedCategories?.includes(cat) ? 'text-indigo-700 font-bold' : 'text-gray-600 font-medium hover:bg-gray-200'}`}>
                                        {userForm.allowedCategories?.includes(cat) ? <CheckSquare size={16} className="text-indigo-600"/> : <Square size={16} className="text-gray-400"/>}
                                        <input
                                          type="checkbox"
                                          className="hidden"
                                          checked={userForm.allowedCategories?.includes(cat) || false}
                                          onChange={(e) => {
                                            const current = userForm.allowedCategories || [];
                                            if (e.target.checked) setUserForm({...userForm, allowedCategories: [...current, cat]});
                                            else setUserForm({...userForm, allowedCategories: current.filter(c => c !== cat)});
                                          }}
                                        />
                                        <span className="text-sm">{cat}</span>
                                      </label>
                                    ))}
                                  </div>
                                </div>
                              )}
                            </div>
                          )}
                        </div>

                        <div className="p-6 flex gap-3 border-t border-gray-100 bg-gray-50 flex-shrink-0">
                          <button 
                            type="button"
                            onClick={() => setShowUserModal(false)}
                            className="flex-1 py-3.5 rounded-xl font-bold text-gray-600 bg-gray-200 hover:bg-gray-300 transition-colors"
                          >
                            Cancelar
                          </button>
                          <button 
                            type="submit"
                            className="flex-1 py-3.5 rounded-xl font-bold text-white bg-indigo-600 hover:bg-indigo-700 shadow-lg shadow-indigo-600/30 transition-all"
                          >
                            {userForm.id ? 'Guardar Cambios' : 'Crear Usuario'}
                          </button>
                        </div>
                      </form>
                    </div>
                  </div>
                )}

                {/* Diálogos Globales (Alertas / Confirmaciones) */}
                {dialog && (
                  <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-[100] p-4">
                    <div className="bg-white rounded-2xl shadow-2xl p-6 max-w-sm w-full text-center">
                      <div className={`w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 ${dialog.type === 'alert' ? 'bg-indigo-100' : 'bg-amber-100'}`}>
                         {dialog.type === 'alert' ? <AlertCircle size={32} className="text-indigo-600"/> : <AlertCircle size={32} className="text-amber-500"/>}
                      </div>
                      <p className="text-gray-800 font-bold mb-6">{dialog.message}</p>
                      <div className="flex gap-3">
                        {dialog.type === 'confirm' && (
                          <button onClick={() => setDialog(null)} className="flex-1 py-3 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-xl font-bold transition-colors">Cancelar</button>
                        )}
                        <button 
                          onClick={() => { if (dialog.type === 'confirm' && dialog.onConfirm) dialog.onConfirm(); setDialog(null); }} 
                          className="flex-1 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-bold transition-colors"
                        >
                          {dialog.type === 'confirm' ? 'Confirmar' : 'Aceptar'}
                        </button>
                      </div>
                    </div>
                  </div>
                )}
              </div>

              {/* --- TICKET DE IMPRESIÓN (Oculto en pantalla, visible al imprimir) --- */}
              <div className="hidden print:block w-[80mm] bg-white text-black font-mono text-sm p-4 mx-auto">
                {lastSale && (
                  <>
                    <div className="text-center font-black text-2xl mb-1">SANDUABI</div>
                    <div className="text-center font-bold text-sm mb-4">Terraza Club</div>
                    <div className="mb-1">Fecha: {formatDate(new Date(lastSale.date))}</div>
                    <div className="mb-1">Cajero: {lastSale.soldBy}</div>
                    <div className="mb-4">Ticket: #{lastSale.id.toUpperCase()}</div>
                    
                    <div className="border-b border-black border-dashed mb-2"></div>
                    
                    <table className="w-full text-left mb-2 text-sm">
                      <thead>
                        <tr>
                          <th className="pb-2">Cant</th>
                          <th className="pb-2">Descripción</th>
                          <th className="text-right pb-2">Total</th>
                        </tr>
                      </thead>
                      <tbody>
                        {lastSale.items.map(item => (
                          <tr key={item.id}>
                            <td className="align-top py-1">{item.quantity}</td>
                            <td className="align-top py-1 pr-2">{item.name}</td>
                            <td className="text-right align-top py-1">S/ {(item.price * item.quantity).toFixed(2)}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                    
                    <div className="border-b border-black border-dashed mb-2"></div>
                    
                    <div className="flex justify-between font-black text-lg mt-2 mb-6">
                      <span>TOTAL:</span>
                      <span>S/ {lastSale.total.toFixed(2)}</span>
                    </div>
                    
                    <div className="text-center text-xs">¡Gracias por su preferencia!</div>
                  </>
                )}
              </div>
            </>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<DiscotecaPOS />);
    </script>
</body>
</html>
