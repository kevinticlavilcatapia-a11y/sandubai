              return true;
            });

            // 1. Cálculos de Ventas Totales por Método de Pago
            const totalVentasGlobal = filteredSales.reduce((sum, s) => sum + s.total, 0);
            
            // Calculamos individualmente tomando en cuenta los pagos divididos si existen
            let ventasEfectivo = 0, ventasTarjeta = 0, ventasYape = 0, ventasCredito = 0;
            filteredSales.forEach(s => {
              if (s.paymentMethod === 'dividido' && s.splitAmounts) {
                ventasEfectivo += (s.splitAmounts.efectivo || 0);
                ventasTarjeta += (s.splitAmounts.tarjeta || 0);
                ventasYape += (s.splitAmounts.yape || 0);
                ventasCredito += (s.splitAmounts.credito || 0);
              } else {
                if (s.paymentMethod === 'efectivo') ventasEfectivo += s.total;
                if (s.paymentMethod === 'tarjeta') ventasTarjeta += s.total;
                if (s.paymentMethod === 'yape') ventasYape += s.total;
                if (s.paymentMethod === 'credito') ventasCredito += s.total;
              }
            });

            // 2. Cálculos de Productos Vendidos por Categoría
            const salesBreakdown = {};
            filteredSales.forEach(sale => {
              sale.items.forEach(item => {
                const prod = products.find(p => p.id === item.id);
                const category = prod ? prod.category : 'Otros / Eliminados';
                
                if (!salesBreakdown[category]) salesBreakdown[category] = {};
                if (!salesBreakdown[category][item.id]) {
                  salesBreakdown[category][item.id] = { name: item.name, qty: 0, total: 0 };
                }
                salesBreakdown[category][item.id].qty += item.quantity;
                salesBreakdown[category][item.id].total += (item.price * item.quantity);
              });
            });

            return (
              <div className="p-6 h-full flex flex-col bg-gray-50 text-gray-800 overflow-hidden">
                <div className="flex justify-between items-center mb-6">
                  <h2 className="text-2xl font-bold flex items-center gap-2 text-gray-900">
                    {currentUser?.role === 'admin' && salesTab === 'actual' ? <Activity className="text-emerald-600" /> : <History className="text-indigo-600" />}
                    {currentUser?.role === 'admin' && salesTab === 'actual' ? 'Cajas Abiertas (En Vivo)' : 'Reporte Consolidado de Ventas'}
                  </h2>
                  
                  <div className="flex bg-white rounded-xl border border-gray-200 p-1 shadow-sm">
                    <button 
                      onClick={() => setSalesTab('actual')}
                      className={`px-6 py-2 rounded-lg font-bold text-sm transition-all ${salesTab === 'actual' ? 'bg-indigo-600 text-white shadow-md' : 'text-gray-500 hover:text-gray-900'}`}
                    >
                      {currentUser?.role === 'admin' ? 'En Vivo (Abiertas)' : 'Turno Actual'}
                    </button>
                    <button 
                      onClick={() => setSalesTab('historial')}
                      className={`px-6 py-2 rounded-lg font-bold text-sm transition-all ${salesTab === 'historial' ? 'bg-indigo-600 text-white shadow-md' : 'text-gray-500 hover:text-gray-900'}`}
                    >
                      Historial & Reportes
                    </button>
                  </div>
                </div>

                {salesTab === 'actual' ? (
                  currentUser?.role === 'admin' ? (
                    // VISTA ADMINISTRADOR: Cajas en Vivo
                    <div className="flex-1 overflow-y-auto custom-scrollbar pr-2">
                      {activeSessions.length === 0 ? (
                        <div className="flex flex-col items-center justify-center bg-white rounded-2xl border border-gray-200 shadow-sm py-20 text-center h-full">
                          <Lock size={64} className="text-gray-300 mb-4" />
                          <h3 className="text-xl font-bold text-gray-800 mb-2">No hay cajas activas</h3>
                          <p className="text-gray-500">Ningún empleado ha abierto caja en este momento.</p>
                        </div>
                      ) : (
                        <div className="grid grid-cols-1 xl:grid-cols-2 gap-6 pb-6">
                          {activeSessions.map(session => {
                            const totalCaja = session.initialCash + session.salesEfectivo;
                            const totalVendido = session.salesEfectivo + session.salesTarjeta + (session.salesYape || 0) + (session.salesCredito || 0);

                            return (
                              <div key={session.id} className="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden flex flex-col">
                                <div className="p-4 border-b border-gray-100 bg-emerald-50/50 flex justify-between items-center relative overflow-hidden">
                                  <div className="absolute right-0 top-0 w-32 h-32 bg-emerald-100 rounded-full blur-3xl -mr-10 -mt-10 opacity-50"></div>
                                  <div className="flex items-center gap-3 relative z-10">
                                    <div className="w-12 h-12 bg-indigo-100 text-indigo-700 rounded-full flex items-center justify-center font-black text-xl border-2 border-white shadow-sm">
                                      {session.openedBy.charAt(0).toUpperCase()}
                                    </div>
                                    <div>
                                      <div className="font-bold text-gray-900 leading-tight uppercase">{session.openedBy}</div>
                                      <div className="text-xs text-gray-500 font-medium">Desde: {formatTime(new Date(session.startTime))}</div>
                                    </div>
                                  </div>
                                  <div className="text-right relative z-10">
                                    <div className="text-xs font-bold text-emerald-600 uppercase tracking-widest mb-0.5">En Caja</div>
                                    <div className="text-2xl font-black text-emerald-700">{formatCurrency(totalCaja)}</div>
                                  </div>
                                </div>
                                <div className="p-4 bg-gray-50 flex-1">
                                  <div className="grid grid-cols-2 gap-3 mb-4">
                                    <div className="bg-white p-3 rounded-xl border border-gray-200 shadow-sm">
                                      <div className="text-[10px] font-bold text-gray-400 uppercase mb-1">Fondo Inicial</div>
                                      <div className="font-bold text-gray-700">{formatCurrency(session.initialCash)}</div>
                                    </div>
                                    <div className="bg-white p-3 rounded-xl border border-gray-200 shadow-sm">
                                      <div className="text-[10px] font-bold text-gray-400 uppercase mb-1">Vendido (Efectivo)</div>
                                      <div className="font-bold text-emerald-600">{formatCurrency(session.salesEfectivo)}</div>
                                    </div>
                                    <div className="bg-white p-3 rounded-xl border border-blue-100 shadow-sm">
                                      <div className="text-[10px] font-bold text-blue-400 uppercase mb-1">Tarjetas (POS)</div>
                                      <div className="font-bold text-blue-600">{formatCurrency(session.salesTarjeta)}</div>
                                    </div>
                                    <div className="bg-white p-3 rounded-xl border border-purple-100 shadow-sm">
                                      <div className="text-[10px] font-bold text-purple-400 uppercase mb-1">Yape</div>
                                      <div className="font-bold text-purple-600">{formatCurrency(session.salesYape || 0)}</div>
                                    </div>
                                    <div className="bg-white p-3 rounded-xl border border-orange-100 shadow-sm">
                                      <div className="text-[10px] font-bold text-orange-400 uppercase mb-1">Créditos</div>
                                      <div className="font-bold text-orange-600">{formatCurrency(session.salesCredito || 0)}</div>
                                    </div>
                                  </div>
                                  <div className="flex justify-between items-center text-sm border-t border-gray-200 pt-3">
                                    <div className="flex gap-2">
                                      <button 
                                        onClick={() => { setSelectedSessionForStock(session); setShowAssignStockModal(true); }}
                                        className="text-xs font-bold text-indigo-600 bg-indigo-50 px-3 py-1.5 rounded-lg hover:bg-indigo-100 transition-colors flex items-center gap-1 border border-indigo-100 shadow-sm active:scale-95"
                                      >
                                        <ClipboardList size={14} /> Control de Barra
                                      </button>
                                      <button 
                                        onClick={() => forceCloseSession(session)}
                                        disabled={isProcessingClose}
                                        className="text-xs font-bold text-red-600 bg-red-50 px-3 py-1.5 rounded-lg hover:bg-red-100 transition-colors flex items-center gap-1 border border-red-100 shadow-sm active:scale-95 disabled:opacity-50"
                                      >
                                        <Lock size={14} /> Forzar Cierre
                                      </button>
                                    </div>
                                    <div className="text-right">
                                      <span className="font-bold text-gray-500 block text-[10px] uppercase">Total Venta</span>
                                      <span className="font-black text-gray-800 text-lg leading-none">{formatCurrency(totalVendido)}</span>
                                    </div>
                                  </div>
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      )}
                    </div>
                  ) : (
                    // VISTA CAJERO: Turno Actual
                    <div className="flex-1 flex flex-col gap-6 overflow-hidden">
                      {boxSession ? (
                        <>
                          <div className="grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4">
                            <div className="bg-white p-4 rounded-2xl border border-gray-200 shadow-sm flex flex-col"><span className="text-gray-500 text-sm font-bold mb-1">Monto Inicial (Caja)</span><span className="text-2xl font-black text-gray-800">{formatCurrency(boxSession.initialCash)}</span></div>
                            <div className="bg-white p-4 rounded-2xl border border-gray-200 shadow-sm flex flex-col"><span className="text-gray-500 text-sm font-bold mb-1">Ventas en Efectivo</span><span className="text-2xl font-black text-emerald-600">{formatCurrency(boxSession.salesEfectivo)}</span></div>
                            <div className="bg-white p-4 rounded-2xl border border-blue-200 shadow-sm flex flex-col"><span className="text-gray-500 text-sm font-bold mb-1 flex items-center gap-1"><CreditCard size={16} className="text-blue-600"/> Tarjeta (POS)</span><span className="text-2xl font-black text-blue-600">{formatCurrency(boxSession.salesTarjeta)}</span></div>
                            <div className="bg-white p-4 rounded-2xl border border-purple-200 shadow-sm flex flex-col"><span className="text-gray-500 text-sm font-bold mb-1 flex items-center gap-1"><Smartphone size={16} className="text-purple-600"/> Yape</span><span className="text-2xl font-black text-purple-600">{formatCurrency(boxSession.salesYape)}</span></div>
                            <div className="bg-white p-4 rounded-2xl border border-orange-200 shadow-sm flex flex-col"><span className="text-gray-500 text-sm font-bold mb-1 flex items-center gap-1"><FileText size={16} className="text-orange-600"/> Créditos</span><span className="text-2xl font-black text-orange-600">{formatCurrency(boxSession.salesCredito || 0)}</span></div>
                            <div className="bg-indigo-600 p-4 rounded-2xl border border-indigo-700 shadow-sm flex flex-col text-white relative overflow-hidden xl:col-span-5"><div className="absolute -right-4 -bottom-4 opacity-20"><Wallet size={80} /></div><span className="text-indigo-100 text-sm font-bold mb-1">Efectivo Total en Caja</span><span className="text-2xl font-black">{formatCurrency(boxSession.initialCash + boxSession.salesEfectivo)}</span></div>
                          </div>
                          <div className="bg-white rounded-2xl overflow-hidden border border-gray-200 shadow-sm flex-1 flex flex-col relative">
                            <div className="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                              <h3 className="font-bold text-gray-800 flex items-center gap-2"><ShoppingCart size={18}/> Ventas de este turno (Local)</h3>
                              <button onClick={() => setShowCloseBoxModal(true)} disabled={isProcessingClose} className="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-xl font-bold flex items-center gap-2 transition-all shadow-sm shadow-red-600/20 disabled:opacity-50"><Lock size={18} /> {isProcessingClose ? 'Cerrando...' : 'Cerrar Turno Activo'}</button>
                            </div>
                            <div className="overflow-x-auto flex-1 custom-scrollbar">
                              <table className="w-full text-left border-collapse">
                                <thead className="bg-white text-gray-500 text-xs uppercase font-bold sticky top-0 z-10 shadow-sm">
                                  <tr><th className="px-6 py-3">ID Venta</th><th className="px-6 py-3">Hora</th><th className="px-6 py-3">Detalle</th><th className="px-6 py-3">Método Pago</th><th className="px-6 py-3 text-right">Total</th></tr>
                                </thead>
                                <tbody className="divide-y divide-gray-100">
                                  {sales.filter(s => s.sessionId === boxSession.id).map(sale => {
                                    const method = PAYMENT_METHODS.find(m => m.id === sale.paymentMethod);
                                    const MethodIcon = sale.paymentMethod === 'dividido' ? PieChart : (method?.icon || Banknote);
                                    const methodName = sale.paymentMethod === 'dividido' ? 'Dividido' : (method?.name || sale.paymentMethod);
                                    const methodColor = sale.paymentMethod === 'dividido' ? 'bg-gray-800' : (method?.color || 'bg-gray-600');

                                    return (
                                      <tr key={sale.id} className="hover:bg-gray-50/80 transition-colors">
                                        <td className="px-6 py-4 font-mono text-indigo-600 font-bold uppercase text-xs">#{sale.id}</td>
                                        <td className="px-6 py-4 text-sm text-gray-600 font-medium">{formatTime(new Date(sale.date))}</td>
                                        <td className="px-6 py-4">
                                          <ul className="text-xs space-y-1">
                                            {sale.items.map((item, idx) => (
                                              <li key={idx} className="text-gray-700 font-medium">
                                                <span className="text-indigo-600 font-bold">{item.quantity}x</span> {item.name}
                                              </li>
                                            ))}
                                          </ul>
                                        </td>
                                        <td className="px-6 py-4">
                                          <span className={`inline-flex items-center gap-1.5 px-2.5 py-1 rounded-md text-[10px] font-bold text-white uppercase ${methodColor}`}>
                                            <MethodIcon size={12} /> {methodName}
                                          </span>
                                        </td>
                                        <td className="px-6 py-4 text-right font-black text-emerald-600">{formatCurrency(sale.total)}</td>
                                      </tr>
                                    );
                                  })}
                                  {sales.filter(s => s.sessionId === boxSession.id).length === 0 && (
                                    <tr><td colSpan="5" className="text-center py-12 text-gray-400 font-medium">Aún no hay ventas en este turno local.</td></tr>
                                  )}
                                </tbody>
                              </table>
                            </div>
                          </div>
                        </>
                      ) : (
                        <div className="flex-1 flex flex-col items-center justify-center bg-white rounded-2xl border border-gray-200 shadow-sm"><Lock size={64} className="text-gray-300 mb-4" /><h3 className="text-xl font-bold text-gray-800 mb-2">La caja está cerrada en este dispositivo</h3><p className="text-gray-500">Abre un turno para ver tu progreso local.</p></div>
                      )}
                    </div>
                  )
                ) : (
                  // VISTA HISTORIAL & REPORTE COMPLETO
                  <div className="flex-1 flex flex-col gap-4 overflow-hidden">
                    {/* Filtros Historial */}
                    <div className="bg-white p-4 rounded-2xl border border-gray-200 shadow-sm flex flex-wrap items-center gap-4 flex-shrink-0">
                      <div className="flex items-center gap-2">
                        <Calendar className="text-gray-400" size={20} />
                        <span className="font-bold text-gray-700">Desde:</span>
                        <input type="date" value={historyStartDate} onChange={e => setHistoryStartDate(e.target.value)} className="border border-gray-300 rounded-lg px-3 py-1.5 text-sm font-medium focus:ring-2 focus:ring-indigo-500 outline-none" />
                      </div>
                      <div className="flex items-center gap-2">
                        <span className="font-bold text-gray-700">Hasta:</span>
                        <input type="date" value={historyEndDate} onChange={e => setHistoryEndDate(e.target.value)} className="border border-gray-300 rounded-lg px-3 py-1.5 text-sm font-medium focus:ring-2 focus:ring-indigo-500 outline-none" />
                      </div>
                      <div className="ml-auto flex items-center gap-3">
                        <span className="text-sm font-bold text-gray-500 bg-gray-100 px-3 py-1.5 rounded-lg border border-gray-200">
                          {filteredSales.length} ventas procesadas
                        </span>
                        <button 
                          onClick={exportHistoryToPDF}
                          className="bg-red-600 hover:bg-red-700 text-white px-4 py-2.5 rounded-xl font-bold flex items-center gap-2 transition-all shadow-sm shadow-red-600/20"
                        >
                          <FileText size={18} /> Exportar a PDF
                        </button>
                      </div>
                    </div>

                    {/* Contenedor del Reporte a Exportar */}
                    <div className="bg-white rounded-2xl border border-gray-200 shadow-sm flex-1 flex flex-col relative overflow-hidden">
                      <div className="overflow-y-auto flex-1 custom-scrollbar">
                        
                        {/* ESTA ES LA ZONA QUE CAPTURA EL PDF */}
                        <div id="history-report-content" className="w-full bg-white px-8 pt-8 pb-12">
                          
                          {/* Cabecera del Documento PDF */}
                          <div className="border-b border-gray-200 mb-6 pb-6 print:border-black print:pb-4">
                             <div className="flex justify-between items-end gap-4">
                               <div className="flex items-center gap-4">
                                 <img src="sandubai.png" alt="Logo SANDUBAI" className="w-24 h-24 object-contain print:grayscale" />
                                 <div>
                                   <h3 className="text-3xl font-black text-gray-900 uppercase tracking-wider leading-none mb-1">SANDUBAI</h3>
                                   <p className="text-gray-500 font-bold uppercase text-sm tracking-widest mb-3">Terraza Club</p>
                                   <p className="text-gray-700 font-bold text-lg">Reporte Consolidado de Ventas</p>
                                 </div>
                               </div>
                               <div className="text-right bg-gray-50 p-4 rounded-xl border border-gray-200 print:bg-white">
                                 <p className="text-xs font-bold text-gray-400 uppercase mb-1">Período Seleccionado</p>
                                 <p className="text-lg font-black text-indigo-700">{historyStartDate} <span className="text-gray-500 font-medium px-1">al</span> {historyEndDate}</p>
                               </div>
                             </div>
                          </div>

                          {/* SECCIÓN 1: Resumen General de Ventas */}
                          <div className="mb-8 avoid-page-break">
                            <h4 className="font-bold text-gray-800 uppercase border-b-2 border-gray-800 pb-2 mb-4 flex items-center gap-2"><PieChart size={18}/> Resumen General de Ingresos</h4>
                            <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4">
                               <div className="bg-emerald-50 border border-emerald-100 p-4 rounded-xl text-center">
                                 <Banknote className="mx-auto text-emerald-600 mb-2" size={24}/>
                                 <div className="text-xs font-bold text-gray-500 uppercase mb-1">Efectivo</div>
                                 <div className="text-lg font-black text-emerald-700">{formatCurrency(ventasEfectivo)}</div>
                               </div>
                               <div className="bg-blue-50 border border-blue-100 p-4 rounded-xl text-center">
                                 <CreditCard className="mx-auto text-blue-600 mb-2" size={24}/>
                                 <div className="text-xs font-bold text-gray-500 uppercase mb-1">Tarjeta (POS)</div>
                                 <div className="text-lg font-black text-blue-700">{formatCurrency(ventasTarjeta)}</div>
                               </div>
                               <div className="bg-purple-50 border border-purple-100 p-4 rounded-xl text-center">
                                 <Smartphone className="mx-auto text-purple-600 mb-2" size={24}/>
                                 <div className="text-xs font-bold text-gray-500 uppercase mb-1">Yape</div>
                                 <div className="text-lg font-black text-purple-700">{formatCurrency(ventasYape)}</div>
                               </div>
                               <div className="bg-orange-50 border border-orange-100 p-4 rounded-xl text-center">
                                 <FileText className="mx-auto text-orange-600 mb-2" size={24}/>
                                 <div className="text-xs font-bold text-gray-500 uppercase mb-1">Créditos</div>
                                 <div className="text-lg font-black text-orange-700">{formatCurrency(ventasCredito)}</div>
                               </div>
                               <div className="bg-gray-900 border border-gray-800 p-4 rounded-xl text-center shadow-md">
                                 <Activity className="mx-auto text-white mb-2" size={24}/>
                                 <div className="text-xs font-bold text-gray-400 uppercase mb-1">Total Global</div>
                                 <div className="text-xl font-black text-white">{formatCurrency(totalVentasGlobal)}</div>
                               </div>
                            </div>
                          </div>

                          {/* SECCIÓN 2: Detalle por Productos y Categorías */}
                          <div className="mb-10 avoid-page-break">
                            <h4 className="font-bold text-gray-800 uppercase border-b-2 border-gray-800 pb-2 mb-4 flex items-center gap-2"><ListChecks size={18}/> Ventas por Producto y Categoría</h4>
                            
                            {Object.keys(salesBreakdown).length === 0 ? (
                               <p className="text-gray-500 italic py-4">No se registraron ventas de productos en este período.</p>
                            ) : (
                               <div className="grid grid-cols-1 lg:grid-cols-2 gap-x-8 gap-y-6">
                                 {Object.entries(salesBreakdown).sort((a,b) => a[0].localeCompare(b[0])).map(([category, items]) => {
                                   const totalCategory = Object.values(items).reduce((sum, item) => sum + item.total, 0);
                                   const totalItems = Object.values(items).reduce((sum, item) => sum + item.qty, 0);
                                   return (
                                     <div key={category} className="border border-gray-200 rounded-xl overflow-hidden bg-white avoid-page-break h-fit">
                                        <div className="bg-gray-100 px-4 py-2 border-b border-gray-200 flex justify-between items-center print:bg-gray-200">
                                          <span className="font-bold text-gray-800 uppercase tracking-wide text-sm">{category}</span>
                                          <span className="text-xs font-bold text-gray-500 bg-white px-2 py-1 rounded shadow-sm print:border print:border-gray-300">{formatCurrency(totalCategory)}</span>
                                        </div>
                                        <table className="w-full text-sm text-left">
                                          <thead className="bg-gray-50">
                                            <tr>
                                              <th className="px-4 py-2 text-gray-500 font-bold w-16 text-center">Cant.</th>
                                              <th className="px-4 py-2 text-gray-500 font-bold">Descripción</th>
                                              <th className="px-4 py-2 text-gray-500 font-bold text-right w-24">Monto</th>
                                            </tr>
                                          </thead>
                                          <tbody className="divide-y divide-gray-100">
                                            {Object.values(items).sort((a,b) => b.qty - a.qty).map(item => (
                                              <tr key={item.name} className="hover:bg-gray-50">
                                                <td className="px-4 py-2 text-center font-bold text-indigo-600">{item.qty}</td>
                                                <td className="px-4 py-2 font-medium text-gray-700">{item.name}</td>
                                                <td className="px-4 py-2 text-right font-bold text-gray-800">{formatCurrency(item.total)}</td>
                                              </tr>
                                            ))}
                                          </tbody>
                                          <tfoot className="bg-gray-50 border-t border-gray-200">
                                            <tr>
                                              <td className="px-4 py-2 text-center font-bold text-gray-600">{totalItems}</td>
                                              <td className="px-4 py-2 text-right font-bold text-gray-500 uppercase text-xs">Total Cat:</td>
                                              <td className="px-4 py-2 text-right font-black text-gray-900">{formatCurrency(totalCategory)}</td>
                                            </tr>
                                          </tfoot>
                                        </table>
                                     </div>
                                   );
                                 })}
                               </div>
                            )}
                          </div>

                          {/* SECCIÓN 3: Cierres de Caja */}
                          <div className="avoid-page-break">
                            <h4 className="font-bold text-gray-800 uppercase border-b-2 border-gray-800 pb-2 mb-4 flex items-center gap-2"><Lock size={18}/> Registro de Turnos y Cajas</h4>
                            <div className="overflow-x-auto">
                              <table className="w-full text-left border-collapse text-sm">
                                <thead className="bg-gray-100 text-gray-600 uppercase font-semibold text-[11px]">
                                  <tr>
                                    <th className="px-3 py-3 border-b border-gray-200">Turno</th>
                                    <th className="px-3 py-3 border-b border-gray-200 text-center">Oper.</th>
                                    <th className="px-3 py-3 border-b border-gray-200 text-right">Base Aper.</th>
                                    <th className="px-3 py-3 border-b border-gray-200 text-right text-emerald-600">Efectivo</th>
                                    <th className="px-3 py-3 border-b border-gray-200 text-right text-blue-600">Tarjeta</th>
                                    <th className="px-3 py-3 border-b border-gray-200 text-right text-purple-600">Yape</th>
                                    <th className="px-3 py-3 border-b border-gray-200 text-right text-orange-600">Crédito</th>
                                    <th className="px-3 py-3 border-b border-gray-200 text-right bg-indigo-50">Total Ventas</th>
                                    <th className="px-3 py-3 border-b border-gray-200 text-center">Opciones</th>
                                  </tr>
                                </thead>
                                <tbody className="divide-y divide-gray-100">
                                  {filteredReports.map(report => (
                                    <React.Fragment key={report.id}>
                                      <tr className="hover:bg-gray-50/80 transition-colors">
                                        <td className="px-3 py-3 text-sm text-gray-700">
                                          <div className="flex flex-col gap-0.5">
                                            <span className="font-bold text-[10px] text-emerald-600 whitespace-nowrap">Apertura: {formatDate(new Date(report.startTime))}</span>
                                            <span className="font-bold text-[10px] text-red-500 whitespace-nowrap">Cierre: {formatDate(new Date(report.endTime))}</span>
                                            <span className="text-[9px] text-gray-400 uppercase font-bold mt-1">Cajero: <span className="text-gray-600">{report.openedBy}</span></span>
                                          </div>
                                        </td>
                                        <td className="px-3 py-3 text-center">
                                          <div className="flex flex-col items-center gap-1.5">
                                            <span className="font-bold text-gray-600">{report.totalSalesCount}</span>
                                            <button 
                                              onClick={() => setExpandedReportId(expandedReportId === report.id ? null : report.id)}
                                              className="text-[9px] text-indigo-600 bg-indigo-50 px-2 py-1 rounded-md hover:bg-indigo-100 transition-colors font-bold whitespace-nowrap print:hidden"
                                            >
                                              {expandedReportId === report.id ? 'Ocultar Ventas' : 'Ver Ventas'}
                                            </button>
                                          </div>
                                        </td>
                                        <td className="px-3 py-3 text-right">
                                          <span className="font-black text-gray-800">{formatCurrency(report.initialCash)}</span>
                                        </td>
                                        <td className="px-3 py-3 text-right bg-emerald-50/30">
                                          <span className="font-black text-emerald-600">{formatCurrency(report.salesEfectivo)}</span>
                                        </td>
                                        <td className="px-3 py-3 text-right bg-blue-50/30">
                                          <span className="font-black text-blue-600">{formatCurrency(report.salesTarjeta)}</span>
                                        </td>
                                        <td className="px-3 py-3 text-right bg-purple-50/30">
                                          <span className="font-black text-purple-600">{formatCurrency(report.salesYape)}</span>
                                        </td>
                                        <td className="px-3 py-3 text-right bg-orange-50/30">
                                          <span className="font-black text-orange-600">{formatCurrency(report.salesCredito || 0)}</span>
                                        </td>
                                        <td className="px-3 py-3 text-right bg-indigo-50/30">
                                          <span className="font-black text-indigo-700">{formatCurrency(report.totalVentas)}</span>
                                        </td>
                                        <td className="px-3 py-3 text-center">
                                          <button 
                                            onClick={() => exportSingleReportToPDF(report)}
                                            className="bg-red-600 hover:bg-red-700 text-white px-2.5 py-1.5 rounded-lg text-[9px] font-bold uppercase transition-colors flex items-center justify-center gap-1 mx-auto print:hidden shadow-sm"
                                            title="Exportar Ticket a PDF"
                                          >
                                            <Download size={12} /> Exportar PDF
                                          </button>
                                        </td>
                                      </tr>
                                      
                                      {/* Mostrar Detalle de Ventas si está expandido */}
                                      {expandedReportId === report.id && (() => {
                                        // Respaldo de compatibilidad para turnos antiguos: si no coinciden por ID, coinciden por rango de horas exacto y cajero
                                        const reportSales = sales.filter(s => 
                                          s.sessionId === report.id || 
                                          (s.soldBy === report.openedBy && s.date >= report.startTime && s.date <= report.endTime)
                                        );

                                        return (
                                          <tr className="bg-gray-50 border-b border-gray-200 print:bg-white print:border-b print:border-gray-200">
                                            <td colSpan="9" className="px-6 py-4">
                                               <div className="text-xs font-bold text-gray-800 mb-2 flex items-center gap-1 uppercase">
                                                 <Receipt size={14}/> Detalle de Operaciones de este turno
                                               </div>
                                               {reportSales.length === 0 ? (
                                                  <p className="text-gray-500 italic text-xs py-2">No se registraron operaciones.</p>
                                               ) : (
                                                  <div className="bg-white border border-gray-200 rounded-lg overflow-hidden shadow-sm">
                                                    <table className="w-full text-xs text-left border-collapse">
                                                      <thead className="bg-gray-50 text-gray-600 uppercase font-semibold">
                                                        <tr>
                                                          <th className="px-3 py-2 border-b border-gray-200">Hora / Venta</th>
                                                          <th className="px-3 py-2 border-b border-gray-200">Detalle de Productos</th>
                                                          <th className="px-3 py-2 border-b border-gray-200 text-center">Pago</th>
                                                          <th className="px-3 py-2 border-b border-gray-200 text-right">Total</th>
                                                        </tr>
                                                      </thead>
                                                      <tbody className="divide-y divide-gray-100">
                                                        {reportSales.map(sale => {
                                                          const method = PAYMENT_METHODS.find(m => m.id === sale.paymentMethod);
                                                          const MethodIcon = sale.paymentMethod === 'dividido' ? PieChart : (method?.icon || Banknote);
                                                          const methodName = sale.paymentMethod === 'dividido' ? 'Dividido' : (method?.name || sale.paymentMethod);
                                                          const methodColor = sale.paymentMethod === 'dividido' ? 'bg-gray-800' : (method?.color || 'bg-gray-600');

                                                          return (
                                                            <tr key={sale.id} className="hover:bg-gray-50 transition-colors">
                                                              <td className="px-3 py-2">
                                                                <div className="font-bold text-gray-800">{formatTime(new Date(sale.date))}</div>
                                                                <div className="font-mono text-indigo-600 font-bold uppercase text-[9px]">#{sale.id}</div>
                                                              </td>
                                                              <td className="px-3 py-2">
                                                                <ul className="space-y-0.5">
                                                                  {sale.items.map((item, idx) => (
                                                                    <li key={idx} className="text-gray-700">
                                                                      <span className="text-indigo-600 font-bold">{item.quantity}x</span> {item.name}
                                                                    </li>
                                                                  ))}
                                                                </ul>
                                                              </td>
                                                              <td className="px-3 py-2 text-center">
                                                                 <span className={`inline-flex items-center gap-1 px-1.5 py-0.5 rounded text-[9px] font-bold text-white uppercase ${methodColor}`}>
                                                                   <MethodIcon size={10} /> {methodName}
                                                                 </span>
                                                              </td>
                                                              <td className="px-3 py-2 text-right font-black text-emerald-600">{formatCurrency(sale.total)}</td>
                                                            </tr>
                                                          )
                                                        })}
                                                      </tbody>
                                                    </table>
                                                  </div>
                                               )}
                                            </td>
                                          </tr>
                                        );
                                      })()}
                                      
                                      {/* Mostrar el Control de Barra en el UI si la caja lo tuvo */}
                                      {report.assignedStock && Object.keys(report.assignedStock).length > 0 && (
                                        <tr className="bg-indigo-50/40 avoid-page-break print:bg-white print:border-b print:border-gray-200">
                                          <td colSpan="9" className="px-6 py-4">
                                             <div className="text-xs font-bold text-indigo-800 mb-2 flex items-center gap-1 uppercase">
                                               <ClipboardList size={14}/> Detalle de Control de Barra
                                             </div>
                                             <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                                               {Object.entries(report.assignedStock).map(([pId, assignedQty]) => {
                                                  const prod = products.find(p => p.id === parseInt(pId));
                                                  if (!prod) return null;
                                                  const soldQty = report.soldItems?.[pId] || 0;
                                                  const expectedQty = assignedQty - soldQty;
                                                  return (
                                                     <div key={pId} className="bg-white border border-indigo-100 rounded-lg p-2.5 flex flex-col justify-between items-start shadow-sm print:border-gray-300">
                                                       <span className="font-bold text-gray-700 text-[11px] leading-tight w-full truncate border-b border-gray-100 pb-1.5 mb-1.5">{prod.name}</span>
                                                       <div className="flex w-full items-center justify-between gap-1 text-[10px]">
                                                         <div className="text-center"><div className="text-gray-400 uppercase font-bold">Asig.</div><div className="font-bold text-gray-800 text-xs">{assignedQty}</div></div>
                                                         <div className="text-center"><div className="text-gray-400 uppercase font-bold">Vend.</div><div className="font-bold text-emerald-600 text-xs">{soldQty}</div></div>
                                                         <div className="text-center border-l border-gray-200 pl-1.5"><div className="text-indigo-400 uppercase font-bold">Queda</div><div className="font-black text-indigo-700 text-sm">{expectedQty}</div></div>
                                                       </div>
                                                     </div>
                                                  )
                                               })}
                                             </div>
                                          </td>
                                        </tr>
                                      )}
                                    </React.Fragment>
                                  ))}
                                  {filteredReports.length === 0 && (
                                    <tr><td colSpan="9" className="text-center py-8 text-gray-400 font-medium italic">No se cerraron cajas en este período.</td></tr>
                                  )}
                                </tbody>
                              </table>
                            </div>
                          </div>

                        </div>
                        {/* FIN DE ZONA CAPTURADA PARA PDF */}
                        
                      </div>
                    </div>
                  </div>
                )}
              </div>
            );
          };

          const renderUsers = () => (
            <div className="p-6 h-full flex flex-col bg-gray-50 text-gray-800 overflow-hidden">
              <div className="flex justify-between items-center mb-6">
                <h2 className="text-2xl font-bold flex items-center gap-2 text-gray-900">
                  <Users className="text-indigo-600" /> Gestión de Usuarios
                </h2>
                <button 
                  onClick={() => handleOpenUserModal()}
                  className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2.5 rounded-xl font-bold flex items-center gap-2 transition-all shadow-sm shadow-indigo-600/20"
                >
                  <Plus size={18} /> Nuevo Usuario
                </button>
              </div>

              <div className="bg-white rounded-2xl overflow-hidden border border-gray-200 shadow-sm flex-1 flex flex-col">
                <div className="overflow-x-auto flex-1 custom-scrollbar">
                  <table className="w-full text-left border-collapse">
                    <thead className="bg-gray-100 text-gray-600 text-sm uppercase font-semibold sticky top-0 z-10">
                      <tr>
                        <th className="px-6 py-4">ID</th>
                        <th className="px-6 py-4">Nombre Completo</th>
                        <th className="px-6 py-4">Usuario (Login)</th>
                        <th className="px-6 py-4">Rol de Acceso</th>
                        <th className="px-6 py-4 text-right">Acciones</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-gray-100">
                      {users.map(u => (
                        <tr key={u.id} className="hover:bg-gray-50/80 transition-colors">
                          <td className="px-6 py-4 font-bold text-gray-500">#{u.id}</td>
                          <td className="px-6 py-4 font-bold text-gray-800">{u.name}</td>
                          <td className="px-6 py-4 text-gray-600 font-medium">{u.username}</td>
                          <td className="px-6 py-4">
                            <span className={`inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-bold uppercase ${u.role === 'admin' ? 'bg-purple-100 text-purple-700' : 'bg-blue-100 text-blue-700'}`}>
                              {u.role === 'admin' ? 'Administrador' : 'Personal'}
                            </span>
                          </td>
                          <td className="px-6 py-4 text-right">
                            <div className="flex items-center justify-end gap-2">
                              <button 
                                onClick={() => handleOpenUserModal(u)}
                                className="p-2 text-indigo-600 hover:bg-indigo-50 rounded-lg transition-colors"
                                title="Editar"
                              >
                                <Edit2 size={18} />
                              </button>
                              <button 
                                onClick={() => handleDeleteUser(u.id)}
                                disabled={u.id === currentUser?.id}
                                className="p-2 text-red-600 hover:bg-red-50 rounded-lg transition-colors disabled:opacity-30 disabled:cursor-not-allowed"
                                title="Eliminar"
                              >
                                <Trash2 size={18} />
                              </button>
                            </div>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          );

          const renderLoginScreen = () => (
            <div className="flex h-screen w-full bg-gray-900 items-center justify-center p-4 selection:bg-indigo-500/30">
              <div className="bg-white rounded-3xl shadow-2xl overflow-hidden w-full max-w-4xl flex flex-col md:flex-row relative">
                <div className="md:w-1/2 bg-indigo-600 p-12 flex flex-col justify-center items-center text-white relative overflow-hidden min-h-[400px]">
                  <div className="absolute top-0 left-0 w-full h-full opacity-10 pointer-events-none">
                    <Wine size={300} className="absolute -left-10 -top-10" />
                    <Beer size={200} className="absolute right-10 bottom-10" />
                  </div>
                  <img 
                    src="sandubai.png" 
                    alt="Logo SANDUBAI" 
                    className="w-40 h-40 object-contain rounded-full border-4 border-white/20 shadow-xl mb-6 relative z-10 bg-white p-2"
                    onError={(e) => {
                      e.target.onerror = null;
                      e.target.src = 'https://ui-avatars.com/api/?name=SD&background=4f46e5&color=fff&rounded=true';
                    }}
                  />
                  <h1 className="text-4xl font-black tracking-wider text-center mb-2 relative z-10">SANDUBAI</h1>
                  <p className="text-indigo-200 font-bold tracking-widest uppercase text-sm relative z-10">Terraza Club</p>
                </div>
                <div className="md:w-1/2 p-12 flex flex-col justify-center bg-gray-50 relative">
                  <div className="absolute top-6 right-6 flex items-center gap-2">
                    {isOffline ? (
                      <span className="flex items-center gap-1.5 text-xs font-bold text-amber-600 bg-amber-50 px-3 py-1.5 rounded-full border border-amber-200">
                        <WifiOff size={14}/> Sin Conexión
                      </span>
                    ) : !sysAuthUser ? (
                      <span className="flex items-center gap-1.5 text-xs font-bold text-blue-500 bg-blue-50 px-3 py-1.5 rounded-full border border-blue-200">
                        <CloudOff size={14}/> Conectando BD...
                      </span>
                    ) : (
                      <span className="flex items-center gap-1.5 text-xs font-bold text-emerald-500 bg-emerald-50 px-3 py-1.5 rounded-full border border-emerald-200">
                        <Cloud size={14}/> Sincronizado
                      </span>
                    )}
                  </div>

                  <div className="mb-8 mt-4">
                    <h2 className="text-2xl font-black text-gray-900 mb-1">Iniciar Sesión</h2>
                    <p className="text-gray-500 font-medium text-sm">Ingresa tus credenciales para acceder al POS.</p>
                  </div>
                  <form onSubmit={handleLogin} className="space-y-5">
                    <div>
                      <label className="block text-sm font-bold text-gray-700 mb-1.5">Usuario</label>
                      <div className="relative">
                        <UserCircle className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" size={20} />
                        <input 
                          type="text" 
                          required 
                          disabled={!sysAuthUser || (isSyncing && users.length === 0)}
                          className="w-full bg-white border border-gray-300 rounded-xl py-3 pl-10 pr-4 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all font-medium disabled:bg-gray-100 disabled:text-gray-400" 
                          placeholder="ej. admin" 
                          value={loginForm.username} 
                          onChange={(e) => setLoginForm({...loginForm, username: e.target.value})} 
                        />
                      </div>
                    </div>
                    <div>
                      <label className="block text-sm font-bold text-gray-700 mb-1.5">Contraseña</label>
                      <div className="relative">
                        <Key className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" size={20} />
                        <input 
                          type="password" 
                          required 
                          disabled={!sysAuthUser || (isSyncing && users.length === 0)}
                          className="w-full bg-white border border-gray-300 rounded-xl py-3 pl-10 pr-4 text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all font-medium disabled:bg-gray-100 disabled:text-gray-400" 
                          placeholder="••••••••" 
                          value={loginForm.password} 
                          onChange={(e) => setLoginForm({...loginForm, password: e.target.value})} 
                        />
                      </div>
                    </div>
                    <button 
                      type="submit" 
                      disabled={!sysAuthUser || (isSyncing && users.length === 0)}
                      className="w-full py-3.5 rounded-xl font-bold text-white bg-indigo-600 hover:bg-indigo-700 shadow-lg shadow-indigo-600/30 transition-all mt-4 disabled:bg-indigo-400 disabled:shadow-none"
                    >
                      {!sysAuthUser ? 'Conectando...' : 'Ingresar al Sistema'}
                    </button>
                  </form>
                </div>
              </div>
            </div>
          );

          if (!currentUser) {
            return (
              <>
                {renderLoginScreen()}
                {dialog && (
                  <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-[100] p-4">
                    <div className="bg-white rounded-2xl shadow-2xl p-6 max-w-sm w-full text-center">
                      <div className={`w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 ${dialog.type === 'alert' ? 'bg-indigo-100' : 'bg-amber-100'}`}>
                         {dialog.type === 'alert' ? <AlertCircle size={32} className="text-indigo-600"/> : <AlertCircle size={32} className="text-amber-500"/>}
                      </div>
                      <p className="text-gray-800 font-bold mb-6">{dialog.message}</p>
                      <div className="flex gap-3">
                        {dialog.type === 'confirm' && <button onClick={() => setDialog(null)} className="flex-1 py-3 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-xl font-bold transition-colors">Cancelar</button>}
                        <button onClick={() => { if (dialog.type === 'confirm' && dialog.onConfirm) dialog.onConfirm(); setDialog(null); }} className="flex-1 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-bold transition-colors">{dialog.type === 'confirm' ? 'Confirmar' : 'Aceptar'}</button>
                      </div>
                    </div>
                  </div>
                )}
              </>
            );
          }

          return (
            <>
              <div className="flex h-screen w-full bg-gray-50 font-sans text-gray-900 selection:bg-indigo-100 selection:text-indigo-900 print:hidden">
                
                {/* Sidebar Claro */}
                <div className="w-20 lg:w-64 bg-white border-r border-gray-200 flex flex-col z-20 shadow-sm">
                  <div className="h-24 flex items-center justify-center lg:justify-start lg:px-6 border-b border-gray-100">
                    <img 
                      src="sandubai.png" 
                      alt="Logo SANDUBAI Terraza Club" 
                      className="w-14 h-14 object-contain rounded-full border border-gray-100 shadow-sm"
                      onError={(e) => {
                        e.target.onerror = null;
                        e.target.src = 'https://ui-avatars.com/api/?name=SD&background=4f46e5&color=fff&rounded=true';
                      }}
                    />
                    <div className="hidden lg:block ml-3 flex flex-col">
                      <h1 className="font-black text-lg tracking-wider text-gray-900 leading-none">SANDUBAI</h1>
                      <span className="text-[10px] font-bold text-gray-500 tracking-widest uppercase mt-0.5">Terraza Club</span>
                    </div>
                  </div>
                  
                  <nav className="flex-1 py-6 flex flex-col gap-2 px-3 overflow-y-auto custom-scrollbar">
                    {[
                      { id: 'pos', name: 'Punto de Venta', icon: ShoppingCart },
                      { id: 'inventory', name: 'Inventario', icon: Package },
                      { id: 'purchases', name: 'Compras', icon: ShoppingBag },
                      { id: 'expenses', name: 'Egresos', icon: TrendingDown },
                      { id: 'sales', name: 'Reportes y Ventas', icon: History },
                      { id: 'users', name: 'Usuarios', icon: Users, adminOnly: true },
                    ]
                    .filter(tab => currentUser.role === 'admin' || (!tab.adminOnly && currentUser.allowedSections?.includes(tab.id)))
                    .map(tab => {
                      const Icon = tab.icon;
                      const isActive = activeTab === tab.id;
                      return (
                        <button
                          key={tab.id}
                          onClick={() => setActiveTab(tab.id)}
                          className={`flex items-center p-3 rounded-xl transition-all duration-200 group ${
                            isActive 
                              ? 'bg-indigo-50 text-indigo-700 border border-indigo-100 font-bold' 
                              : 'text-gray-500 hover:bg-gray-50 hover:text-gray-900 border border-transparent font-semibold'
                          }`}
                        >
                          <Icon size={24} className={isActive ? 'text-indigo-600' : 'text-gray-400 group-hover:text-indigo-500'} />
                          <span className="hidden lg:block ml-3 whitespace-nowrap">{tab.name}</span>
                        </button>
                      )
                    })}
                  </nav>

                  {/* Indicador Status de Caja y Usuario (Sidebar Bottom) */}
                  <div className="p-4 border-t border-gray-100 flex flex-col gap-3">
                    <div className="flex items-center gap-3 p-2">
                       <div className="w-10 h-10 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-700 font-black uppercase shadow-sm">
                         {currentUser.name.charAt(0)}
                       </div>
                       <div className="hidden lg:block overflow-hidden">
                         <div className="text-sm font-bold text-gray-900 truncate leading-tight">{currentUser.name}</div>
                         <div className="text-[10px] font-bold text-gray-500 uppercase tracking-widest">{currentUser.role === 'admin' ? 'Administrador' : 'Personal'}</div>
                       </div>
                    </div>

                    <div className={`p-3 rounded-xl flex items-center justify-between ${boxSession ? 'bg-emerald-50 border border-emerald-100' : 'bg-red-50 border border-red-100'}`}>
                      <div className="flex items-center gap-3">
                        <div className={`w-8 h-8 rounded-full flex items-center justify-center ${boxSession ? 'bg-emerald-100 text-emerald-600' : 'bg-red-100 text-red-600'}`}>
                          {boxSession ? <Unlock size={16}/> : <Lock size={16}/>}
                        </div>
                        <div className="hidden lg:block">
                          <div className={`text-xs font-bold uppercase tracking-wide ${boxSession ? 'text-emerald-700' : 'text-red-700'}`}>
                            {boxSession ? 'Caja Abierta' : 'Caja Cerrada'}
                          </div>
                          {boxSession && <div className="text-[10px] text-emerald-600 font-medium">Local</div>}
                        </div>
                      </div>
                    </div>

                    {boxSession && (
                       <button
                         onClick={() => setShowCloseBoxModal(true)}
                         disabled={isProcessingClose}
                         className="w-full flex items-center justify-center gap-2 p-3 rounded-xl text-white bg-red-600 hover:bg-red-700 shadow-md shadow-red-600/20 transition-all font-bold disabled:opacity-50"
                       >
                         <Lock size={18} />
                         <span className="hidden lg:inline">{isProcessingClose ? 'Cerrando...' : 'Cerrar Caja'}</span>
                       </button>
                    )}

                    <button
                      onClick={handleLogout}
                      className="w-full flex items-center justify-center gap-2 p-3 rounded-xl text-gray-500 hover:bg-gray-200 hover:text-gray-700 transition-colors font-bold border border-transparent"
                    >
                      <LogOut size={18} />
                      <span className="hidden lg:inline">Cerrar Sesión</span>
                    </button>

                    {currentUser.role === 'admin' && (
                       <button
                         onClick={() => setShowAdminCreditModal(true)}
                         className="w-full flex items-center justify-center gap-2 p-3 rounded-xl text-orange-600 bg-orange-50 hover:bg-orange-100 transition-colors font-bold border border-orange-200 mt-2"
                       >
                         <Key size={18} />
                         <span className="hidden lg:inline">Código Crédito</span>
                       </button>
                    )}
                  </div>
                </div>

                {/* Main Content */}
                <main className="flex-1 relative">
                  {activeTab === 'pos' && renderPOS()}
                  {activeTab === 'inventory' && renderInventory()}
                  {activeTab === 'purchases' && renderPurchases()}
                  {activeTab === 'expenses' && renderExpenses()}
                  {activeTab === 'sales' && renderSales()}
                  {activeTab === 'users' && currentUser.role === 'admin' && renderUsers()}
                </main>

                {/* Modales de la Aplicación */}
                {/* Modal Pago */}
                {showPaymentModal && (
                  <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                    <div className="bg-white border border-gray-200 rounded-3xl w-full max-w-md overflow-hidden shadow-2xl">
                      <div className="p-8 text-center border-b border-gray-100 bg-gray-50">
                        <h3 className="text-lg font-bold text-gray-500 mb-2 uppercase tracking-wide">Total a Cobrar</h3>
                        <div className="text-5xl font-black text-gray-900">{formatCurrency(cartTotal)}</div>
                      </div>
                      
                      {pendingCreditValidation ? (
                        <div className="p-8">
                          <h4 className="font-bold text-gray-800 mb-2 text-center">Código de Autorización</h4>
                          <p className="text-sm text-gray-500 mb-6 text-center">Ingresa el código proporcionado por el administrador para procesar la venta a crédito.</p>
                          <input 
                            type="password" 
                            className="w-full border-2 border-gray-300 rounded-xl p-3 text-center text-3xl tracking-[0.5em] font-black focus:ring-2 focus:ring-orange-500 focus:outline-none focus:border-orange-500" 
                            value={inputCreditCode} 
                            onChange={e => setInputCreditCode(e.target.value)} 
                            autoFocus
                            placeholder="****"
                          />
                          <div className="flex gap-3 mt-6">
                            <button onClick={() => { setPendingCreditValidation(false); setInputCreditCode(''); }} className="flex-1 py-3 bg-gray-100 text-gray-600 rounded-xl font-bold hover:bg-gray-200">Cancelar</button>
                            <button onClick={() => processCreditCheckout()} className="flex-1 py-3 bg-orange-600 text-white rounded-xl font-bold shadow-lg shadow-orange-600/30 hover:bg-orange-700">Validar</button>
                          </div>
                        </div>
                      ) : isSplitPayment ? (
                        <div className="p-8">
                          <p className="text-gray-500 mb-6 text-center text-sm font-semibold">Ingresa los montos por método de pago</p>
                          <div className="space-y-3 mb-6">
                            {PAYMENT_METHODS.map(m => {
                              const Icon = m.icon;
                              return (
                                <div key={m.id} className="flex items-center justify-between gap-4">
                                  <span className="font-semibold text-gray-700 w-1/3 flex items-center gap-2"><Icon size={16} className="text-gray-500" /> {m.name}</span>
                                  <div className="relative flex-1">
                                    <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 font-bold">S/</span>
                                    <input 
                                      type="number" step="0.10" min="0" 
                                      className="w-full bg-gray-50 border border-gray-300 rounded-lg py-2 pl-8 pr-3 font-bold text-right focus:ring-2 focus:ring-indigo-500 outline-none"
                                      value={splitAmounts[m.id]} 
                                      onChange={e => setSplitAmounts({...splitAmounts, [m.id]: e.target.value})} 
                                    />
                                  </div>
                                </div>
                              )
                            })}
                          </div>
                          
                          {(() => {
                            const entered = Object.values(splitAmounts).reduce((acc, val) => acc + (parseFloat(val) || 0), 0);
                            const remaining = cartTotal - entered;
                            return (
                              <>
                                <div className="flex justify-between items-center bg-gray-100 p-3 rounded-lg mb-6">
                                  <span className="font-bold text-gray-600">Restante por cubrir:</span>
                                  <span className={`font-black text-xl ${Math.abs(remaining) < 0.01 ? 'text-emerald-600' : remaining < 0 ? 'text-red-600' : 'text-amber-600'}`}>
                                    {Math.abs(remaining) < 0.01 ? 'S/ 0.00' : formatCurrency(remaining)}
                                  </span>
                                </div>
                                <div className="flex gap-3">
                                  <button onClick={() => setIsSplitPayment(false)} className="flex-1 py-3 bg-gray-200 text-gray-700 rounded-xl font-bold hover:bg-gray-300 transition-colors">Volver</button>
                                  <button 
                                    onClick={() => {
                                      if (parseFloat(splitAmounts.credito) > 0) setPendingCreditValidation(true);
                                      else handleCheckout('dividido', splitAmounts);
                                    }} 
                                    disabled={Math.abs(remaining) > 0.01}
                                    className="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-bold shadow-lg shadow-indigo-600/30 hover:bg-indigo-700 disabled:opacity-50 transition-all"
                                  >
                                    Procesar Pago
                                  </button>
                                </div>
                              </>
                            );
                          })()}
                        </div>
                      ) : (
                        <div className="p-8">
                          <p className="text-gray-500 mb-6 text-center text-sm font-semibold">Selecciona el método de pago</p>
                          <div className="grid grid-cols-2 gap-4 mb-4">
                            {PAYMENT_METHODS.map(method => {
                              const Icon = method.icon;
                              return (
                                <button 
                                  key={method.id} 
                                  onClick={() => {
                                    if (method.id === 'credito') setPendingCreditValidation(true);
                                    else handleCheckout(method.id);
                                  }} 
                                  className={`${method.color} hover:brightness-110 text-white p-5 rounded-2xl flex flex-col items-center justify-center gap-3 transition-all active:scale-95 shadow-md`}
                                >
                                  <Icon size={32} /><span className="font-bold">{method.name}</span>
                                </button>
                              )
                            })}
                          </div>
                          <button 
                            onClick={() => setIsSplitPayment(true)}
                            className="w-full bg-gray-900 hover:bg-black text-white p-4 rounded-2xl flex items-center justify-center gap-2 transition-all active:scale-95 shadow-md font-bold"
                          >
                            <PieChart size={20} /> Pago Dividido (Mixto)
                          </button>
                        </div>
                      )}

                      {!pendingCreditValidation && !isSplitPayment && (
                        <div className="p-4 bg-gray-50">
                          <button onClick={() => setShowPaymentModal(false)} className="w-full py-3.5 rounded-xl font-bold text-gray-600 hover:bg-gray-200 transition-colors">Cancelar</button>
                        </div>
                      )}
                    </div>
                  </div>
                )}

                {/* Modal Stock */}
                {showStockModal && (
                  <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                    <div className="bg-white border border-gray-200 rounded-3xl w-full max-w-md overflow-hidden shadow-2xl">
                      <div className="p-6 border-b border-gray-100 bg-gray-50">
                        <h3 className="text-xl font-bold text-gray-900 flex items-center gap-2">
                          <ArrowUpCircle className="text-emerald-600" /> Ingreso de Stock Manual
                        </h3>
                      </div>
                      <form onSubmit={handleAddStock} className="p-6 space-y-5">
                        <div>
                          <label className="block text-sm font-bold text-gray-700 mb-1.5">Producto</label>
                          <select required className="w-full bg-white border border-gray-300 rounded-xl p-3 text-gray-900 focus:outline-none focus:ring-2 focus:ring-emerald-500 font-medium" value={stockForm.productId} onChange={(e) => setStockForm({...stockForm, productId: e.target.value})}>
                            <option value="">-- Seleccionar --</option>
                            {products.filter(p => !p.isPromotion).map(p => <option key={p.id} value={p.id}>{p.name} (Stock: {p.stock})</option>)}
                          </select>
                        </div>
                        <div>
                          <label className="block text-sm font-bold text-gray-700 mb-1.5">Cantidad</label>
                          <input type="number" min="1" required className="w-full bg-white border border-gray-300 rounded-xl p-3 text-gray-900 focus:outline-none focus:ring-2 focus:ring-emerald-500 font-medium" value={stockForm.quantity} onChange={(e) => setStockForm({...stockForm, quantity: e.target.value})} />
                        </div>
                        <div>
                          <label className="block text-sm font-bold text-gray-700 mb-1.5">Motivo</label>
                          <input type="text" required className="w-full bg-white border border-gray-300 rounded-xl p-3 text-gray-900 focus:outline-none focus:ring-2 focus:ring-emerald-500 font-medium" value={stockForm.reason} onChange={(e) => setStockForm({...stockForm, reason: e.target.value})} placeholder="Ej: Ajuste manual" />
                        </div>
                        <div className="flex gap-3 pt-4">
                          <button type="button" onClick={() => setShowStockModal(false)} className="flex-1 py-3.5 rounded-xl font-bold text-gray-600 bg-gray-100 hover:bg-gray-200">Cancelar</button>
                          <button type="submit" className="flex-1 py-3.5 rounded-xl font-bold text-white bg-emerald-600 hover:bg-emerald-700 shadow-lg shadow-emerald-600/30">Registrar</button>
                        </div>
                      </form>
                    </div>
                  </div>
                )}

                {/* Modal Producto */}
                {showProductModal && (
                  <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                    <div className="bg-white border border-gray-200 rounded-3xl w-full max-w-lg overflow-hidden shadow-2xl">
                      <div className="p-6 border-b border-gray-100 bg-gray-50 flex items-center justify-between">
                        <h3 className="text-xl font-bold text-gray-900 flex items-center gap-2">
                          <Package className="text-indigo-600" /> {productForm.id ? 'Editar Producto' : 'Nuevo Producto'}
                        </h3>
                      </div>
                      <form onSubmit={handleSaveProduct} className="p-6 space-y-4 max-h-[70vh] overflow-y-auto custom-scrollbar">
                        <div>
                          <label className="block text-sm font-bold text-gray-700 mb-1.5">Nombre</label>
                          <input type="text" required className="w-full bg-white border border-gray-300 rounded-xl p-3 text-gray-900 focus:ring-2 focus:ring-indigo-500 font-medium" value={productForm.name} onChange={(e) => setProductForm({...productForm, name: e.target.value})} placeholder="Ej: Cerveza..." />
                        </div>
                        <div className="grid grid-cols-2 gap-4">
                          <div>
                            <label className="block text-sm font-bold text-gray-700 mb-1.5">Categoría</label>
                            <select required className="w-full bg-white border border-gray-300 rounded-xl p-3 text-gray-900 focus:ring-2 focus:ring-indigo-500 font-medium" value={productForm.category} onChange={(e) => setProductForm({...productForm, category: e.target.value})}>
                              <option value="" disabled>Seleccione...</option>
                              {categories.map(cat => <option key={cat} value={cat}>{cat}</option>)}
                            </select>
                          </div>
                          <div>
                            <label className="block text-sm font-bold text-gray-700 mb-1.5">Precio (S/)</label>
                            <input type="number" step="0.10" min="0" required className="w-full bg-white border border-gray-300 rounded-xl p-3 text-gray-900 focus:ring-2 focus:ring-indigo-500 font-medium" value={productForm.price} onChange={(e) => setProductForm({...productForm, price: e.target.value})} placeholder="0.00" />
                          </div>
                        </div>
                        <div>
                          <label className="block text-sm font-bold text-gray-700 mb-1.5">Stock Inicial</label>
                          <input type="number" min="0" required={!productForm.id && !productForm.isPromotion} disabled={!!productForm.id || productForm.isPromotion} className="w-full bg-white border border-gray-300 rounded-xl p-3 text-gray-900 focus:ring-2 focus:ring-indigo-500 font-medium disabled:bg-gray-100 disabled:text-gray-500" value={productForm.stock} onChange={(e) => setProductForm({...productForm, stock: e.target.value})} placeholder="0" />
                        </div>
                        <div className="mt-2 bg-rose-50 p-4 rounded-xl border border-rose-200">
                          <label className="flex items-center gap-2 cursor-pointer mb-2">
                             <input type="checkbox" className="w-4 h-4 rounded text-rose-500 cursor-pointer" checked={productForm.isPromotion} onChange={e => setProductForm({...productForm, isPromotion: e.target.checked})} />
                             <span className="font-bold text-rose-700 text-sm">Este artículo es un COMBO / PROMOCIÓN</span>
                          </label>
                          {productForm.isPromotion && (
                            <div className="grid grid-cols-2 gap-3 mt-3 pt-3 border-t border-rose-200">
                               <div>
