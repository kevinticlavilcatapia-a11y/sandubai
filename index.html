<body class="bg-gray-50 text-gray-900 font-sans selection:bg-indigo-100 selection:text-indigo-900">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        import { 
          ShoppingCart, Package, ClipboardList, Wallet, 
          CreditCard, Banknote, Smartphone, Plus, Minus, 
          Trash2, Search, ArrowUpCircle, ArrowDownCircle,
          History, Wine, Beer, CupSoda, Cigarette, Edit2, 
          Image as ImageIcon, Tags, Lock, Unlock, FileText,
          AlertCircle, Utensils, Pizza, Martini,
          Users, LogOut, UserCircle, Key, CheckSquare, Square,
          Calendar, PieChart, Download, Printer,
          Cloud, CloudOff, Activity, ShoppingBag, TrendingDown, Receipt
        } from 'https://esm.sh/lucide-react@0.292.0';

        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        // --- Configuración Global de Firebase ---
        let app, auth, db, appId;
        try {
          const firebaseConfig = {
            apiKey: "AIzaSyBIW9X4iolnzyD39G4rNhe7YU_CNIUjVDE",
            authDomain: "sandubai-64fa2.firebaseapp.com",
            projectId: "sandubai-64fa2",
            storageBucket: "sandubai-64fa2.firebasestorage.app",
            messagingSenderId: "1024958244985",
            appId: "1:1024958244985:web:34f353e0208c56655f0ca8"
          };
          app = initializeApp(firebaseConfig);
          auth = getAuth(app);
          db = getFirestore(app);
          appId = 'sandubai-pos'; 
        } catch (e) {
          console.error("Error inicializando Firebase:", e);
        }

        // --- Datos Iniciales ---
        const INITIAL_PRODUCTS = [
          { id: 1, name: 'Cerveza Pilsen 630ml', category: 'Cervezas', price: 10.00, stock: 120, image: 'https://picsum.photos/seed/beer1/200/300' },
          { id: 2, name: 'Cusqueña Trigo 620ml', category: 'Cervezas', price: 12.00, stock: 80, image: 'https://picsum.photos/seed/beer2/200/300' },
          { id: 3, name: 'Corona Extra 355ml', category: 'Cervezas', price: 15.00, stock: 60, image: 'https://picsum.photos/seed/beer3/200/300' },
          { id: 4, name: 'Agua San Mateo 600ml', category: 'Aguas', price: 5.00, stock: 50, image: 'https://picsum.photos/seed/water1/200/300' },
          { id: 5, name: 'Agua Cielo 625ml', category: 'Aguas', price: 4.00, stock: 45, image: 'https://picsum.photos/seed/water2/200/300' },
          { id: 6, name: 'Coca Cola 500ml', category: 'Gaseosas', price: 6.00, stock: 70, image: 'https://picsum.photos/seed/soda1/200/300' },
          { id: 7, name: 'Inca Kola 500ml', category: 'Gaseosas', price: 6.00, stock: 70, image: 'https://picsum.photos/seed/soda2/200/300' },
          { id: 8, name: 'Guaraná 500ml', category: 'Gaseosas', price: 5.00, stock: 40, image: 'https://picsum.photos/seed/soda3/200/300' },
          { id: 9, name: 'Lucky Strike (Cajetilla)', category: 'Cigarros', price: 20.00, stock: 30, image: 'https://picsum.photos/seed/cigar1/200/300' },
          { id: 10, name: 'Hamilton (Cajetilla)', category: 'Cigarros', price: 18.00, stock: 25, image: 'https://picsum.photos/seed/cigar2/200/300' },
          { id: 11, name: 'Tequeños con Guacamole (10 und)', category: 'Piqueos', price: 18.00, stock: 40, image: 'https://picsum.photos/seed/tequenos/200/300' },
          { id: 12, name: 'Alitas BBQ (8 und)', category: 'Piqueos', price: 22.00, stock: 30, image: 'https://picsum.photos/seed/alitas/200/300' },
          { id: 13, name: 'Salchipapa Clásica', category: 'Comidas', price: 15.00, stock: 50, image: 'https://picsum.photos/seed/salchipapa/200/300' },
          { id: 14, name: 'Hamburguesa Royal', category: 'Comidas', price: 18.00, stock: 25, image: 'https://picsum.photos/seed/burger/200/300' },
          { id: 15, name: 'Chilcano de Pisco', category: 'Tragos Cortos', price: 20.00, stock: 40, image: 'https://picsum.photos/seed/chilcano/200/300' },
          { id: 16, name: 'Cuba Libre', category: 'Tragos Cortos', price: 18.00, stock: 45, image: 'https://picsum.photos/seed/cubalibre/200/300' },
        ];

        const INITIAL_CATEGORIES = ['Cervezas', 'Aguas', 'Gaseosas', 'Cigarros', 'Piqueos', 'Comidas', 'Tragos Cortos'];

        const SECTION_OPTIONS = [
          { id: 'pos', name: 'Punto de Venta (Caja)' },
          { id: 'inventory', name: 'Inventario (Solo ingreso)' },
          { id: 'purchases', name: 'Compras de Mercadería' },
          { id: 'expenses', name: 'Egresos y Gastos' },
          { id: 'sales', name: 'Reportes y Ventas' }
        ];

        const INITIAL_USERS = [
          { id: 1, name: 'Administrador General', username: 'admin', password: '123', role: 'admin', allowedSections: [], allowedCategories: [] },
          { id: 2, name: 'Cajero Barras', username: 'barras', password: '123', role: 'personal', allowedSections: ['pos'], allowedCategories: ['Cervezas', 'Aguas', 'Gaseosas', 'Cigarros', 'Tragos Cortos'] },
          { id: 3, name: 'Almacenero', username: 'almacen', password: '123', role: 'personal', allowedSections: ['inventory', 'purchases'], allowedCategories: [] }
        ];

        const DEFAULT_USER_FORM = { id: null, name: '', username: '', password: '', role: 'personal', allowedSections: ['pos'], allowedCategories: [] };

        const PAYMENT_METHODS = [
          { id: 'efectivo', name: 'Efectivo', icon: Banknote, color: 'bg-emerald-600' },
          { id: 'tarjeta', name: 'Tarjeta (POS)', icon: CreditCard, color: 'bg-blue-600' },
          { id: 'yape', name: 'Yape', icon: Smartphone, color: 'bg-purple-600' },
          { id: 'plin', name: 'Plin', icon: Smartphone, color: 'bg-cyan-600' },
        ];

        const DEFAULT_PRODUCT_FORM = { id: null, name: '', category: 'Cervezas', price: '', stock: '', image: '' };

        function DiscotecaPOS() {
          // --- Estados de Conexión (Firebase) ---
          const [sysAuthUser, setSysAuthUser] = useState(null);
          const [isSyncing, setIsSyncing] = useState(true);

          // --- Estado Global para Alertas Customizadas ---
          const [dialog, setDialog] = useState(null); 

          // --- Estados Principales Sincronizados ---
          const [activeTab, setActiveTab] = useState('pos');
          const [salesTab, setSalesTab] = useState('actual');
          const [products, setProducts] = useState([]);
          const [categories, setCategories] = useState([]);
          const [sales, setSales] = useState([]);
          const [users, setUsers] = useState([]);
          const [boxReports, setBoxReports] = useState([]);
          const [activeSessions, setActiveSessions] = useState([]); 
          const [purchases, setPurchases] = useState([]);
          const [expenses, setExpenses] = useState([]);

          // --- Fechas para Filtros de Historial ---
          const getTodayStr = () => {
            const today = new Date();
            const offset = today.getTimezoneOffset() * 60000;
            return (new Date(Date.now() - offset)).toISOString().split('T')[0];
          };
          const [filterStartDate, setFilterStartDate] = useState(getTodayStr());
          const [filterEndDate, setFilterEndDate] = useState(getTodayStr());

          // --- Estados de Sesión Local ---
          const [currentUser, setCurrentUser] = useState(null); 
          const [loginForm, setLoginForm] = useState({ username: '', password: '' });
          const [cart, setCart] = useState([]);
          const [boxSession, setBoxSession] = useState(null); 
          const [initialCashForm, setInitialCashForm] = useState('');
          const [declaredCashForm, setDeclaredCashForm] = useState(''); 

          // --- Estados de UI ---
          const [selectedCategory, setSelectedCategory] = useState('Todos');
          const [searchQuery, setSearchQuery] = useState('');
          
          // Modales
          const [showPaymentModal, setShowPaymentModal] = useState(false);
          const [showStockModal, setShowStockModal] = useState(false);
          const [showProductModal, setShowProductModal] = useState(false);
          const [showCategoryModal, setShowCategoryModal] = useState(false);
          const [showCloseBoxModal, setShowCloseBoxModal] = useState(false);
          const [showUserModal, setShowUserModal] = useState(false);
          const [showPurchaseModal, setShowPurchaseModal] = useState(false);
          const [showExpenseModal, setShowExpenseModal] = useState(false);
          
          // Formularios
          const [stockForm, setStockForm] = useState({ productId: '', quantity: 1, reason: 'Ajuste manual' });
          const [productForm, setProductForm] = useState(DEFAULT_PRODUCT_FORM);
          const [newCategoryName, setNewCategoryName] = useState('');
          const [userForm, setUserForm] = useState(DEFAULT_USER_FORM);
          
          const [expenseForm, setExpenseForm] = useState({ description: '', amount: '' });
          
          const [purchaseForm, setPurchaseForm] = useState({ provider: '', docType: 'Factura', docNumber: '', items: [] });
          const [purchaseItemTemp, setPurchaseItemTemp] = useState({ productId: '', qty: 1, cost: '' });

          // --- Utilidades Firebase ---
          const getColRef = (colName) => collection(db, 'artifacts', appId, 'public', 'data', colName);
          const getDocRef = (colName, docId) => doc(db, 'artifacts', appId, 'public', 'data', colName, docId);

          // --- 1. Inicialización de Firebase Auth ---
          useEffect(() => {
            const initAuth = async () => {
              try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                  try {
                    await signInWithCustomToken(auth, __initial_auth_token);
                  } catch (tokenError) {
                    console.warn("Token mismatch detectado. Usando autenticación anónima por defecto.", tokenError);
                    await signInAnonymously(auth);
                  }
                } else {
                  await signInAnonymously(auth);
                }
              } catch (error) {
                console.error("Error autenticando con Firebase", error);
              }
            };
            if(auth) initAuth();
            
            if(auth) {
              const unsubscribe = onAuthStateChanged(auth, (u) => {
                setSysAuthUser(u);
              });
              return () => unsubscribe();
            }
          }, []);

          // --- 2. Sincronización en Tiempo Real (Listeners) ---
          useEffect(() => {
            if (!sysAuthUser) return;

            setIsSyncing(true);

            const unsubUsers = onSnapshot(getColRef('pos_users'), (snap) => {
              if (snap.empty) {
                // Sembrar datos iniciales si la DB está virgen
                INITIAL_USERS.forEach(u => setDoc(getDocRef('pos_users', u.id.toString()), u));
                INITIAL_PRODUCTS.forEach(p => setDoc(getDocRef('pos_products', p.id.toString()), p));
                setDoc(getDocRef('pos_settings', 'categories'), { list: INITIAL_CATEGORIES });
              } else {
                const items = snap.docs.map(d => d.data()).sort((a,b) => a.id - b.id);
                setUsers(items);
              }
            }, console.error);

            const unsubProducts = onSnapshot(getColRef('pos_products'), (snap) => {
              const items = snap.docs.map(d => d.data()).sort((a,b) => a.id - b.id);
              setProducts(items);
              setIsSyncing(false);
            }, console.error);

            const unsubSettings = onSnapshot(getDocRef('pos_settings', 'categories'), (snap) => {
              if (snap.exists()) setCategories(snap.data().list || []);
            }, console.error);

            const unsubSales = onSnapshot(getColRef('pos_sales'), (snap) => {
              const items = snap.docs.map(d => ({...d.data(), date: new Date(d.data().date) })).sort((a,b) => b.date - a.date);
              setSales(items);
            }, console.error);

            const unsubReports = onSnapshot(getColRef('pos_reports'), (snap) => {
              const items = snap.docs.map(d => ({
                ...d.data(), 
                startTime: new Date(d.data().startTime),
                endTime: new Date(d.data().endTime)
              })).sort((a,b) => b.endTime - a.endTime);
              setBoxReports(items);
            }, console.error);

            const unsubSessions = onSnapshot(getColRef('pos_sessions'), (snap) => {
              const items = snap.docs.map(d => ({
                ...d.data(), 
                startTime: new Date(d.data().startTime)
              })).sort((a,b) => b.startTime - a.startTime);
              setActiveSessions(items);
            }, console.error);

            const unsubPurchases = onSnapshot(getColRef('pos_purchases'), (snap) => {
              const items = snap.docs.map(d => ({...d.data(), date: new Date(d.data().date) })).sort((a,b) => b.date - a.date);
              setPurchases(items);
            }, console.error);

            const unsubExpenses = onSnapshot(getColRef('pos_expenses'), (snap) => {
              const items = snap.docs.map(d => ({...d.data(), date: new Date(d.data().date) })).sort((a,b) => b.date - a.date);
              setExpenses(items);
            }, console.error);

            return () => {
              unsubUsers(); unsubProducts(); unsubSettings(); 
              unsubSales(); unsubReports(); unsubSessions(); unsubPurchases(); unsubExpenses();
            };
          }, [sysAuthUser]);

          // --- 3. Mantener la Sesión Local Sincronizada ---
          useEffect(() => {
            if (currentUser && currentUser.role !== 'admin') {
              const mySession = activeSessions.find(s => s.openedBy === currentUser.username);
              setBoxSession(mySession || null);
            } else {
              setBoxSession(null);
            }
          }, [activeSessions, currentUser]);


          // --- Funciones de Caja ---
          const handleOpenBox = async (e) => {
            e.preventDefault();
            const initialCash = parseFloat(initialCashForm) || 0;
            const sessionData = {
              id: Math.random().toString(36).substr(2, 9),
              startTime: new Date().toISOString(),
              initialCash: initialCash,
              salesEfectivo: 0,
              salesTarjeta: 0,
              salesYape: 0,
              salesPlin: 0,
              totalSalesCount: 0,
              openedBy: currentUser.username
            };
            
            // Guardar sesión activa en Firebase
            await setDoc(getDocRef('pos_sessions', sessionData.id), sessionData);
            setInitialCashForm('');
          };

          const handleCloseBox = async (e) => {
            e.preventDefault();
            if (!boxSession) return;
            
            const declaredCash = parseFloat(declaredCashForm) || 0;
            const efectivoEsperado = boxSession.initialCash + boxSession.salesEfectivo;

            const report = {
              ...boxSession,
              endTime: new Date(),
              totalVentas: boxSession.salesEfectivo + boxSession.salesTarjeta + boxSession.salesYape + boxSession.salesPlin,
              efectivoEsperado: efectivoEsperado,
              efectivoDeclarado: declaredCash,
              descuadre: declaredCash - efectivoEsperado,
              closedBy: currentUser.username
            };
            
            // Guardar en la nube el reporte final
            const reportId = Math.random().toString(36).substr(2, 9);
            await setDoc(getDocRef('pos_reports', reportId), {
              ...report,
              id: reportId,
              startTime: report.startTime.toISOString(),
              endTime: report.endTime.toISOString()
            });

            // Eliminar la sesión activa de Firebase
            await deleteDoc(getDocRef('pos_sessions', boxSession.id));

            setShowCloseBoxModal(false);
            setDeclaredCashForm('');
          };

          // --- Funciones del Carrito y Ventas ---
          const addToCart = (product) => {
            const existingItem = cart.find(item => item.id === product.id);
            const currentQtyInCart = existingItem ? existingItem.quantity : 0;

            if (currentQtyInCart >= product.stock) {
              setDialog({ type: 'alert', message: '¡No hay suficiente stock! (Sincronizado con otras cajas)' });
              return;
            }

            if (existingItem) {
              setCart(cart.map(item => 
                item.id === product.id ? { ...item, quantity: item.quantity + 1 } : item
              ));
            } else {
              setCart([...cart, { ...product, quantity: 1 }]);
            }
          };

          const updateCartQuantity = (id, delta) => {
            const product = products.find(p => p.id === id);
            setCart(cart.map(item => {
              if (item.id === id) {
                const newQty = item.quantity + delta;
                if (newQty > product.stock) {
                  setDialog({ type: 'alert', message: '¡Stock máximo alcanzado en este momento!' });
                  return item;
                }
                return { ...item, quantity: Math.max(1, newQty) };
              }
              return item;
            }));
          };

          const removeFromCart = (id) => setCart(cart.filter(item => item.id !== id));

          const cartTotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);

          const handleCheckout = async (paymentMethodId) => {
            if (cart.length === 0 || !boxSession) return;

            const saleId = Math.random().toString(36).substr(2, 9);
            const now = new Date();

            // 1. Validar y Actualizar Stock en la Nube
            for (const item of cart) {
              const dbProduct = products.find(p => p.id === item.id);
              if (dbProduct.stock < item.quantity) {
                 setDialog({ type: 'alert', message: `No hay stock suficiente de ${dbProduct.name}. Alguien más pudo haberlo vendido. Revisa el stock y reintenta.` });
                 return;
              }
            }

            // Si hay stock, procesar venta...
            for (const item of cart) {
              const dbProduct = products.find(p => p.id === item.id);
              const newStock = dbProduct.stock - item.quantity;
              
              await setDoc(getDocRef('pos_products', dbProduct.id.toString()), { ...dbProduct, stock: newStock });
            }

            // 2. Guardar Venta
            const newSale = {
              id: saleId,
              sessionId: boxSession.id,
              date: now.toISOString(),
              items: [...cart],
              total: cartTotal,
              paymentMethod: paymentMethodId,
              soldBy: currentUser.username
            };
            await setDoc(getDocRef('pos_sales', saleId), newSale);

            // 3. Actualizar Totales en Sesión de Caja (Firebase)
            const updatedSession = {
              ...boxSession,
              salesEfectivo: boxSession.salesEfectivo + (paymentMethodId === 'efectivo' ? cartTotal : 0),
              salesTarjeta: boxSession.salesTarjeta + (paymentMethodId === 'tarjeta' ? cartTotal : 0),
              salesYape: boxSession.salesYape + (paymentMethodId === 'yape' ? cartTotal : 0),
              salesPlin: boxSession.salesPlin + (paymentMethodId === 'plin' ? cartTotal : 0),
              totalSalesCount: boxSession.totalSalesCount + 1
            };
            
            await setDoc(getDocRef('pos_sessions', boxSession.id), {
              ...updatedSession,
              startTime: updatedSession.startTime.toISOString()
            });

            setCart([]);
            setShowPaymentModal(false);
          };

          // --- Funciones de Compras (Purchases) ---
          const handleAddPurchaseItem = () => {
            if (!purchaseItemTemp.productId || purchaseItemTemp.qty <= 0 || purchaseItemTemp.cost < 0) return;
            
            const product = products.find(p => p.id === parseInt(purchaseItemTemp.productId));
            if (!product) return;

            const newItem = {
              productId: product.id,
              productName: product.name,
              qty: parseInt(purchaseItemTemp.qty),
              cost: parseFloat(purchaseItemTemp.cost)
            };

            setPurchaseForm({
              ...purchaseForm,
              items: [...purchaseForm.items, newItem]
            });

            setPurchaseItemTemp({ productId: '', qty: 1, cost: '' });
          };

          const handleRemovePurchaseItem = (index) => {
            const newItems = [...purchaseForm.items];
            newItems.splice(index, 1);
            setPurchaseForm({ ...purchaseForm, items: newItems });
          };

          const handleSavePurchase = async (e) => {
            e.preventDefault();
            if (purchaseForm.items.length === 0) {
              setDialog({ type: 'alert', message: 'Agrega al menos un producto a la compra.' });
              return;
            }

            const purchaseId = Math.random().toString(36).substr(2, 9);
            const now = new Date();
            const totalCompra = purchaseForm.items.reduce((sum, item) => sum + (item.qty * item.cost), 0);

            // 1. Guardar la compra general
            const newPurchase = {
              id: purchaseId,
              date: now.toISOString(),
              provider: purchaseForm.provider,
              docType: purchaseForm.docType,
              docNumber: purchaseForm.docNumber,
              items: purchaseForm.items,
              total: totalCompra,
              registeredBy: currentUser.username
            };

            await setDoc(getDocRef('pos_purchases', purchaseId), newPurchase);

            // 2. Actualizar Stock por cada item comprado
            for (const item of purchaseForm.items) {
              const dbProduct = products.find(p => p.id === item.productId);
              if (dbProduct) {
                const newStock = dbProduct.stock + item.qty;
                
                await setDoc(getDocRef('pos_products', dbProduct.id.toString()), { ...dbProduct, stock: newStock });
              }
            }

            setShowPurchaseModal(false);
            setPurchaseForm({ provider: '', docType: 'Factura', docNumber: '', items: [] });
            setDialog({ type: 'alert', message: 'Compra registrada con éxito y stock actualizado.' });
          };

          // --- Funciones de Egresos (Expenses) ---
          const handleSaveExpense = async (e) => {
            e.preventDefault();
            const amount = parseFloat(expenseForm.amount);
            if (!amount || amount <= 0) return;

            const expenseId = Math.random().toString(36).substr(2, 9);
            const newExpense = {
              id: expenseId,
              date: new Date().toISOString(),
              description: expenseForm.description,
              amount: amount,
              registeredBy: currentUser.username
            };

            await setDoc(getDocRef('pos_expenses', expenseId), newExpense);

            setShowExpenseModal(false);
            setExpenseForm({ description: '', amount: '' });
          };

          // --- Funciones de Categorías (Sincronizadas) ---
          const handleAddCategory = async (e) => {
            e.preventDefault();
            if (newCategoryName.trim() && !categories.includes(newCategoryName.trim())) {
              const newCatList = [...categories, newCategoryName.trim()];
              await setDoc(getDocRef('pos_settings', 'categories'), { list: newCatList });
              setNewCategoryName('');
            }
          };

          const handleDeleteCategory = async (cat) => {
            const isUsed = products.some(p => p.category === cat);
            if (isUsed) {
              setDialog({ type: 'alert', message: `No puedes eliminar la categoría "${cat}" porque hay productos que la están usando.` });
              return;
            }
            setDialog({ type: 'confirm', message: `¿Eliminar la categoría "${cat}" de forma permanente?`, onConfirm: async () => {
              const newCatList = categories.filter(c => c !== cat);
              await setDoc(getDocRef('pos_settings', 'categories'), { list: newCatList });
              if (selectedCategory === cat) setSelectedCategory('Todos');
            }});
          };

          // --- Funciones de Autenticación Local ---
          const handleLogin = (e) => {
            e.preventDefault();
            const user = users.find(u => u.username === loginForm.username && u.password === loginForm.password);
            if (user) {
              setCurrentUser(user);
              
              if (user.role === 'admin') {
                setActiveTab('sales');
                setSalesTab('actual');
              } else {
                setActiveTab(user.allowedSections?.includes('pos') ? 'pos' : user.allowedSections[0]);
                setSalesTab('actual');
              }
              
              setLoginForm({ username: '', password: '' });
            } else {
              setDialog({ type: 'alert', message: 'Usuario o contraseña incorrectos. Verifica tus datos.' });
            }
          };

          const handleLogout = () => {
            if (boxSession) {
              setDialog({ type: 'confirm', message: 'Tu caja está abierta. ¿Deseas cerrar sesión? (Tu turno y ventas seguirán activos en la nube hasta que cierres la caja)', onConfirm: () => setCurrentUser(null) });
              return;
            }
            setCurrentUser(null);
          };

          // --- Funciones de Usuarios (CRUD Sincronizado) ---
          const handleOpenUserModal = (user = null) => {
            setUserForm(user ? user : DEFAULT_USER_FORM);
            setShowUserModal(true);
          };

          const handleSaveUser = async (e) => {
            e.preventDefault();
            const newId = userForm.id || (users.length > 0 ? Math.max(...users.map(u => u.id)) + 1 : 1);
            await setDoc(getDocRef('pos_users', newId.toString()), { ...userForm, id: newId });
            setShowUserModal(false);
          };

          const handleDeleteUser = async (id) => {
            if (id === currentUser.id) {
              setDialog({ type: 'alert', message: 'No puedes eliminar tu propio usuario.' });
              return;
            }
            setDialog({ type: 'confirm', message: '¿Eliminar este usuario del sistema permanentemente?', onConfirm: async () => {
              await deleteDoc(getDocRef('pos_users', id.toString()));
            }});
          };

          // --- Funciones de Productos (CRUD Sincronizado) ---
          const handleOpenProductModal = (product = null) => {
            setProductForm(product ? product : { ...DEFAULT_PRODUCT_FORM, category: categories[0] || '' });
            setShowProductModal(true);
          };

          const handleSaveProduct = async (e) => {
            e.preventDefault();
            
            const newId = productForm.id || (products.length > 0 ? Math.max(...products.map(p => p.id)) + 1 : 1);
            const productData = {
              ...productForm,
              id: newId,
              price: parseFloat(productForm.price),
              stock: parseInt(productForm.stock) || 0,
              image: productForm.image || `https://picsum.photos/seed/${productForm.name.replace(/\s/g, '')}/200/300`
            };

            await setDoc(getDocRef('pos_products', newId.toString()), productData);
            setShowProductModal(false);
          };

          const handleDeleteProduct = async (id) => {
            setDialog({ type: 'confirm', message: '¿Eliminar este producto permanentemente de todas las pantallas?', onConfirm: async () => {
              await deleteDoc(getDocRef('pos_products', id.toString()));
              setCart(cart.filter(item => item.id !== id));
            }});
          };

          // --- Ingreso de Mercadería (Ajuste Manual) ---
          const handleAddStock = async (e) => {
            e.preventDefault();
            const productId = parseInt(stockForm.productId);
            const qty = parseInt(stockForm.quantity);
            if (!productId || qty <= 0) return;

            const product = products.find(p => p.id === productId);
            const newStock = product.stock + qty;

            await setDoc(getDocRef('pos_products', productId.toString()), { ...product, stock: newStock });

            setShowStockModal(false);
            setStockForm({ productId: '', quantity: 1, reason: 'Ajuste manual' });
          };

          // --- Utilidades de Formato ---
          const formatCurrency = (amount) => `S/ ${amount.toFixed(2)}`;
          const formatDate = (date) => new Intl.DateTimeFormat('es-PE', { 
            year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' 
          }).format(date);
          const formatTime = (date) => new Intl.DateTimeFormat('es-PE', { 
            hour: '2-digit', minute: '2-digit' 
          }).format(date);

          // --- Filtrado de Productos y Permisos (Caja) ---
          const isAllowedProduct = (product) => {
            if (currentUser?.role === 'admin') return true;
            return currentUser?.allowedCategories?.includes(product.category);
          };

          const filteredProducts = products.filter(p => {
            if (!isAllowedProduct(p)) return false; 
            const matchCategory = selectedCategory === 'Todos' || p.category === selectedCategory;
            const matchSearch = p.name.toLowerCase().includes(searchQuery.toLowerCase());
            return matchCategory && matchSearch;
          });

          const getCategoryIcon = (category) => {
            switch(category.toLowerCase()) {
              case 'cervezas': return <Beer size={18} />;
              case 'aguas': return <Wine size={18} />;
              case 'gaseosas': return <CupSoda size={18} />;
              case 'cigarros': return <Cigarette size={18} />;
              case 'piqueos': return <Pizza size={18} />;
              case 'comidas': return <Utensils size={18} />;
              case 'tragos cortos': return <Martini size={18} />;
              default: return <Package size={18} />;
            }
          };

          const userCategories = currentUser?.role === 'admin' 
            ? categories 
            : categories.filter(cat => currentUser?.allowedCategories?.includes(cat));

          // ================= RENDERIZADO DE VISTAS =================

          const renderOpenBoxScreen = () => (
            <div className="flex-1 flex flex-col items-center justify-center bg-gray-50 h-full p-6">
              <div className="bg-white p-8 rounded-3xl shadow-xl border border-gray-200 w-full max-w-md text-center relative overflow-hidden">
                {isSyncing && (
                  <div className="absolute top-0 left-0 w-full bg-blue-500 text-white text-xs py-1 font-bold animate-pulse">Sincronizando con la nube...</div>
                )}
                <div className="w-20 h-20 bg-indigo-100 rounded-full flex items-center justify-center mx-auto mb-6 mt-4">
                  <Lock size={40} className="text-indigo-600" />
                </div>
                <h2 className="text-2xl font-black text-gray-900 mb-2">Caja Cerrada</h2>
                <p className="text-gray-500 mb-8 font-medium">Apertura la caja ingresando el fondo inicial para comenzar a realizar ventas.</p>
                
                <form onSubmit={handleOpenBox} className="space-y-6">
                  <div className="text-left">
                    <label className="block text-sm font-bold text-gray-700 mb-2">Monto Inicial en Efectivo (S/)</label>
                    <div className="relative">
                      <span className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 font-bold">S/</span>
                      <input 
                        type="number" 
                        step="0.10"
                        min="0"
                        required
                        autoFocus
                        className="w-full bg-gray-50 border border-gray-300 rounded-xl py-3 pl-10 pr-4 text-gray-900 font-bold text-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all"
                        value={initialCashForm}
                        onChange={(e) => setInitialCashForm(e.target.value)}
                        placeholder="0.00"
                      />
                    </div>
                  </div>
                  
                  <button 
                    type="submit"
                    className="w-full py-4 rounded-xl font-bold text-white bg-indigo-600 hover:bg-indigo-700 shadow-lg shadow-indigo-600/30 transition-all flex items-center justify-center gap-2 text-lg"
                  >
                    <Unlock size={22} /> Iniciar Turno de Caja
                  </button>
                </form>
              </div>
            </div>
          );

          const renderPOS = () => {
            if (!boxSession) return renderOpenBoxScreen();

            return (
              <div className="flex h-full w-full bg-gray-50 overflow-hidden">
                {/* Catálogo de Productos */}
                <div className="flex-1 flex flex-col p-4 overflow-hidden">
                  {/* Top Bar POS */}
                  <div className="flex gap-4 mb-4">
                    <div className="flex-1 relative shadow-sm">
                      <Search className="absolute left-3 top-3 text-gray-400" size={20} />
                      <input 
                        type="text" 
                        placeholder="Buscar producto..." 
                        className="w-full bg-white text-gray-800 rounded-xl pl-10 pr-4 py-2 border border-gray-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all font-medium"
                        value={searchQuery}
                        onChange={(e) => setSearchQuery(e.target.value)}
                      />
                    </div>
                    {isSyncing ? (
                      <div className="bg-blue-50 text-blue-600 border border-blue-200 px-4 py-2 rounded-xl flex items-center gap-2 font-bold shadow-sm animate-pulse text-sm">
                        <Cloud size={18}/> Conectando...
                      </div>
                    ) : (
                      <div className="bg-emerald-50 text-emerald-600 border border-emerald-200 px-4 py-2 rounded-xl flex items-center gap-2 font-bold shadow-sm text-sm" title="Stock sincronizado en vivo">
                        <Cloud size={18}/> En línea
                      </div>
                    )}
                  </div>

                  {/* Categorías */}
                  <div className="flex gap-2 mb-4 overflow-x-auto pb-2 custom-scrollbar">
                    {['Todos', ...userCategories].map(cat => (
                      <button
                        key={cat}
                        onClick={() => setSelectedCategory(cat)}
                        className={`px-4 py-2 rounded-full whitespace-nowrap font-medium flex items-center gap-2 transition-all shadow-sm ${
                          selectedCategory === cat 
                            ? 'bg-indigo-600 text-white shadow-indigo-600/30' 
                            : 'bg-white text-gray-600 border border-gray-200 hover:bg-gray-100 hover:text-gray-900'
                        }`}
                      >
                        {cat !== 'Todos' && getCategoryIcon(cat)}
                        {cat}
                      </button>
                    ))}
                  </div>

                  {/* Grilla de Productos */}
                  <div className="flex-1 overflow-y-auto custom-scrollbar pr-2">
                    <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 pb-20">
                      {filteredProducts.map(product => (
                        <div 
                          key={product.id}
                          onClick={() => product.stock > 0 && addToCart(product)}
                          className={`relative bg-white rounded-xl p-3 border-2 transition-all cursor-pointer select-none flex flex-col justify-start h-full shadow-sm hover:shadow-md ${
                            product.stock > 0 
                              ? 'border-transparent hover:border-indigo-500 active:scale-95' 
                              : 'border-red-100 opacity-60 cursor-not-allowed grayscale-[50%]'
                          }`}
                        >
                          {/* Imagen del Producto */}
                          <div className="aspect-[3/4] w-full bg-gray-100 rounded-lg overflow-hidden flex items-center justify-center mb-3 relative">
                            {product.image ? (
                              <img src={product.image} alt={product.name} className="object-cover object-center w-full h-full hover:scale-105 transition-transform duration-300" />
                            ) : (
                              <ImageIcon size={32} className="text-gray-300" />
                            )}
                          </div>
                          
                          <div className="flex-1 flex flex-col justify-between">
                            <div className="mb-2">
                              <div className="text-[10px] text-indigo-600 font-bold uppercase tracking-wider mb-0.5">{product.category}</div>
                              <h3 className="text-gray-800 font-bold text-sm leading-tight line-clamp-2">{product.name}</h3>
                            </div>
                            <div className="flex justify-between items-end mt-auto pt-2">
                              <span className="text-lg font-black text-emerald-600">{formatCurrency(product.price)}</span>
                              <span className={`text-xs px-2 py-1 rounded-md font-bold transition-colors duration-500 ${
                                product.stock > 10 ? 'bg-gray-100 text-gray-600' : 'bg-red-100 text-red-600 animate-pulse'
                              }`}>
                                Stock: {product.stock}
                              </span>
                            </div>
                          </div>
                        </div>
                      ))}
                      {filteredProducts.length === 0 && (
                        <div className="col-span-full flex flex-col items-center justify-center text-gray-400 h-64">
                           <Package size={48} className="mb-4 opacity-50" />
                           <p className="font-medium text-lg">No hay productos disponibles para mostrar.</p>
                        </div>
                      )}
                    </div>
                  </div>
                </div>

                {/* Carrito Lateral */}
                <div className="w-96 bg-white border-l border-gray-200 flex flex-col shadow-2xl z-10">
                  <div className="p-4 border-b border-gray-200 flex justify-between items-center bg-white/90 backdrop-blur-md">
                    <h2 className="text-xl font-bold text-gray-800 flex items-center gap-2">
                      <ShoppingCart className="text-indigo-600" /> Pedido Actual
                    </h2>
                    <span className="bg-indigo-600 text-white px-3 py-1 rounded-full text-sm font-bold shadow-sm">
                      {cart.reduce((sum, item) => sum + item.quantity, 0)} items
                    </span>
                  </div>

                  <div className="flex-1 overflow-y-auto p-4 custom-scrollbar bg-gray-50/50">
                    {cart.length === 0 ? (
                      <div className="h-full flex flex-col items-center justify-center text-gray-400">
                        <ShoppingCart size={48} className="mb-4 text-gray-300" />
                        <p className="font-medium">El carrito está vacío</p>
                      </div>
                    ) : (
                      <div className="space-y-3">
                        {cart.map(item => (
                          <div key={item.id} className="bg-white rounded-xl p-3 flex flex-col gap-2 border border-gray-200 shadow-sm">
                            <div className="flex justify-between items-start gap-2">
                              <span className="font-semibold text-gray-800 text-sm leading-tight flex-1">{item.name}</span>
                              <button onClick={() => removeFromCart(item.id)} className="text-red-500 hover:text-red-700 bg-red-50 p-1.5 rounded-lg transition-colors">
                                <Trash2 size={16} />
                              </button>
                            </div>
                            <div className="flex justify-between items-center mt-1">
                              <span className="text-emerald-600 font-black">{formatCurrency(item.price)}</span>
                              <div className="flex items-center gap-2 bg-gray-100 rounded-lg p-1 border border-gray-200">
                                <button 
                                  onClick={() => updateCartQuantity(item.id, -1)}
                                  className="bg-white hover:bg-gray-50 border border-gray-200 rounded p-1 text-gray-600 transition-colors shadow-sm"
                                >
                                  <Minus size={14} />
                                </button>
                                <span className="text-gray-800 font-bold w-6 text-center text-sm">{item.quantity}</span>
                                <button 
                                  onClick={() => updateCartQuantity(item.id, 1)}
                                  className="bg-white hover:bg-gray-50 border border-gray-200 rounded p-1 text-gray-600 transition-colors shadow-sm"
                                >
                                  <Plus size={14} />
                                </button>
                              </div>
                            </div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>

                  <div className="p-5 bg-white border-t border-gray-200">
                    <div className="flex justify-between items-center mb-4">
                      <span className="text-gray-500 font-medium">Total a Pagar</span>
                      <span className="text-3xl font-black text-gray-900">{formatCurrency(cartTotal)}</span>
                    </div>
                    <button 
                      onClick={() => setShowPaymentModal(true)}
                      disabled={cart.length === 0}
                      className={`w-full py-4 rounded-xl font-bold text-lg flex items-center justify-center gap-2 transition-all ${
                        cart.length > 0 
                          ? 'bg-indigo-600 hover:bg-indigo-700 text-white shadow-lg shadow-indigo-600/30' 
                          : 'bg-gray-200 text-gray-400 cursor-not-allowed'
                      }`}
                    >
                      <Wallet size={24} /> Cobrar
                    </button>
                  </div>
                </div>
              </div>
            );
          };

          const renderInventory = () => (
            <div className="p-6 h-full flex flex-col bg-gray-50 text-gray-800 overflow-hidden">
              <div className="flex justify-between items-center mb-6">
                <h2 className="text-2xl font-bold flex items-center gap-2 text-gray-900">
                  <Package className="text-indigo-600" /> Inventario y Productos
                </h2>
                <div className="flex gap-3">
                  {currentUser?.role === 'admin' && (
                    <>
                      <button 
                        onClick={() => setShowCategoryModal(true)}
                        className="bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 px-4 py-2.5 rounded-xl font-bold flex items-center gap-2 transition-all shadow-sm"
                      >
                        <Tags size={18} /> Categorías
                      </button>
                      <button 
                        onClick={() => handleOpenProductModal()}
                        className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2.5 rounded-xl font-bold flex items-center gap-2 transition-all shadow-sm shadow-indigo-600/20"
                      >
                        <Plus size={18} /> Nuevo Producto
                      </button>
                    </>
                  )}
                  <button 
                    onClick={() => setShowStockModal(true)}
                    className="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2.5 rounded-xl font-bold flex items-center gap-2 transition-all shadow-sm"
                    title="Solo para cuadrar diferencias. Usa el módulo Compras para ingresos reales."
                  >
                    <Edit2 size={18} /> Ajuste de Stock
                  </button>
                </div>
              </div>

              <div className="bg-white rounded-2xl overflow-hidden border border-gray-200 shadow-sm flex-1 flex flex-col">
                <div className="overflow-x-auto flex-1 custom-scrollbar">
                  <table className="w-full text-left border-collapse">
                    <thead className="bg-gray-100 text-gray-600 text-sm uppercase font-semibold sticky top-0 z-10">
                      <tr>
                        <th className="px-6 py-4">Img</th>
                        <th className="px-6 py-4">Producto</th>
                        <th className="px-6 py-4">Categoría</th>
                        <th className="px-6 py-4">Precio</th>
                        <th className="px-6 py-4 text-center">Stock Actual</th>
                        <th className="px-6 py-4 text-center">Estado</th>
                        {currentUser?.role === 'admin' && <th className="px-6 py-4 text-right">Acciones</th>}
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-gray-100">
                      {products.map(p => (
                        <tr key={p.id} className="hover:bg-gray-50/80 transition-colors">
                          <td className="px-6 py-3">
                             <div className="w-10 h-14 rounded-lg bg-gray-100 border border-gray-200 overflow-hidden flex items-center justify-center">
                                {p.image ? <img src={p.image} alt={p.name} className="w-full h-full object-cover" /> : <ImageIcon size={16} className="text-gray-400"/>}
                             </div>
                          </td>
                          <td className="px-6 py-4 font-bold text-gray-800">{p.name}</td>
                          <td className="px-6 py-4">
                            <span className="bg-gray-100 text-gray-600 border border-gray-200 px-3 py-1 rounded-full text-xs font-semibold">{p.category}</span>
                          </td>
                          <td className="px-6 py-4 font-bold text-emerald-600">{formatCurrency(p.price)}</td>
                          <td className="px-6 py-4 text-center font-black text-lg text-gray-700 transition-colors">{p.stock}</td>
                          <td className="px-6 py-4 text-center">
                            {p.stock > 20 ? (
                              <span className="inline-flex items-center gap-1.5 bg-emerald-100 text-emerald-700 px-2.5 py-1 rounded-full text-xs font-bold">Óptimo</span>
                            ) : p.stock > 0 ? (
                              <span className="inline-flex items-center gap-1.5 bg-amber-100 text-amber-700 px-2.5 py-1 rounded-full text-xs font-bold">Bajo</span>
                            ) : (
                              <span className="inline-flex items-center gap-1.5 bg-red-100 text-red-700 px-2.5 py-1 rounded-full text-xs font-bold">Agotado</span>
                            )}
                          </td>
                          {currentUser?.role === 'admin' && (
                            <td className="px-6 py-4 text-right">
                              <div className="flex items-center justify-end gap-2">
                                <button 
                                  onClick={() => handleOpenProductModal(p)}
                                  className="p-2 text-indigo-600 hover:bg-indigo-50 rounded-lg transition-colors"
                                  title="Editar"
                                >
                                  <Edit2 size={18} />
                                </button>
                                <button 
                                  onClick={() => handleDeleteProduct(p.id)}
                                  className="p-2 text-red-600 hover:bg-red-50 rounded-lg transition-colors"
                                  title="Eliminar"
                                >
                                  <Trash2 size={18} />
                                </button>
                              </div>
                            </td>
                          )}
                        </tr>
                      ))}
                      {products.length === 0 && (
                        <tr><td colSpan={currentUser?.role === 'admin' ? 7 : 6} className="text-center py-12 text-gray-500">No hay productos registrados en el inventario.</td></tr>
                      )}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          );

          // VISTA COMPRAS
          const renderPurchases = () => {
             return (
               <div className="p-6 h-full flex flex-col bg-gray-50 text-gray-800 overflow-hidden">
                 <div className="flex justify-between items-center mb-6">
                    <h2 className="text-2xl font-bold flex items-center gap-2 text-gray-900">
                      <ShoppingBag className="text-indigo-600" /> Compras e Ingresos a Almacén
                    </h2>
                    <button 
                      onClick={() => setShowPurchaseModal(true)}
                      className="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2.5 rounded-xl font-bold flex items-center gap-2 transition-all shadow-sm shadow-emerald-600/20"
                    >
                      <Plus size={18} /> Registrar Compra (Factura/Boleta)
                    </button>
                  </div>

                  <div className="bg-white rounded-2xl overflow-hidden border border-gray-200 shadow-sm flex-1 flex flex-col">
                    <div className="overflow-x-auto flex-1 custom-scrollbar">
                      <table className="w-full text-left border-collapse">
                        <thead className="bg-gray-100 text-gray-600 text-sm uppercase font-semibold sticky top-0">
                          <tr>
                            <th className="px-6 py-4">Fecha</th>
                            <th className="px-6 py-4">Documento</th>
                            <th className="px-6 py-4">Proveedor</th>
                            <th className="px-6 py-4">Detalle de Compra</th>
                            <th className="px-6 py-4 text-right">Total Invertido</th>
                            <th className="px-6 py-4">Registrado por</th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-gray-100">
                          {purchases.map(p => (
                            <tr key={p.id} className="hover:bg-gray-50/80 transition-colors">
                              <td className="px-6 py-4 text-sm text-gray-500 font-medium">{formatDate(p.date)}</td>
                              <td className="px-6 py-4">
                                <span className="font-bold text-gray-700 uppercase">{p.docType}</span>
                                <div className="text-xs text-gray-500">#{p.docNumber}</div>
                              </td>
                              <td className="px-6 py-4 font-bold text-gray-800">{p.provider || 'Sin Nombre'}</td>
                              <td className="px-6 py-4">
                                <ul className="text-xs space-y-1">
                                  {p.items.map((item, i) => (
                                    <li key={i} className="text-gray-700">
                                      <span className="font-bold text-indigo-600">{item.qty}x</span> {item.productName} <span className="text-gray-400">({formatCurrency(item.cost)} c/u)</span>
                                    </li>
                                  ))}
                                </ul>
                              </td>
                              <td className="px-6 py-4 text-right font-black text-rose-600">{formatCurrency(p.total)}</td>
                              <td className="px-6 py-4 text-sm text-gray-600 uppercase">{p.registeredBy}</td>
                            </tr>
                          ))}
                          {purchases.length === 0 && (
                            <tr><td colSpan="6" className="text-center py-12 text-gray-500">No hay compras registradas en el historial.</td></tr>
                          )}
                        </tbody>
                      </table>
                    </div>
                  </div>
               </div>
             );
          };

          // VISTA EGRESOS
          const renderExpenses = () => {
            return (
               <div className="p-6 h-full flex flex-col bg-gray-50 text-gray-800 overflow-hidden">
                 <div className="flex justify-between items-center mb-6">
                    <h2 className="text-2xl font-bold flex items-center gap-2 text-gray-900">
                      <TrendingDown className="text-rose-600" /> Registro de Egresos y Gastos
                    </h2>
                    <button 
                      onClick={() => setShowExpenseModal(true)}
                      className="bg-rose-600 hover:bg-rose-700 text-white px-4 py-2.5 rounded-xl font-bold flex items-center gap-2 transition-all shadow-sm shadow-rose-600/20"
                    >
                      <Plus size={18} /> Nuevo Egreso
                    </button>
                  </div>

                  <div className="bg-white rounded-2xl overflow-hidden border border-gray-200 shadow-sm flex-1 flex flex-col">
                    <div className="overflow-x-auto flex-1 custom-scrollbar">
                      <table className="w-full text-left border-collapse">
                        <thead className="bg-gray-100 text-gray-600 text-sm uppercase font-semibold sticky top-0">
                          <tr>
                            <th className="px-6 py-4">Fecha</th>
                            <th className="px-6 py-4">Descripción / Motivo</th>
                            <th className="px-6 py-4 text-right">Monto</th>
                            <th className="px-6 py-4">Registrado por</th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-gray-100">
                          {expenses.map(e => (
                            <tr key={e.id} className="hover:bg-gray-50/80 transition-colors">
                              <td className="px-6 py-4 text-sm text-gray-500 font-medium">{formatDate(e.date)}</td>
                              <td className="px-6 py-4 text-gray-800">{e.description}</td>
                              <td className="px-6 py-4 text-right font-black text-rose-600">{formatCurrency(e.amount)}</td>
                              <td className="px-6 py-4 text-sm text-gray-600 uppercase">{e.registeredBy}</td>
                            </tr>
                          ))}
                          {expenses.length === 0 && (
                            <tr><td colSpan="4" className="text-center py-12 text-gray-500">No hay egresos registrados en el historial.</td></tr>
                          )}
                        </tbody>
                      </table>
                    </div>
                  </div>
               </div>
             );
          };

          const renderSales = () => {
            // VISTA ADMINISTRADOR: Turno Actual (Cajas en Vivo)
            if (currentUser?.role === 'admin' && salesTab === 'actual') {
              return (
                <div className="p-6 h-full flex flex-col bg-gray-50 text-gray-800 overflow-hidden">
                  <div className="flex justify-between items-center mb-6">
                    <h2 className="text-2xl font-bold flex items-center gap-2 text-gray-900">
                      <Activity className="text-emerald-600" /> Cajas Abiertas (En Vivo)
                    </h2>
                    <div className="flex bg-white rounded-xl border border-gray-200 p-1 shadow-sm">
                      <button 
                        onClick={() => setSalesTab('actual')}
                        className={`px-6 py-2 rounded-lg font-bold text-sm transition-all ${salesTab === 'actual' ? 'bg-indigo-600 text-white shadow-md' : 'text-gray-500 hover:text-gray-900'}`}
                      >
                        En Vivo (Abiertas)
                      </button>
                      <button 
                        onClick={() => setSalesTab('historial')}
                        className={`px-6 py-2 rounded-lg font-bold text-sm transition-all ${salesTab === 'historial' ? 'bg-indigo-600 text-white shadow-md' : 'text-gray-500 hover:text-gray-900'}`}
                      >
                        Historial Cierres
                      </button>
                    </div>
                  </div>

                  <div className="flex-1 overflow-y-auto custom-scrollbar pr-2">
                    {activeSessions.length === 0 ? (
                      <div className="flex flex-col items-center justify-center bg-white rounded-2xl border border-gray-200 shadow-sm py-20 text-center h-full">
                        <Lock size={64} className="text-gray-300 mb-4" />
                        <h3 className="text-xl font-bold text-gray-800 mb-2">No hay cajas activas</h3>
                        <p className="text-gray-500">Ningún empleado ha abierto caja en este momento.</p>
                      </div>
                    ) : (
                      <div className="grid grid-cols-1 xl:grid-cols-2 gap-6 pb-6">
                        {activeSessions.map(session => {
                          const sessionSales = sales.filter(s => s.sessionId === session.id);
                          const totalCaja = session.initialCash + session.salesEfectivo;
                          const totalVendido = session.salesEfectivo + session.salesTarjeta + session.salesYape + session.salesPlin;

                          return (
                            <div key={session.id} className="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden flex flex-col">
                              <div className="p-4 border-b border-gray-100 bg-emerald-50/50 flex justify-between items-center relative overflow-hidden">
                                <div className="absolute right-0 top-0 w-32 h-32 bg-emerald-100 rounded-full blur-3xl -mr-10 -mt-10 opacity-50"></div>
                                <div className="flex items-center gap-3 relative z-10">
                                  <div className="w-12 h-12 bg-indigo-100 text-indigo-700 rounded-full flex items-center justify-center font-black text-xl border-2 border-white shadow-sm">
                                    {session.openedBy.charAt(0).toUpperCase()}
                                  </div>
                                  <div>
                                    <div className="font-bold text-gray-900 leading-tight">Cajero: {session.openedBy}</div>
                                    <div className="text-xs text-emerald-600 font-bold flex items-center gap-1 mt-0.5">
                                      <Unlock size={12}/> Apertura: {formatTime(session.startTime)}
                                    </div>
                                  </div>
                                </div>
                                <div className="text-right relative z-10">
                                  <div className="text-[10px] text-gray-500 font-bold uppercase mb-0.5">Total Vendido Hoy</div>
                                  <div className="text-2xl font-black text-indigo-600">{formatCurrency(totalVendido)}</div>
                                </div>
                              </div>
                              
                              <div className="p-4 grid grid-cols-2 md:grid-cols-4 gap-3 bg-white">
                                 <div className="bg-gray-50 p-2.5 rounded-xl border border-gray-100 flex flex-col justify-center">
                                   <div className="text-[10px] text-gray-500 font-bold uppercase mb-1">Fondo Inicial</div>
                                   <div className="font-black text-gray-700">{formatCurrency(session.initialCash)}</div>
                                 </div>
                                 <div className="bg-emerald-50 p-2.5 rounded-xl border border-emerald-100 flex flex-col justify-center relative overflow-hidden">
                                   <div className="text-[10px] text-emerald-700 font-bold uppercase mb-1 flex items-center gap-1 z-10"><Wallet size={12}/> Físico Esperado</div>
                                   <div className="font-black text-emerald-700 z-10">{formatCurrency(totalCaja)}</div>
                                 </div>
                                 <div className="bg-blue-50 p-2.5 rounded-xl border border-blue-100 flex flex-col justify-center">
                                   <div className="text-[10px] text-blue-700 font-bold uppercase mb-1 flex items-center gap-1"><CreditCard size={10}/> Tarjeta</div>
                                   <div className="font-black text-blue-700">{formatCurrency(session.salesTarjeta)}</div>
                                 </div>
                                 <div className="flex flex-col gap-2">
                                   <div className="flex-1 bg-purple-50 px-2.5 py-1.5 rounded-lg border border-purple-100 flex justify-between items-center">
                                     <span className="text-[9px] text-purple-700 font-bold uppercase">Yape</span>
                                     <span className="font-black text-purple-700 text-xs">{formatCurrency(session.salesYape)}</span>
                                   </div>
                                   <div className="flex-1 bg-cyan-50 px-2.5 py-1.5 rounded-lg border border-cyan-100 flex justify-between items-center">
                                     <span className="text-[9px] text-cyan-700 font-bold uppercase">Plin</span>
                                     <span className="font-black text-cyan-700 text-xs">{formatCurrency(session.salesPlin)}</span>
                                   </div>
                                 </div>
                              </div>

                              <div className="flex-1 bg-gray-50 border-t border-gray-100 p-4">
                                <h4 className="text-xs font-bold text-gray-500 uppercase mb-3 flex items-center gap-1"><History size={14}/> Últimas Ventas ({session.totalSalesCount})</h4>
                                <div className="space-y-2 max-h-[160px] overflow-y-auto custom-scrollbar pr-1">
                                   {sessionSales.slice(0, 10).map(sale => {
                                     const method = PAYMENT_METHODS.find(m => m.id === sale.paymentMethod);
                                     return (
                                       <div key={sale.id} className="bg-white p-2.5 rounded-lg border border-gray-200 flex justify-between items-center text-sm shadow-sm hover:border-indigo-300 transition-colors">
                                         <div className="overflow-hidden pr-2">
                                           <div className="font-bold text-gray-800">{formatTime(sale.date)} <span className="text-gray-400 font-medium text-[10px] ml-1">#{sale.id.toUpperCase()}</span></div>
                                           <div className="text-[10px] text-gray-500 truncate w-full">{sale.items.map(i => `${i.quantity}x ${i.name}`).join(', ')}</div>
                                         </div>
                                         <div className="text-right flex-shrink-0">
                                           <div className="font-black text-emerald-600">{formatCurrency(sale.total)}</div>
                                           <div className={`text-[9px] px-1.5 py-0.5 rounded font-bold text-white uppercase mt-0.5 inline-block ${method?.color || 'bg-gray-500'}`}>{method?.name}</div>
                                         </div>
                                       </div>
                                     )
                                   })}
                                   {sessionSales.length === 0 && <div className="text-xs text-gray-400 text-center py-4 bg-gray-100 rounded-lg">No hay ventas registradas aún en este turno.</div>}
                                </div>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </div>
                </div>
              );
            }

            // VISTA PERSONAL: Turno Actual Local (Cajero Normal)
            const currentSessionSales = boxSession ? sales.filter(s => s.sessionId === boxSession.id) : [];

            return (
              <div className="p-6 h-full flex flex-col bg-gray-50 text-gray-800 overflow-hidden">
                <div className="flex justify-between items-center mb-6">
                  <h2 className="text-2xl font-bold flex items-center gap-2 text-gray-900">
                    <History className="text-indigo-600" /> Registro y Reportes de Ventas
                  </h2>
                  
                  <div className="flex bg-white rounded-xl border border-gray-200 p-1 shadow-sm">
                    <button 
                      onClick={() => setSalesTab('actual')}
                      className={`px-6 py-2 rounded-lg font-bold text-sm transition-all ${salesTab === 'actual' ? 'bg-indigo-600 text-white shadow-md' : 'text-gray-500 hover:text-gray-900'}`}
                    >
                      Mi Turno Actual
                    </button>
                    <button 
                      onClick={() => setSalesTab('historial')}
                      className={`px-6 py-2 rounded-lg font-bold text-sm transition-all ${salesTab === 'historial' ? 'bg-indigo-600 text-white shadow-md' : 'text-gray-500 hover:text-gray-900'}`}
                    >
                      Historial
                    </button>
                  </div>
                </div>

                {salesTab === 'actual' ? (
                  <div className="flex-1 flex flex-col gap-6 overflow-hidden">
                    {boxSession ? (
                      <>
                        {/* Resumen del Turno */}
                        <div className="grid grid-cols-2 lg:grid-cols-3 gap-4">
                          <div className="bg-white p-4 rounded-2xl border border-gray-200 shadow-sm flex flex-col">
                            <span className="text-gray-500 text-sm font-bold mb-1">Monto Inicial (Caja)</span>
                            <span className="text-2xl font-black text-gray-800">{formatCurrency(boxSession.initialCash)}</span>
                          </div>
                          <div className="bg-white p-4 rounded-2xl border border-gray-200 shadow-sm flex flex-col">
                            <span className="text-gray-500 text-sm font-bold mb-1">Ventas en Efectivo</span>
                            <span className="text-2xl font-black text-emerald-600">{formatCurrency(boxSession.salesEfectivo)}</span>
                          </div>
                          <div className="bg-indigo-600 p-4 rounded-2xl border border-indigo-700 shadow-sm flex flex-col text-white relative overflow-hidden">
                            <div className="absolute -right-4 -bottom-4 opacity-20">
                              <Wallet size={80} />
                            </div>
                            <span className="text-indigo-100 text-sm font-bold mb-1">Efectivo Total en Caja</span>
                            <span className="text-2xl font-black">{formatCurrency(boxSession.initialCash + boxSession.salesEfectivo)}</span>
                          </div>
                          <div className="bg-white p-4 rounded-2xl border border-blue-200 shadow-sm flex flex-col">
                            <span className="text-gray-500 text-sm font-bold mb-1 flex items-center gap-1"><CreditCard size={16} className="text-blue-600"/> Tarjeta (POS)</span>
                            <span className="text-2xl font-black text-blue-600">{formatCurrency(boxSession.salesTarjeta)}</span>
                          </div>
                          <div className="bg-white p-4 rounded-2xl border border-purple-200 shadow-sm flex flex-col">
                            <span className="text-gray-500 text-sm font-bold mb-1 flex items-center gap-1"><Smartphone size={16} className="text-purple-600"/> Yape</span>
                            <span className="text-2xl font-black text-purple-600">{formatCurrency(boxSession.salesYape)}</span>
                          </div>
                          <div className="bg-white p-4 rounded-2xl border border-cyan-200 shadow-sm flex flex-col">
                            <span className="text-gray-500 text-sm font-bold mb-1 flex items-center gap-1"><Smartphone size={16} className="text-cyan-600"/> Plin</span>
                            <span className="text-2xl font-black text-cyan-600">{formatCurrency(boxSession.salesPlin)}</span>
                          </div>
                        </div>

                        {/* Lista de Ventas y Botón Cerrar */}
                        <div className="bg-white rounded-2xl overflow-hidden border border-gray-200 shadow-sm flex-1 flex flex-col relative">
                          <div className="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                            <h3 className="font-bold text-gray-800 flex items-center gap-2"><ShoppingCart size={18}/> Ventas de mi turno local</h3>
                            <button 
                              onClick={() => setShowCloseBoxModal(true)}
                              className="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-xl font-bold flex items-center gap-2 transition-all shadow-sm shadow-red-600/20"
                            >
                              <Lock size={18} /> Cerrar Turno Activo
                            </button>
                          </div>
                          <div className="overflow-x-auto flex-1 custom-scrollbar">
                            <table className="w-full text-left border-collapse">
                              <thead className="bg-white text-gray-500 text-xs uppercase font-bold sticky top-0 z-10 shadow-sm">
                                <tr>
                                  <th className="px-6 py-3">ID Venta</th>
                                  <th className="px-6 py-3">Hora</th>
                                  <th className="px-6 py-3">Detalle</th>
                                  <th className="px-6 py-3">Método Pago</th>
                                  <th className="px-6 py-3 text-right">Total</th>
                                </tr>
                              </thead>
                              <tbody className="divide-y divide-gray-100">
                                {currentSessionSales.map(sale => {
                                  const method = PAYMENT_METHODS.find(m => m.id === sale.paymentMethod);
                                  const MethodIcon = method?.icon || Banknote;
                                  return (
                                    <tr key={sale.id} className="hover:bg-gray-50/80 transition-colors">
                                      <td className="px-6 py-4 font-mono text-indigo-600 font-bold uppercase text-xs">#{sale.id}</td>
                                      <td className="px-6 py-4 text-sm text-gray-600 font-medium">{formatTime(sale.date)}</td>
                                      <td className="px-6 py-4">
                                        <ul className="text-xs space-y-1">
                                          {sale.items.map(item => (
                                            <li key={item.id} className="text-gray-700 font-medium">
                                              <span className="text-indigo-600 font-bold">{item.quantity}x</span> {item.name}
                                            </li>
                                          ))}
                                        </ul>
                                      </td>
                                      <td className="px-6 py-4">
                                        <span className={`inline-flex items-center gap-1.5 px-2.5 py-1 rounded-md text-[10px] font-bold text-white uppercase ${method?.color || 'bg-gray-600'}`}>
                                          <MethodIcon size={12} /> {method?.name}
                                        </span>
                                      </td>
                                      <td className="px-6 py-4 text-right font-black text-emerald-600">{formatCurrency(sale.total)}</td>
                                    </tr>
                                  );
                                })}
                                {currentSessionSales.length === 0 && (
                                  <tr><td colSpan="5" className="text-center py-12 text-gray-400 font-medium">Aún no hay ventas en este turno local.</td></tr>
                                )}
                              </tbody>
                            </table>
                          </div>
                        </div>
                      </>
                    ) : (
                      <div className="flex-1 flex flex-col items-center justify-center bg-white rounded-2xl border border-gray-200 shadow-sm">
                        <Lock size={64} className="text-gray-300 mb-4" />
                        <h3 className="text-xl font-bold text-gray-800 mb-2">Tu caja está cerrada</h3>
                        <p className="text-gray-500">Abre un turno en la pestaña "Punto de Venta" para ver tu progreso.</p>
                      </div>
                    )}
                  </div>
                ) : (
                  // VISTA DE HISTORIAL (Común para todos)
                  (() => {
                    // 1. Filtrar ventas y reportes por el rango de fechas seleccionado
                    const startObj = filterStartDate ? new Date(filterStartDate + 'T00:00:00') : new Date('2000-01-01');
                    const endObj = filterEndDate ? new Date(filterEndDate + 'T23:59:59') : new Date('2100-01-01');

                    const filteredHistorialSales = sales.filter(s => {
                      const d = new Date(s.date);
                      return d >= startObj && d <= endObj;
                    });

                    const filteredReports = boxReports.filter(r => {
                      const d = new Date(r.endTime);
                      return d >= startObj && d <= endObj;
                    });

                    // --- FUNCIÓN GENERADORA DEL REPORTE (DATOS Y HTML) ---
                    const getReportDataAndHTML = () => {
                      let totalEfectivo = 0, totalTarjeta = 0, totalYape = 0, totalPlin = 0;
                      const productStats = {};

                      // Procesar todas las ventas del rango
                      filteredHistorialSales.forEach(sale => {
                        if (sale.paymentMethod === 'efectivo') totalEfectivo += sale.total;
                        if (sale.paymentMethod === 'tarjeta') totalTarjeta += sale.total;
                        if (sale.paymentMethod === 'yape') totalYape += sale.total;
                        if (sale.paymentMethod === 'plin') totalPlin += sale.total;

                        sale.items.forEach(item => {
                          const cat = item.category || 'Otros';
                          if (!productStats[cat]) productStats[cat] = {};
                          if (!productStats[cat][item.name]) productStats[cat][item.name] = { qty: 0, total: 0 };

                          productStats[cat][item.name].qty += item.quantity;
                          productStats[cat][item.name].total += (item.price * item.quantity);
                        });
                      });

                      const totalGeneral = totalEfectivo + totalTarjeta + totalYape + totalPlin;

                      // Construir el documento HTML estilizado para PDF/Impresión
                      let htmlContent = `
                        <div style="font-family: Arial, sans-serif; color: #333; max-width: 800px; margin: 0 auto; padding: 20px;">
                          <div style="text-align: center; margin-bottom: 30px;">
                            <h1 style="margin: 0; font-size: 28px; color: #111;">SAN DUBA</h1>
                            <h2 style="margin: 5px 0 0; font-size: 14px; color: #666; letter-spacing: 2px;">TERRAZA CLUB</h2>
                            <h3 style="margin: 20px 0 5px; font-size: 18px;">REPORTE DETALLADO DE VENTAS</h3>
